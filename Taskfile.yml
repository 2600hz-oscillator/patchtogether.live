# Taskfile.yml — single command surface for patchtogether.live. See docs/adr/ for architecture decisions.
# Usage:
#   task            # list available tasks
#   task dev        # start dev server + DSP watch
#   task ai:check   # AI-friendly smoke check (concise pass/fail output)
#
# Every command runs inside the Flox env (which provides Node, Faust, esbuild,
# git-lfs, go-task itself). Run `flox activate` once per shell, or use
# `flox activate -- task <name>` to one-shot.

version: '3'

vars:
  WEB: packages/web
  DSP: packages/dsp
  SERVER: packages/server
  ART: art
  E2E: e2e

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all
    silent: true

  # ---------------- Setup ----------------
  install:
    desc: Install all workspace dependencies
    cmds:
      - npm install

  install:browsers:
    desc: Install Playwright Chromium binary
    cmds:
      - npx --workspace {{.E2E}} playwright install chromium

  setup:
    desc: One-shot setup — npm install + Playwright browser
    cmds:
      - task: install
      - task: install:browsers

  setup:standalone:
    desc: |
      One-shot ONLINE prep for the offline-standalone-demo flow (see README
      "Run locally as a standalone demo"): npm install + DSP build + best-effort
      fetch of the DOOM shareware WAD. After this completes you can disconnect
      the network and run `task dev` — the public canvas at `/` works offline.
      DOOM module needs the WASM (run `bash packages/web/native/build-doom-wasm.sh`
      while still online — requires emcc on PATH).
    cmds:
      - task: install
      - task: dsp:build
      # Fetch the DOOM shareware WAD if it isn't already there. Best-effort —
      # if the mirror is down or the user is already offline, skip with a hint
      # rather than fail the whole setup. The DOOM module overlay handles the
      # missing-WAD case at runtime.
      - |
        WAD=packages/web/static/doom/DOOM1.WAD
        if [ -f "$WAD" ]; then
          echo "[setup:standalone] DOOM1.WAD already present, skipping fetch"
        else
          echo "[setup:standalone] fetching DOOM1.WAD shareware (4.2 MB) ..."
          if curl -fL --max-time 30 -o "$WAD" https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad; then
            echo "[setup:standalone] DOOM1.WAD ok"
          else
            echo "[setup:standalone] DOOM1.WAD fetch failed — DOOM module will show 'asset missing' offline. See packages/web/static/doom/DOWNLOAD_INSTRUCTIONS.md to fetch manually."
            rm -f "$WAD"
          fi
        fi
  setup:qbert:
    desc: 'Install qbert.zip into packages/web/static/roms/qbert/. Required by the QBERT arcade module (see static/roms/qbert/README.md). Usage: `task setup:qbert ROM=/path/to/qbert.zip` — defaults to ~/Downloads/qbert.zip.'
    vars:
      ROM: '{{.ROM | default "~/Downloads/qbert.zip"}}'
    cmds:
      - mkdir -p packages/web/static/roms/qbert
      - |
        # Expand ~ manually — Taskfile's shell doesn't always do it.
        SRC="{{.ROM}}"
        SRC="${SRC/#\~/$HOME}"
        if [ ! -f "$SRC" ]; then
          echo "QBERT: ROM not found at $SRC"
          echo "       Pass ROM=/path/to/qbert.zip explicitly, or drop the zip at"
          echo "       ~/Downloads/qbert.zip and re-run \`task setup:qbert\`."
          exit 1
        fi
        cp "$SRC" packages/web/static/roms/qbert/qbert.zip
        echo "QBERT: installed $SRC → packages/web/static/roms/qbert/qbert.zip"
        echo "QBERT: the zip is .gitignored — your local copy will not enter git history."

  setup:snes9x:build:
    desc: 'Build the SNES9X emulator WASM (snes9x2005/CAT SFC core) → packages/web/static/snes9x/snes9x.{js,wasm}. Requires emcc (provided by the flox env). Gitignored output, built on demand.'
    cmds:
      - bash packages/web/native/build-snes9x-wasm.sh

  setup:snes9x:
    desc: 'Install a SNES ROM into packages/web/static/roms/snes9x/game.sfc for the SNES9X module (see static/roms/snes9x/README.md). Accepts a .sfc/.smc/.fig or a .zip containing one. Usage: `task setup:snes9x ROM=/path/to/rom.sfc` — defaults to ~/Downloads/snes.sfc.'
    vars:
      ROM: '{{.ROM | default "~/Downloads/snes.sfc"}}'
    cmds:
      - mkdir -p packages/web/static/roms/snes9x
      - |
        SRC="{{.ROM}}"
        SRC="${SRC/#\~/$HOME}"
        if [ ! -f "$SRC" ]; then
          echo "SNES9X: ROM not found at $SRC"
          echo "        Pass ROM=/path/to/rom.sfc explicitly, or drop a .sfc at"
          echo "        ~/Downloads/snes.sfc and re-run \`task setup:snes9x\`."
          exit 1
        fi
        DEST=packages/web/static/roms/snes9x/game.sfc
        case "$SRC" in
          *.zip)
            TMP="$(mktemp -d)"
            unzip -o "$SRC" -d "$TMP" >/dev/null
            INNER="$(find "$TMP" \( -iname '*.sfc' -o -iname '*.smc' -o -iname '*.fig' \) | head -1)"
            if [ -z "$INNER" ]; then
              echo "SNES9X: no .sfc/.smc/.fig inside $SRC"; rm -rf "$TMP"; exit 1
            fi
            cp "$INNER" "$DEST"
            rm -rf "$TMP"
            ;;
          *)
            cp "$SRC" "$DEST"
            ;;
        esac
        echo "SNES9X: installed $SRC → $DEST"
        echo "SNES9X: game.sfc is .gitignored — your local copy will not enter git history."
        echo "SNES9X: run \`task setup:snes9x:build\` once to build the emulator WASM."

  # ---------------- Dev loop ----------------
  dev:
    desc: Start SvelteKit dev server (DSP built once up-front; use dev:full for live Faust watch)
    deps: [dsp:build]
    cmds:
      - npm run dev -w {{.WEB}}

  dev:full:
    desc: Dev server with DSP file watcher running in parallel
    deps: [dsp:build]
    cmds:
      - |
        npm run watch -w {{.DSP}} &
        WATCHER_PID=$!
        trap "kill $WATCHER_PID 2>/dev/null" EXIT
        npm run dev -w {{.WEB}}

  server:dev:
    desc: Start the Hocuspocus collaboration server (Stage B). Defaults to ws://localhost:1235 (1234 conflicts with BitwigStudio + DAWs that reserve it for OSC).
    cmds:
      - npm run dev -w {{.SERVER}}

  server:build:
    desc: Compile the Hocuspocus server to packages/server/dist
    cmds:
      - npm run build -w {{.SERVER}}

  # ---------------- Build ----------------
  build:
    desc: Production build (DSP + web)
    cmds:
      - task: dsp:build
      - npm run build -w {{.WEB}}

  build:web:
    desc: Build web only
    cmds:
      - npm run build -w {{.WEB}}

  # ---------------- DSP ----------------
  dsp:build:
    desc: Compile Faust + JS worklets to packages/dsp/dist
    cmds:
      - npm run build -w {{.DSP}}

  dsp:watch:
    desc: Watch packages/dsp/src and rebuild on save
    cmds:
      - npm run watch -w {{.DSP}}

  # ---------------- Type check / lint ----------------
  typecheck:
    desc: Type-check every workspace
    cmds:
      - npm run typecheck --workspaces --if-present

  # ---------------- Unit + integration tests ----------------
  test:
    desc: Run unit/integration tests (dsp + server + web — ART + E2E are run via dedicated tasks)
    # NOTE: deliberately scoped to dsp + server + web. Using
    # `npm test --workspaces --if-present` would also invoke `art` (vitest) and
    # `e2e` (playwright), which are heavier suites with their own task targets
    # — and `task ci` would then run them twice. See chore/build-perf PR.
    #
    # dsp's `test` target runs the pure-lib unit suite (e.g. cube-dsp.test.ts);
    # it has its own vitest.config.ts (node env, no AudioContext/WASM). Older
    # DSP-lib tests still live under web/ via relative import — both run.
    #
    # Side effect: emits e2e/.generated/registry-manifest.json via
    # packages/web/src/lib/dev/registry-manifest.test.ts. Downstream
    # `task e2e` + `task vrt` read it via e2e/tests/_registry.ts.
    cmds:
      - npm test -w {{.DSP}}
      - npm test -w {{.SERVER}}
      - npm test -w {{.WEB}}
      - task: test:scripts

  test:scripts:
    desc: Run repo-root scripts/ tests (scaffolder + future repo-wide tooling)
    # Uses vitest.scripts.config.ts (include: scripts/**/*.test.ts). The
    # scaffolder mutates real registry files + then undoes — single-fork
    # so tests don't race.
    #
    # NOTE: config file is NOT named vitest.config.ts on purpose — per-package
    # `vitest run` would auto-discover it and shadow the package's own config,
    # breaking `npm test -w packages/server`. See vitest.scripts.config.ts.
    cmds:
      - npx vitest run --config vitest.scripts.config.ts

  test:emit-manifest:
    desc: Refresh e2e/.generated/registry-manifest.json without running the full unit suite
    # Standalone target for the case where a contributor adds a new module
    # and wants the manifest fresh before iterating Playwright specs
    # locally — avoids the 12s cost of the full `task test` run.
    #
    # Runs from packages/web so vitest's include glob (`src/**/*.test.ts`
    # relative to the config) resolves the spec file correctly.
    dir: '{{.WEB}}'
    cmds:
      - npx vitest run src/lib/dev/registry-manifest.test.ts

  # ---------------- Audio Regression Tests ----------------
  art:
    desc: Run Audio Regression Tests
    deps: [dsp:build]
    cmds:
      - npm test -w {{.ART}}

  art:update:
    desc: Regenerate ART baselines (.f32 + .sha)
    deps: [dsp:build]
    cmds:
      - npm run art:update -w {{.ART}}

  # ---------------- Visual Regression Tests (Playwright VRT) ----------------
  # Baselines live under e2e/vrt/__screenshots__/ and are LFS-tracked (see
  # .gitattributes). Modeled on the doomviz VRT pattern — same gallery shape,
  # adapted to Playwright + TS. Initially non-blocking in CI (continue-on-error).
  vrt:
    desc: Run the VRT suite (Playwright; compares card screenshots against e2e/vrt/__screenshots__/). Full sweep — INFORMATIONAL lane (includes canvas-driven cards that may flake).
    # dsp:build is required because several module Card.svelte files
    # import `?url`-suffixed WASM artifacts from packages/dsp/dist/
    # (e.g. riotgirls.ts imports drummergirl.wasm?url). Without the
    # bundled DSP on disk Vite's dev server fails the import with a
    # 500 + an HMR overlay, which Playwright detects as a hung page
    # and the suite times out after 30s on every module.
    #
    # test:emit-manifest is required because vrt.spec.ts iterates the
    # registry manifest at file-parse time (e2e/tests/_registry.ts).
    # Without a fresh manifest on disk Playwright throws at test
    # discovery with an actionable error pointing back at this target.
    deps: [dsp:build, test:emit-manifest]
    cmds:
      - npm run vrt -w {{.E2E}} -- {{.CLI_ARGS}}

  vrt:strict:
    desc: Run the deterministic VRT subset (STRICT_VRT_MODULES) — pure knob/fader cards on both platforms, no canvas masks. BLOCKING lane in `task ci`. A flake here is a real flake to fix, not tolerate (per memory `feedback_no_flake_tolerance`).
    # Same deps as `task vrt` — DSP bundle + registry manifest. The
    # filter to STRICT_VRT_MODULES happens inside vrt.spec.ts when
    # VRT_STRICT=1 is set (also narrows testMatch in vrt.config.ts so
    # the auxiliary composite/interactions/skin specs don't run).
    deps: [dsp:build, test:emit-manifest]
    env:
      VRT_STRICT: '1'
    cmds:
      - npm run vrt:strict -w {{.E2E}} -- {{.CLI_ARGS}}

  vrt:update:
    desc: Refresh VRT baselines (e2e/vrt/__screenshots__/**). Inspect the diff and commit.
    deps: [dsp:build, test:emit-manifest]
    cmds:
      - npm run vrt:update -w {{.E2E}} -- {{.CLI_ARGS}}

  vrt:gallery:
    desc: Build the VRT gallery HTML (docs/vrt/) from the latest baselines + last test-results
    cmds:
      - python3 e2e/vrt/build_gallery.py
          --baseline-dir e2e/vrt/__screenshots__
          --results-dir  e2e/vrt/test-results
          --output-dir   docs/vrt

  # ---------------- E2E (Playwright) ----------------
  e2e:
    desc: 'Run end-to-end tests (headless Chromium). Pass extra Playwright args after `--` (e.g. `task e2e -- tests/foo.spec.ts`).'
    # io-spec-consistency, modules, and the upcoming per-module spec
    # iterate the registry manifest at file-parse time
    # (e2e/tests/_registry.ts). Refresh it before Playwright discovers
    # specs so a freshly-registered module is auto-enrolled without
    # the contributor having to remember a side-effect command.
    deps: [test:emit-manifest]
    cmds:
      - npm test -w {{.E2E}} -- {{.CLI_ARGS}}

  e2e:no-collab:
    desc: 'E2E EXCLUDING the @collab multi-context specs (they run in their own non-sharded CI job — the in-memory Hocuspocus relay flakes under shard contention). Used by the sharded CI matrix.'
    deps: [test:emit-manifest]
    cmds:
      - npm exec -w {{.E2E}} -- playwright test --grep-invert '@collab|@capacity' {{.CLI_ARGS}}

  collab:
    desc: 'Run ONLY the @collab multi-context specs on a DEDICATED runner (off the 8-shard matrix). Modest 2-worker parallelism — far below the 8-shard × 4-worker fan-out that hammered the shared relay (the #97 flake) — keeps the DOOM 2-user gate reliable while finishing within the CI time budget (a single serial worker overran 25 min on 41 specs). The Hocuspocus relay is in-memory so this is cheap.'
    deps: [test:emit-manifest]
    cmds:
      - npm exec -w {{.E2E}} -- playwright test --grep '@collab|@capacity' --workers=2 {{.CLI_ARGS}}

  doom-probe:
    desc: |
      MANUAL DOOM-multiplayer visual probe — self-verify MP without driving two
      browsers by hand. Brings up TWO browser contexts on ONE rackspace via the
      in-memory Hocuspocus relay, drives the REAL host->guest flow through the
      ACTUAL UI (real Host-Multiplayer / Launch / Join button clicks, NOT dev
      hooks), and at each phase captures a screenshot of BOTH players' DOOM card
      + canvas plus a state.json (slot/gamestate/host/badge/members/pos/fbSig).
      Writes to /tmp/doom-mp-probe/ (persists across worktree teardown; override
      with DOOM_PROBE_DIR). NOT a pass/fail gate + NOT in the CI / @collab set —
      gated behind DOOM_PROBE=1 (set here). Requires the DOOM WASM + DOOM1.WAD
      assets (bash packages/web/native/build-doom-wasm.sh + fetch the WAD, same
      as ci.yml); skips with a build hint if absent.
        DOOM_PROBE_DIR=<dir>   artifact output dir (default /tmp/doom-mp-probe)
    deps: [test:emit-manifest]
    env:
      DOOM_PROBE: '1'
    cmds:
      - npm exec -w {{.E2E}} -- playwright test tests/doom-mp-probe.spec.ts --workers=1 {{.CLI_ARGS}}

  audio-drift:
    desc: |
      Phase-C decision research harness. Drives two browser contexts on the same
      Yjs rackspace, builds N patches, captures audio from each side, and writes
      drift metrics + a recommendation to art/audio-drift/. Tagged @audio-drift
      so it stays out of CI's PR-gate path. Vars:
        AUDIO_DRIFT_SECONDS=<n>     Recording duration per scenario (default 5).
        E2E_BASE_URL=<url>          Run against a remote target (default local).
        DATABASE_URL=<conn>         Postgres URL for the local Hocuspocus server
                                    (defaults to the Flox-provided dev DB).
    env:
      DATABASE_URL: '{{.DATABASE_URL | default "postgresql://postgres:dev@localhost:54320/patchtogether_dev"}}'
    cmds:
      - npm exec -w {{.E2E}} -- playwright test --config=audio-drift/audio-drift.config.ts

  chaos:run:
    desc: |
      Chaos Stage-1 run. Spawns Chromium, drives Chaos Carl through 200 random
      intents (configurable via CHAOS_ITERATIONS), checks invariants between
      each. On a violation: dumps artifacts to e2e/chaos/findings/<dir>/ and
      fails. Vars:
        CHAOS_SEED=<int>            deterministic seed
        CHAOS_ITERATIONS=<int>      intents per run (default 200)
        CHAOS_MAX_NODES=<int>       per-bot module cap (default 6) — keep low
                                    in shared rackspaces so bots don't flood
                                    the canvas
        CHAOS_RACKSPACE_URL=<url>   join a deployed rackspace via invite link
                                    instead of running solo against '/'. Skips
                                    clearPatch so the bot just shows up and
                                    plays.
        BETA_GATE_PASS=<pw>         beta-gate basic-auth password for
                                    deployed tiers (user is `beta` by
                                    default; matches the server env var).
                                    Example:
                                    BETA_GATE_PASS=$BETA_GATE_PASS \
                                      CHAOS_RACKSPACE_URL='https://autotest.patchtogether.live/r/abc?invite=xyz' \
                                      E2E_BASE_URL=https://autotest.patchtogether.live task chaos:run
    cmds:
      - npm exec -w {{.E2E}} -- playwright test --config=chaos/chaos.config.ts

  ci:smoke:live:
    desc: Live-deploy smoke (set E2E_BASE_URL; defaults to autotest.patchtogether.live). Runs only the @smoke-tagged subset; never blocks the PR gate.
    cmds:
      - 'echo "→ Live smoke against: ${E2E_BASE_URL:-https://autotest.patchtogether.live}"'
      # Use `npm exec -w` rather than a bare `playwright` so the binary
      # resolves via the e2e workspace's node_modules/.bin without depending
      # on shell PATH inheritance — go-task spawns a subshell that doesn't
      # auto-pick up node_modules/.bin (caused exit 127 in CI).
      - E2E_BASE_URL="${E2E_BASE_URL:-https://autotest.patchtogether.live}" npm exec -w {{.E2E}} -- playwright test --grep @smoke

  ci:smoke:prod-build:
    desc: Build the prod bundle, boot `vite preview`, run @smoke specs against it. Catches minification + static-asset regressions before they ship.
    deps: [build]
    env:
      E2E_USE_PREVIEW: '1'
    cmds:
      - npm test -w {{.E2E}} -- --grep @smoke

  e2e:headed:
    desc: Run E2E tests with browser window visible
    cmds:
      - npm test -w {{.E2E}} -- --headed

  e2e:debug:
    desc: Run E2E tests in Playwright Inspector
    cmds:
      - npm test -w {{.E2E}} -- --debug

  e2e:ui:
    desc: Open Playwright UI mode (interactive test runner)
    cmds:
      - npm exec -w {{.E2E}} -- playwright test --ui

  # ---------------- AI agent helpers ----------------
  # These commands emit concise, parseable output suitable for an AI agent
  # to validate "does the app work?" without a human in the loop.
  ai:check:
    desc: AI-friendly smoke check — concise pass/fail across all the things that matter
    cmds:
      - npm run ai:check -w {{.E2E}}

  ai:debug:
    desc: AI-friendly diagnostic — boots the page, captures DOM snapshot + console + screenshot
    cmds:
      - npm run ai:debug -w {{.E2E}}

  # ---------------- CI shape ----------------
  ci:
    desc: Run the full PR-gate suite (typecheck + unit + ART + E2E + VRT-strict)
    # VRT-strict (deterministic knob/fader subset) gates `task ci` so a
    # baseline drift on a pure-CSS card fails locally just as fast as
    # the unit suite. The full `task vrt` sweep (canvas-driven cards
    # that legitimately flake — masked previews, animated chrome) stays
    # informational and runs only in the dedicated CI VRT job.
    cmds:
      - task: typecheck
      - task: test
      - task: art
      - task: e2e
      - task: vrt:strict

  # ---------------- Secret-sync ops ----------------
  sync-secrets:
    desc: |
      Push per-tier secrets to BOTH the Fly relay AND the CF Pages web project
      so INVITE_SECRET (+ Clerk + DATABASE_URL) can never drift out of lockstep
      — drift silently rejects every anonymous invite guest at the WS handshake.
      Reads ~/.config/patchtogether/cf.env. DEFAULTS TO DRY-RUN (names only,
      never echoes values). Pass `--apply` to actually push; prod additionally
      requires `--yes-prod`. Examples:
        task sync-secrets -- dev                 # dry-run
        task sync-secrets -- dev --apply         # push dev to Fly + CF
        task sync-secrets -- prod --apply --yes-prod
    cmds:
      - bash scripts/sync-secrets.sh {{.CLI_ARGS}}

  smoke:anon-handshake:
    desc: |
      Deploy-time guard: mint a REAL anon invite + open a REAL WS handshake to
      the deployed relay (wss://patchtogether-server-<tier>.fly.dev) and assert
      onAuthenticate ACCEPTS — catches INVITE_SECRET drift between the deployed
      web app and relay (the silent "every anon guest rejected" bug). Needs the
      canonical INVITE_SECRET in env (same value sync-secrets pushes to both
      targets); SKIPS cleanly if unset. Tier via TIER env (default autotest).
      Example:
        INVITE_SECRET=$SECRET TIER=dev task smoke:anon-handshake
    cmds:
      - node scripts/anon-handshake-smoke.mjs "${TIER:-autotest}"

  # ---------------- Housekeeping ----------------
  worktree:list:
    desc: Show every git worktree + classification against the cap. Changes nothing.
    cmds:
      - bash scripts/worktree-guard.sh report

  worktree:clean:
    desc: Prune gone worktrees + remove ABANDONED ones (dead agent lock, clean, fully pushed).
    cmds:
      - bash scripts/worktree-guard.sh clean

  worktree:guard:
    desc: |
      Enforce the repo worktree cap (default 10). Auto-removes abandoned worktrees,
      then exits non-zero listing any that still need a human. RUN THIS BEFORE
      creating a new worktree. Override the cap with WORKTREE_CAP=N.
    cmds:
      - bash scripts/worktree-guard.sh enforce

  pr:conflict-sweep:
    desc: |
      After a merge to main, list the open PRs the merge just turned CONFLICTING
      so they get rebased before they rot. Report-only. `-- --mine` for yours.
      See CLAUDE.md "Post-merge conflict sweep".
    cmds:
      - bash scripts/pr-conflict-sweep.sh {{.CLI_ARGS}}

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf {{.DSP}}/dist
      - rm -rf {{.WEB}}/.svelte-kit {{.WEB}}/build
      - rm -rf {{.E2E}}/playwright-report {{.E2E}}/test-results
      - rm -rf node_modules/.cache .vite

  clean:deep:
    desc: Nuke node_modules + lockfile (use sparingly)
    prompt: This will delete node_modules and package-lock.json. Continue?
    cmds:
      - rm -rf node_modules packages/*/node_modules art/node_modules e2e/node_modules
      - rm -f package-lock.json
