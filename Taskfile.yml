# Taskfile.yml — single command surface for patchtogether.live. See docs/adr/ for architecture decisions.
# Usage:
#   task            # list available tasks
#   task dev        # start dev server + DSP watch
#   task ai:check   # AI-friendly smoke check (concise pass/fail output)
#
# Every command runs inside the Flox env (which provides Node, Faust, esbuild,
# git-lfs, go-task itself). Run `flox activate` once per shell, or use
# `flox activate -- task <name>` to one-shot.

version: '3'

vars:
  WEB: packages/web
  DSP: packages/dsp
  SERVER: packages/server
  ART: art
  E2E: e2e

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all
    silent: true

  actionlint:
    desc: Lint GitHub Actions workflows locally (same pinned binary + flags as CI) — run before pushing any .github/workflows change
    vars:
      AL_VER: 1.7.12
      AL_BIN: node_modules/.cache/actionlint/actionlint
    cmds:
      - |
        set -euo pipefail
        if [ ! -x "{{.AL_BIN}}" ]; then
          mkdir -p "$(dirname "{{.AL_BIN}}")"
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m); [ "$ARCH" = "x86_64" ] && ARCH=amd64; [ "$ARCH" = "aarch64" ] && ARCH=arm64
          curl -sSfL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v{{.AL_VER}}/actionlint_{{.AL_VER}}_${OS}_${ARCH}.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C "$(dirname "{{.AL_BIN}}")" actionlint
        fi
        # -shellcheck= disables shellcheck integration to match ci.yml's actionlint job.
        "{{.AL_BIN}}" -shellcheck=

  # ---------------- Setup ----------------
  install:
    desc: Install all workspace dependencies
    cmds:
      - npm install

  install:browsers:
    desc: Install Playwright Chromium binary
    cmds:
      - npx --workspace {{.E2E}} playwright install chromium

  setup:
    desc: One-shot setup — npm install + Playwright browser
    cmds:
      - task: install
      - task: install:browsers

  setup:standalone:
    desc: |
      One-shot ONLINE prep for the offline-standalone-demo flow (see README
      "Run locally as a standalone demo"): npm install + DSP build + best-effort
      fetch of the DOOM shareware WAD. After this completes you can disconnect
      the network and run `task dev` — the public canvas at `/` works offline.
      DOOM module needs the WASM (run `bash packages/web/native/build-doom-wasm.sh`
      while still online — requires emcc on PATH).
    cmds:
      - task: install
      - task: dsp:build
      # Fetch the DOOM shareware WAD if it isn't already there. Best-effort —
      # if the mirror is down or the user is already offline, skip with a hint
      # rather than fail the whole setup. The DOOM module overlay handles the
      # missing-WAD case at runtime.
      - |
        WAD=packages/web/static/doom/DOOM1.WAD
        if [ -f "$WAD" ]; then
          echo "[setup:standalone] DOOM1.WAD already present, skipping fetch"
        else
          echo "[setup:standalone] fetching DOOM1.WAD shareware (4.2 MB) ..."
          if curl -fL --max-time 30 -o "$WAD" https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad; then
            echo "[setup:standalone] DOOM1.WAD ok"
          else
            echo "[setup:standalone] DOOM1.WAD fetch failed — DOOM module will show 'asset missing' offline. See packages/web/static/doom/DOWNLOAD_INSTRUCTIONS.md to fetch manually."
            rm -f "$WAD"
          fi
        fi
  setup:qbert:
    desc: 'Install qbert.zip into packages/web/static/roms/qbert/. Required by the QBERT arcade module (see static/roms/qbert/README.md). Usage: `task setup:qbert ROM=/path/to/qbert.zip` — defaults to ~/Downloads/qbert.zip.'
    vars:
      ROM: '{{.ROM | default "~/Downloads/qbert.zip"}}'
    cmds:
      - mkdir -p packages/web/static/roms/qbert
      - |
        # Expand ~ manually — Taskfile's shell doesn't always do it.
        SRC="{{.ROM}}"
        SRC="${SRC/#\~/$HOME}"
        if [ ! -f "$SRC" ]; then
          echo "QBERT: ROM not found at $SRC"
          echo "       Pass ROM=/path/to/qbert.zip explicitly, or drop the zip at"
          echo "       ~/Downloads/qbert.zip and re-run \`task setup:qbert\`."
          exit 1
        fi
        cp "$SRC" packages/web/static/roms/qbert/qbert.zip
        echo "QBERT: installed $SRC → packages/web/static/roms/qbert/qbert.zip"
        echo "QBERT: the zip is .gitignored — your local copy will not enter git history."

  setup:snes9x:build:
    desc: 'Build the SNES9X emulator WASM (snes9x2005/CAT SFC core) → packages/web/static/snes9x/snes9x.{js,wasm}. Requires emcc (provided by the flox env). Gitignored output, built on demand.'
    cmds:
      - bash packages/web/native/build-snes9x-wasm.sh

  setup:snes9x:
    desc: 'Install a SNES ROM into packages/web/static/roms/snes9x/game.sfc for the SNES9X module (see static/roms/snes9x/README.md). Accepts a .sfc/.smc/.fig or a .zip containing one. Usage: `task setup:snes9x ROM=/path/to/rom.sfc` — defaults to ~/Downloads/snes.sfc.'
    vars:
      ROM: '{{.ROM | default "~/Downloads/snes.sfc"}}'
    cmds:
      - mkdir -p packages/web/static/roms/snes9x
      - |
        SRC="{{.ROM}}"
        SRC="${SRC/#\~/$HOME}"
        if [ ! -f "$SRC" ]; then
          echo "SNES9X: ROM not found at $SRC"
          echo "        Pass ROM=/path/to/rom.sfc explicitly, or drop a .sfc at"
          echo "        ~/Downloads/snes.sfc and re-run \`task setup:snes9x\`."
          exit 1
        fi
        DEST=packages/web/static/roms/snes9x/game.sfc
        case "$SRC" in
          *.zip)
            TMP="$(mktemp -d)"
            unzip -o "$SRC" -d "$TMP" >/dev/null
            INNER="$(find "$TMP" \( -iname '*.sfc' -o -iname '*.smc' -o -iname '*.fig' \) | head -1)"
            if [ -z "$INNER" ]; then
              echo "SNES9X: no .sfc/.smc/.fig inside $SRC"; rm -rf "$TMP"; exit 1
            fi
            cp "$INNER" "$DEST"
            rm -rf "$TMP"
            ;;
          *)
            cp "$SRC" "$DEST"
            ;;
        esac
        echo "SNES9X: installed $SRC → $DEST"
        echo "SNES9X: game.sfc is .gitignored — your local copy will not enter git history."
        echo "SNES9X: run \`task setup:snes9x:build\` once to build the emulator WASM."

  setup:blood:
    desc: 'Install Blood game DATA (BLOOD.RFF + TILES*.ART + RFF/DAT/MAP) into packages/web/static/blood/ for the (planned) BLOOD module. Blood data is PROPRIETARY + user-provided (NOT freely redistributable, unlike the DOOM shareware WAD — see static/blood/README.md). Usage: `task setup:blood BLOOD_ASSETS=/path/to/your/blood/install` — defaults to ~/blood.'
    vars:
      BLOOD_ASSETS: '{{.BLOOD_ASSETS | default "~/blood"}}'
    cmds:
      - mkdir -p packages/web/static/blood
      - |
        # Expand ~ manually — Taskfile's shell doesn't always do it.
        SRC="{{.BLOOD_ASSETS}}"
        SRC="${SRC/#\~/$HOME}"
        if [ ! -d "$SRC" ]; then
          echo "BLOOD: asset directory not found at $SRC"
          echo "       Pass BLOOD_ASSETS=/path/to/your/blood/install explicitly, or put your"
          echo "       Blood install (with BLOOD.RFF) at ~/blood and re-run \`task setup:blood\`."
          echo "       Blood data is proprietary + user-provided — see"
          echo "       packages/web/static/blood/README.md for the legal status + file list."
          exit 1
        fi
        # BLOOD.RFF is the required anchor file — fail clearly if it's absent
        # (case-insensitive: DOS releases ship uppercase, some installs lowercase).
        RFF="$(find "$SRC" -maxdepth 2 -iname 'BLOOD.RFF' | head -1)"
        if [ -z "$RFF" ]; then
          echo "BLOOD: no BLOOD.RFF found under $SRC — that's the required main resource file."
          echo "       Make sure BLOOD_ASSETS points at an extracted Blood install (e.g. the"
          echo "       One Unit Whole Blood / Fresh Supply DOS data). See static/blood/README.md."
          exit 1
        fi
        BASE="$(dirname "$RFF")"
        DEST=packages/web/static/blood
        echo "BLOOD: found data dir $BASE"
        # Copy the recognised Blood data files (case-insensitive). We DON'T copy
        # the whole dir — only the known game-data extensions — to avoid pulling
        # in EXEs / config / saves.
        copied=0
        while IFS= read -r f; do
          cp "$f" "$DEST/"
          echo "BLOOD:   + $(basename "$f")"
          copied=$((copied+1))
        done < <(find "$BASE" -maxdepth 1 -type f \( \
          -iname '*.RFF' -o -iname '*.ART' -o -iname '*.DAT' -o -iname '*.MAP' \))
        echo "BLOOD: installed $copied data file(s) → $DEST"
        echo "BLOOD: these files are .gitignored — your local copy will not enter git history."
        echo "BLOOD: Blood data is PROPRIETARY (Warner Bros. IP) — never commit or redistribute it."

  # ---------------- Dev loop ----------------
  dev:
    desc: Start SvelteKit dev server (DSP built once up-front; use dev:full for live Faust watch)
    deps: [dsp:build]
    cmds:
      - npm run dev -w {{.WEB}}

  dev:full:
    desc: Dev server with DSP file watcher running in parallel
    deps: [dsp:build]
    cmds:
      - |
        npm run watch -w {{.DSP}} &
        WATCHER_PID=$!
        trap "kill $WATCHER_PID 2>/dev/null" EXIT
        npm run dev -w {{.WEB}}

  server:dev:
    desc: Start the Hocuspocus collaboration server (Stage B). Defaults to ws://localhost:1235 (1234 conflicts with BitwigStudio + DAWs that reserve it for OSC).
    cmds:
      - npm run dev -w {{.SERVER}}

  server:build:
    desc: Compile the Hocuspocus server to packages/server/dist
    cmds:
      - npm run build -w {{.SERVER}}

  # ---------------- Build ----------------
  build:
    desc: Production build (DSP + web)
    cmds:
      - task: dsp:build
      - task: docs:faces
      - npm run build -w {{.WEB}}

  build:web:
    desc: Build web only
    cmds:
      - task: docs:faces
      - npm run build -w {{.WEB}}

  # ---------------- DSP ----------------
  dsp:build:
    desc: Compile Faust + JS worklets to packages/dsp/dist
    # Skip the (slow) Faust compile when a matching dist is already on disk.
    # `status:` short-circuits the task when ALL listed commands exit 0:
    #   - dist/.dsp-srchash exists, AND
    #   - its content == the current hash of all DSP build inputs.
    # In CI the `dsp-build` job compiles once and uploads packages/dsp/dist/**
    # (incl. .dsp-srchash); every downstream job restores that artifact, so a
    # job calling `task art|vrt|vrt:strict|build` (which all list dsp:build as a
    # dep) REUSES the restored dist instead of recompiling Faust ~16× per run.
    # Locally it makes back-to-back `task vrt` / `task art` runs instant after
    # the first build. Edit any DSP source / build script / the flox manifest
    # and the hash changes → the guard fails → a real rebuild runs.
    status:
      - test -f {{.DSP}}/dist/.dsp-srchash
      - test "$(cat {{.DSP}}/dist/.dsp-srchash 2>/dev/null)" = "$(bash scripts/dsp-src-hash.sh)"
    cmds:
      - npm run build -w {{.DSP}}
      # Stamp the source fingerprint so a later `task` invocation (or a CI job
      # that restored this dist) can skip the rebuild via the `status:` guard.
      - bash scripts/dsp-src-hash.sh > {{.DSP}}/dist/.dsp-srchash

  dsp:watch:
    desc: Watch packages/dsp/src and rebuild on save
    cmds:
      - npm run watch -w {{.DSP}}

  dsp:fetch-dist:
    desc: |
      [local dev-loop] Populate packages/dsp/dist by COPYING a prebuilt dist from
      the primary checkout (or a sibling worktree, or $DSP_DIST_SRC) instead of
      compiling Faust. For fresh worktrees / envs without the Faust toolchain so
      single-test runs (e2e/vrt/art) don't fail on a missing DSP bundle. Never
      runs in CI; the normal `task dsp:build` path is unchanged.
    cmds:
      - bash scripts/dsp-fetch-dist.sh

  dsp:ensure:
    desc: |
      [local dev-loop] Make sure packages/dsp/dist exists with the LEAST work:
      reuse a current dist via the dsp:build status-guard if possible; otherwise
      compile with Faust if available; otherwise fall back to copying a prebuilt
      dist (dsp:fetch-dist). Used by the single-test targets so they never fail on
      a missing/uncompilable DSP bundle.
    cmds:
      - |
        # Fast path: a current dist already satisfies the dsp:build status guard.
        if [ -f {{.DSP}}/dist/.dsp-srchash ] \
           && [ "$(cat {{.DSP}}/dist/.dsp-srchash 2>/dev/null)" = "$(bash scripts/dsp-src-hash.sh)" ]; then
          echo "[dsp:ensure] dist is current — nothing to do"
          exit 0
        fi
        # Prefer a real Faust build when the toolchain is present.
        if command -v faust >/dev/null 2>&1 \
           && [ -f node_modules/@grame/faustwasm/scripts/faust2wasm.js ]; then
          echo "[dsp:ensure] Faust available — building dist"
          task dsp:build
        else
          echo "[dsp:ensure] Faust unavailable — copying a prebuilt dist"
          task dsp:fetch-dist
        fi

  # ---------------- Type check / lint ----------------
  typecheck:
    desc: Type-check every workspace
    cmds:
      - npm run typecheck --workspaces --if-present

  # ---------------- Unit + integration tests ----------------
  test:
    desc: Run unit/integration tests (dsp + server + web — ART + E2E are run via dedicated tasks)
    # NOTE: deliberately scoped to dsp + server + web. Using
    # `npm test --workspaces --if-present` would also invoke `art` (vitest) and
    # `e2e` (playwright), which are heavier suites with their own task targets
    # — and `task ci` would then run them twice. See chore/build-perf PR.
    #
    # dsp's `test` target runs the pure-lib unit suite (e.g. cube-dsp.test.ts);
    # it has its own vitest.config.ts (node env, no AudioContext/WASM). Older
    # DSP-lib tests still live under web/ via relative import — both run.
    #
    # Side effect: emits e2e/.generated/registry-manifest.json via
    # packages/web/src/lib/dev/registry-manifest.test.ts. Downstream
    # `task e2e` + `task vrt` read it via e2e/tests/_registry.ts.
    cmds:
      - npm test -w {{.DSP}}
      - npm test -w {{.SERVER}}
      - npm test -w {{.WEB}}
      - task: test:scripts

  test:one:
    desc: |
      [local dev-loop] Run ONE vitest file (or -t name filter), fast, no full
      suite. Pass a path and/or a `-t <name>` after `--`. Defaults to the web
      package; set PKG=dsp|server|art|web to target another workspace.
      REPEAT=N runs it N times in a row and FAILS on the first failing run — the
      flake-check you owe any NEW/changed test before opening an MR (REPEAT=3 is
      the standard; see CLAUDE.md "Flake-check NEW tests 3×").
      Examples:
        task test:one -- src/lib/ui/canvas/organize.test.ts
        task test:one -- organize -t "deterministic"
        task test:one PKG=dsp -- cube     # PKG=… goes BEFORE the `--`
        REPEAT=3 task test:one -- organize    # flake-check: 3 clean runs required
    vars:
      PKG: '{{.PKG | default "web"}}'
    cmds:
      # `vitest run <positional>` treats a bare arg as a filename substring
      # filter, so passing either a path or a partial name Just Works. We add
      # the package's own config explicitly so the right env/alias is used.
      - |
        case "{{.PKG}}" in
          web)    DIR=packages/web    CFG=vitest.config.ts ;;
          dsp)    DIR=packages/dsp    CFG=vitest.config.ts ;;
          server) DIR=packages/server CFG=vitest.config.ts ;;
          art)    DIR=art             CFG=vitest.config.ts ;;
          *) echo "test:one: unknown PKG '{{.PKG}}' (use web|dsp|server|art)"; exit 2 ;;
        esac
        # vitest has no native --repeat-each, so loop. REPEAT defaults to 1
        # (normal single run); REPEAT=3 is the pre-MR flake-check (exit on the
        # first failing run so a flake is never masked by a later green run).
        N="${REPEAT:-1}"
        for r in $(seq 1 "$N"); do
          [ "$N" -gt 1 ] && echo "[test:one] flake-check run $r/$N"
          echo "[test:one] $DIR vitest run {{.CLI_ARGS}}"
          npm exec -w "$DIR" -- vitest run --config "$CFG" {{.CLI_ARGS}} \
            || { echo "[test:one] FAILED on run $r/$N (flake or real failure)"; exit 1; }
        done

  test:scripts:
    desc: Run repo-root scripts/ tests (scaffolder + future repo-wide tooling)
    # Uses vitest.scripts.config.ts (include: scripts/**/*.test.ts). The
    # scaffolder mutates real registry files + then undoes — single-fork
    # so tests don't race.
    #
    # NOTE: config file is NOT named vitest.config.ts on purpose — per-package
    # `vitest run` would auto-discover it and shadow the package's own config,
    # breaking `npm test -w packages/server`. See vitest.scripts.config.ts.
    cmds:
      - npx vitest run --config vitest.scripts.config.ts

  test:emit-manifest:
    desc: Refresh e2e/.generated/registry-manifest.json without running the full unit suite
    # Standalone target for the case where a contributor adds a new module
    # and wants the manifest fresh before iterating Playwright specs
    # locally — avoids the 12s cost of the full `task test` run.
    #
    # Runs from packages/web so vitest's include glob (`src/**/*.test.ts`
    # relative to the config) resolves the spec file correctly.
    dir: '{{.WEB}}'
    cmds:
      - npx vitest run src/lib/dev/registry-manifest.test.ts

  test:recon:
    desc: |
      Test Reconciliation — per-block TOTAL + DISABLED test counts (the
      "watch disabled fall over time" report). Prints a human table by
      default; pass `--json` for machine output or `--date YYYY-MM-DD` to
      override the entry date. Depends on test:emit-manifest so the
      parametrized (vrt/behavioral) counts reflect the live registry.
      Examples:
        task test:recon
        task test:recon -- --json
        task test:recon -- --date 2026-06-07
    deps: [test:emit-manifest]
    cmds:
      - node scripts/test-reconciliation.mjs {{.CLI_ARGS}}

  test:recon:page:
    desc: |
      Render the Test Reconciliation GitHub Pages page
      (docs/test-reconciliation/index.html) from the committed changelog
      history + a freshly-computed live snapshot. Used by the pages.yml
      deploy; run locally to preview the page. Depends on test:emit-manifest
      so the live parametrized counts are accurate.
    deps: [test:emit-manifest]
    cmds:
      - node scripts/build-test-reconciliation-page.mjs {{.CLI_ARGS}}

  # ---------------- Audio Regression Tests ----------------
  art:
    desc: Run Audio Regression Tests
    deps: [dsp:build]
    cmds:
      - npm test -w {{.ART}}

  art:update:
    desc: Regenerate ART baselines (.f32 + .sha)
    deps: [dsp:build]
    cmds:
      - npm run art:update -w {{.ART}}

  art:one:
    desc: |
      [local dev-loop] Run ONE ART scenario by file-path or name filter, fast.
      Uses dsp:ensure (copies a prebuilt dist on Faust-less worktrees) so it
      never fails on a missing DSP bundle. REPEAT=N runs it N times and fails on
      the first failing run (the pre-MR flake-check; REPEAT=3 is the standard).
      Examples:
        task art:one -- moog911
        task art:one -- scenarios/meowbox/meow-c4.test.ts
        task art:one -- -t "tracks 1V/oct"
        REPEAT=3 task art:one -- moog911    # flake-check: 3 clean runs required
    deps: [dsp:ensure]
    cmds:
      - |
        N="${REPEAT:-1}"
        for r in $(seq 1 "$N"); do
          [ "$N" -gt 1 ] && echo "[art:one] flake-check run $r/$N"
          npm exec -w {{.ART}} -- vitest run --config vitest.config.ts {{.CLI_ARGS}} \
            || { echo "[art:one] FAILED on run $r/$N (flake or real failure)"; exit 1; }
        done

  # ---------------- Visual Regression Tests (Playwright VRT) ----------------
  # Baselines live under e2e/vrt/__screenshots__/ and are LFS-tracked (see
  # .gitattributes). Modeled on the doomviz VRT pattern — same gallery shape,
  # adapted to Playwright + TS. Initially non-blocking in CI (continue-on-error).
  vrt:
    desc: Run the VRT suite (Playwright; compares card screenshots against e2e/vrt/__screenshots__/). Full sweep — INFORMATIONAL lane (includes canvas-driven cards that may flake).
    # dsp:build is required because several module Card.svelte files
    # import `?url`-suffixed WASM artifacts from packages/dsp/dist/
    # (e.g. riotgirls.ts imports drummergirl.wasm?url). Without the
    # bundled DSP on disk Vite's dev server fails the import with a
    # 500 + an HMR overlay, which Playwright detects as a hung page
    # and the suite times out after 30s on every module.
    #
    # test:emit-manifest is required because vrt.spec.ts iterates the
    # registry manifest at file-parse time (e2e/tests/_registry.ts).
    # Without a fresh manifest on disk Playwright throws at test
    # discovery with an actionable error pointing back at this target.
    deps: [dsp:build, test:emit-manifest]
    cmds:
      - npm run vrt -w {{.E2E}} -- {{.CLI_ARGS}}

  vrt:strict:
    desc: Run the deterministic VRT subset (STRICT_VRT_MODULES) — pure knob/fader cards on both platforms, no canvas masks. BLOCKING lane in `task ci`. A flake here is a real flake to fix, not tolerate (per memory `feedback_no_flake_tolerance`).
    # Same deps as `task vrt` — DSP bundle + registry manifest. The
    # filter to STRICT_VRT_MODULES happens inside vrt.spec.ts when
    # VRT_STRICT=1 is set (also narrows testMatch in vrt.config.ts so
    # the auxiliary composite/interactions/skin specs don't run).
    deps: [dsp:build, test:emit-manifest]
    env:
      VRT_STRICT: '1'
    cmds:
      - npm run vrt:strict -w {{.E2E}} -- {{.CLI_ARGS}}

  vrt:update:
    desc: Refresh VRT baselines (e2e/vrt/__screenshots__/**). Inspect the diff and commit.
    deps: [dsp:build, test:emit-manifest]
    cmds:
      - npm run vrt:update -w {{.E2E}} -- {{.CLI_ARGS}}

  vrt:one:
    desc: |
      [local dev-loop] Run ONE VRT scene by grep, 1 worker. Pass a card/module
      grep after `--`. Reuses a long-lived dev server if one is up
      (`task e2e:serve`) — vrt.config has reuseExistingServer:true — else boots
      one for this run. Uses dsp:ensure so Faust-less worktrees still work.
      REPEAT=N adds Playwright --repeat-each=N (the pre-MR flake-check for a
      new/changed VRT scene; REPEAT=3 is the standard).
      Examples:
        task vrt:one -- adsr
        task vrt:one -- --grep "scope"
        HEADED=1 task vrt:one -- adsr
        REPEAT=3 task vrt:one -- adsr    # flake-check: scene rendered 3×
    deps: [dsp:ensure, test:emit-manifest]
    cmds:
      - |
        # Same robust routing as e2e:one (see comments there): a bare word/phrase
        # becomes a convenience --grep; paths + raw flags pass through verbatim.
        eval "set -- {{.CLI_ARGS}}"
        case "${1:-}" in
          '')                 GREP_PREFIX="" ;;
          -*)                 GREP_PREFIX="" ;;
          */*|*.spec.ts|*.ts) GREP_PREFIX="" ;;
          *)                  GREP_PREFIX="--grep" ;;
        esac
        HEADED_FLAG=""; [ "${HEADED:-0}" = "1" ] && HEADED_FLAG="--headed"
        REPEAT_FLAG=""; [ "${REPEAT:-1}" -gt 1 ] && REPEAT_FLAG="--repeat-each=${REPEAT}"
        # `npm run vrt -w` runs from the e2e package dir (so spec paths + the
        # vrt/vrt.config.ts reference resolve) and already passes --config.
        if [ -n "$GREP_PREFIX" ]; then
          npm run vrt -w {{.E2E}} -- --workers=1 $HEADED_FLAG $REPEAT_FLAG --grep "$*"
        else
          npm run vrt -w {{.E2E}} -- --workers=1 $HEADED_FLAG $REPEAT_FLAG "$@"
        fi

  vrt:annotated:
    desc: |
      Generate the NUMBERED card-FACE doc assets for ALL sample modules: a
      numbered leader-line card screenshot → e2e/vrt/__annotated__/{platform}/
      {type}.png (LFS) + number→test-id map → __annotated__/{type}.legend.json.
      The doc page (/docs/modules/[id]) renders the numbered face + a KEY that
      RESOLVES each number to its authored `docs.controls` blob. The face IS the
      asset, not a regression baseline. Then copies the darwin faces into static/
      via docs:faces. Override the set with ANNOTATED_MODULES="adsr,lfo".
    deps: [dsp:build, test:emit-manifest]
    cmds:
      - npm run vrt:annotated -w {{.E2E}} -- {{.CLI_ARGS}}
      - task: docs:faces

  vrt:annotated:one:
    desc: |
      [local dev-loop] Generate ONE module's numbered card face + key by name.
      Reuses a long-lived dev server if up (`task e2e:serve`). REPEAT=N
      flake-checks the generation. Example: task vrt:annotated:one -- adsr
    deps: [dsp:ensure, test:emit-manifest]
    cmds:
      - |
        eval "set -- {{.CLI_ARGS}}"
        REPEAT_FLAG=""; [ "${REPEAT:-1}" -gt 1 ] && REPEAT_FLAG="--repeat-each=${REPEAT}"
        # A bare module name → ANNOTATED_MODULES env (the spec's selector).
        case "${1:-}" in
          ''|-*) ANNOTATED_MODULES="" ;;
          *)     ANNOTATED_MODULES="$1"; shift ;;
        esac
        ANNOTATED_MODULES="$ANNOTATED_MODULES" \
          npm run vrt:annotated -w {{.E2E}} -- --workers=1 $REPEAT_FLAG "$@"

  docs:faces:
    desc: |
      Copy the canonical (darwin) numbered card faces from
      e2e/vrt/__annotated__/darwin/*.png into packages/web/static/docs/
      module-faces/{type}.png so the prerendered doc page can <img src> them.
      Idempotent; a no-op when no card faces exist yet.
    cmds:
      - bash scripts/copy-doc-faces.sh

  docs:accept:
    desc: |
      [accept-loop] Re-pin the module I/O CONTRACT golden (contract-lock.txt) to
      the live registry — the living-docs drift accept loop (the ART/VRT *:update
      analog). Run AFTER an INTENTIONAL contract change, having re-authored the
      affected module's co-located `docs`. ALWAYS review `git diff` of
      contract-lock.txt before committing (it is CODEOWNERS-gated): a diff means a
      module contract changed — accept it, or recognize it as a bug.
    cmds:
      - DOCS_UPDATE=1 npm exec -w {{.WEB}} -- vitest run --config vitest.config.ts contract-lock
      - 'echo "[docs:accept] re-pinned contract-lock.txt — review the git diff before committing"'

  docs:check:
    desc: Run the living-docs drift gate (contract-lock) read-only — the same check CI runs.
    cmds:
      - npm exec -w {{.WEB}} -- vitest run --config vitest.config.ts contract-lock

  vrt:gallery:
    desc: Build the VRT gallery HTML (docs/vrt/) from the latest baselines + last test-results
    cmds:
      - python3 e2e/vrt/build_gallery.py
          --baseline-dir e2e/vrt/__screenshots__
          --results-dir  e2e/vrt/test-results
          --output-dir   docs/vrt

  vrt:changeset:
    desc: |
      Build the per-PR VRT CHANGESET gallery (docs/vrt-changeset/) — only the
      baseline PNGs THIS branch changed vs its base, each as OLD/NEW/DIFF.
      git-diff-driven (works whether or not the new baselines are committed) +
      LFS-aware. Used by the vrt-changeset-gallery.yml workflow to publish a
      CF Pages link + PR comment. Pass extra flags after `--`.
      Examples:
        task vrt:changeset                          # base = merge-base(origin/main, HEAD)
        task vrt:changeset -- --base origin/main --pr 759
    cmds:
      - node scripts/vrt-changeset-gallery.mjs {{.CLI_ARGS}}

  # ---------------- WebGL local-GPU attestation ("semaphore") ----------------
  # CI's only WebGL renderer is SwiftShader and the heavy WebGL e2e lane is
  # disabled on PRs (24-27 min + timeout-prone on software GL). This scheme runs
  # the full WebGL set on THIS machine's REAL GPU and writes a content-hash-named
  # attestation that CI verifies (then skips the heavy lane, trusting the local
  # run). See ci-webgl-attest/README.md +
  # .myrobots/plans/webgl-attestation-semaphore.md.
  webgl:attest:
    desc: |
      [pre-PR, REAL-GPU] Run the FULL WebGL test set on this machine's real GPU
      (NOT SwiftShader) in three passes (heavy / leakers / camera) and, only on
      a fully-green run with matching measured spec counts, write
      ci-webgl-attest/<hash>.json so CI can skip the heavy WebGL lane. Run this
      before opening a PR that touches any WebGL/video path, then commit the
      written file. REPEAT=3 flake-checks. `-- --dry-run` verifies the
      pass-selection/count-gating/writer wiring without the long real-GPU run.
    deps: [dsp:ensure, test:emit-manifest]
    cmds:
      - bash scripts/webgl-attest.sh {{.CLI_ARGS}}

  webgl:attest:check:
    desc: |
      [read-only] Recompute the WebGL content-hash and report whether a matching
      attestation already exists (so you know if a re-attest is needed after a
      pull/rebase). Runs nothing. `-- --list` prints the full hash basis.
    cmds:
      - |
        if [ "{{.CLI_ARGS}}" = "--list" ]; then
          bash scripts/webgl-attest-hash.sh --list
          exit 0
        fi
        HASH="$(bash scripts/webgl-attest-hash.sh)"
        echo "WebGL content hash: $HASH"
        if [ -f "ci-webgl-attest/$HASH.json" ]; then
          echo "✓ A matching attestation exists (ci-webgl-attest/$HASH.json). No re-attest needed."
        else
          echo "✗ No matching attestation. Run: flox activate -- task webgl:attest"
          exit 1
        fi

  webgl:attest:verify:
    desc: '[CI] Recompute the WebGL content-hash + verify a matching real-GPU attestation exists (the webgl-attest CI job runs this).'
    cmds:
      - bash scripts/webgl-attest-verify.sh

  # ---------------- @collab local-relay attestation ("semaphore") ----------------
  # The @collab CI lane (~6.5-8 min) is flaky because the single-process
  # Hocuspocus relay buckles under CI's 10-shard contention (it's informational,
  # un-gated since 2026-06-06). LOCALLY you control the relay: this scheme boots a
  # FRESH dedicated relay + DB with zero contention (where multiplayer actually
  # converges), runs the @collab specs, and writes a content-hash-named
  # attestation that CI verifies cheaply (~2 min). See ci-collab-attest/README.md
  # + .myrobots/plans/collab-attest-2026-06-15.md.
  collab:attest:
    desc: |
      [pre-PR, LOCAL relay+DB] Boot a FRESH dedicated Hocuspocus relay + apply
      the DB schema (requires a local Postgres reachable via $DATABASE_URL — the
      @collab lane is VACUOUS without a DB), pre-flight the DOOM assets, then run
      the @collab/@capacity specs at retries=0. Only on a fully-green run with
      ZERO relay/sync-vacuity skips (a `test.skip(true,'…relay flake…')` firing
      locally means the run proved nothing → treated as FAILURE) does it write
      ci-collab-attest/<hash>.json so CI can verify cheaply. Run this before a PR
      that touches any collab/sync/relay path, then commit the written file.
      REPEAT=3 flake-checks. `-- --dry-run` verifies the DB/relay/skip-classify/
      writer wiring without the long run. Run when the machine is otherwise idle.
    deps: [dsp:ensure, test:emit-manifest]
    cmds:
      - bash scripts/collab-attest.sh {{.CLI_ARGS}}

  collab:attest:check:
    desc: |
      [read-only] Recompute the @collab content-hash and report whether a
      matching attestation already exists (so you know if a re-attest is needed
      after a pull/rebase). Runs nothing. `-- --list` prints the full hash basis.
    cmds:
      - |
        if [ "{{.CLI_ARGS}}" = "--list" ]; then
          bash scripts/collab-attest-hash.sh --list
          exit 0
        fi
        HASH="$(bash scripts/collab-attest-hash.sh)"
        echo "@collab content hash: $HASH"
        if [ -f "ci-collab-attest/$HASH.json" ]; then
          echo "✓ A matching attestation exists (ci-collab-attest/$HASH.json). No re-attest needed."
        else
          echo "✗ No matching attestation. Run: flox activate -- task collab:attest"
          exit 1
        fi

  collab:attest:verify:
    desc: '[CI] Recompute the @collab content-hash + verify a matching local-relay attestation exists (the collab-attest CI job runs this).'
    cmds:
      - bash scripts/collab-attest-verify.sh

  # ---------------- E2E (Playwright) ----------------
  e2e:
    desc: 'Run end-to-end tests (headless Chromium). Pass extra Playwright args after `--` (e.g. `task e2e -- tests/foo.spec.ts`).'
    # io-spec-consistency, modules, and the upcoming per-module spec
    # iterate the registry manifest at file-parse time
    # (e2e/tests/_registry.ts). Refresh it before Playwright discovers
    # specs so a freshly-registered module is auto-enrolled without
    # the contributor having to remember a side-effect command.
    deps: [test:emit-manifest]
    cmds:
      - npm test -w {{.E2E}} -- {{.CLI_ARGS}}

  e2e:serve:
    desc: |
      [local dev-loop] Boot ONE long-lived app server and leave it up, so many
      `task e2e:one` / `task vrt:one` runs reuse it instead of paying the
      ~5-10s server boot every time. Readies the DSP dist (dsp:ensure, Faust-less
      OK) + registry manifest first, then starts the server in the background.
      E2E_PREVIEW=1 serves the prod `vite preview` build (port 4173) instead of
      the dev server (port 5173). Tear down with `task e2e:stop`.
    deps: [dsp:ensure, test:emit-manifest]
    cmds:
      # Build the prod bundle first when serving preview (preview needs a build).
      - |
        if [ "${E2E_PREVIEW:-0}" = "1" ]; then
          echo "[e2e:serve] E2E_PREVIEW=1 → building web for preview"
          npm run build -w {{.WEB}}
        fi
      - bash scripts/dev-server.sh start

  e2e:stop:
    desc: '[local dev-loop] Stop the long-lived server started by e2e:serve (frees the port). E2E_PREVIEW=1 to stop the preview server.'
    cmds:
      - bash scripts/dev-server.sh stop

  e2e:status:
    desc: '[local dev-loop] Report whether the long-lived e2e server is up. E2E_PREVIEW=1 to check the preview server.'
    cmds:
      - bash scripts/dev-server.sh status

  e2e:one:
    desc: |
      [local dev-loop] Run ONE e2e spec/test against the ALREADY-RUNNING server
      (1 worker, line reporter). Fails fast with a hint if no server is up — run
      `task e2e:serve` once first. Pass a spec path and/or `--grep <name>` after
      `--`; a bare word becomes a --grep. HEADED=1 to watch. E2E_PREVIEW=1 to
      target the preview server. REPEAT=N adds Playwright --repeat-each=N — the
      pre-MR flake-check you owe any new/changed e2e test (REPEAT=3 standard).
      Examples:
        task e2e:serve                         # once
        task e2e:one -- tests/ai-smoke.spec.ts
        task e2e:one -- adsr                   # grep
        HEADED=1 task e2e:one -- tests/audio-gate.spec.ts
        REPEAT=3 task e2e:one -- adsr          # flake-check: 3 clean runs required
    deps: [test:emit-manifest]
    cmds:
      # Fail fast (clear message) if the persistent server isn't up — we set
      # E2E_SKIP_WEBSERVER so Playwright won't silently boot its own (which
      # would defeat the reuse-and-go-fast point).
      - bash scripts/dev-server.sh assert-up
      - |
        # go-task preserves the caller's quoting in CLI_ARGS (a multi-word
        # `--grep "a b c"` arrives as `--grep 'a b c'`). `eval set --` re-parses
        # it into "$@" so a quoted grep survives word-splitting.
        eval "set -- {{.CLI_ARGS}}"
        # Arg routing for ergonomics, based on the FIRST token:
        #   - starts with `-`        → raw playwright flags, pass through as-is
        #   - looks like a path/spec → positional file filter (has `/` or .ts)
        #   - otherwise a bare word  → convenience --grep on test titles, and we
        #     keep ALL remaining tokens together so `task e2e:one -- foo bar`
        #     greps the title "foo bar".
        case "${1:-}" in
          '')                 GREP_PREFIX="" ;;
          -*)                 GREP_PREFIX="" ;;
          */*|*.spec.ts|*.ts) GREP_PREFIX="" ;;
          *)                  GREP_PREFIX="--grep" ;;
        esac
        HEADED_FLAG=""; [ "${HEADED:-0}" = "1" ] && HEADED_FLAG="--headed"
        REPEAT_FLAG=""; [ "${REPEAT:-1}" -gt 1 ] && REPEAT_FLAG="--repeat-each=${REPEAT}"
        PORT=5173; [ "${E2E_PREVIEW:-0}" = "1" ] && PORT=4173
        # `npm test -w` runs `playwright test` FROM the e2e package dir so spec
        # paths (tests/foo.spec.ts) resolve against testDir. E2E_SKIP_WEBSERVER
        # tells playwright.config NOT to boot its own server — we reuse the
        # long-lived one (asserted up above), which is the whole speed-up.
        if [ -n "$GREP_PREFIX" ]; then
          E2E_SKIP_WEBSERVER=1 E2E_USE_PREVIEW="${E2E_PREVIEW:-}" \
          E2E_BASE_URL="http://localhost:$PORT" \
            npm test -w {{.E2E}} -- --workers=1 --reporter=list $HEADED_FLAG $REPEAT_FLAG --grep "$*"
        else
          E2E_SKIP_WEBSERVER=1 E2E_USE_PREVIEW="${E2E_PREVIEW:-}" \
          E2E_BASE_URL="http://localhost:$PORT" \
            npm test -w {{.E2E}} -- --workers=1 --reporter=list $HEADED_FLAG $REPEAT_FLAG "$@"
        fi

  e2e:no-collab:
    desc: 'E2E EXCLUDING the @collab multi-context specs (they run in their own non-sharded CI job — the in-memory Hocuspocus relay flakes under shard contention). Used by the sharded CI matrix.'
    deps: [test:emit-manifest]
    cmds:
      - npm exec -w {{.E2E}} -- playwright test --grep-invert '@collab|@capacity' {{.CLI_ARGS}}

  collab:
    desc: 'Run ONLY the @collab multi-context specs on a DEDICATED runner (off the 8-shard matrix). Modest 2-worker parallelism — far below the 8-shard × 4-worker fan-out that hammered the shared relay (the #97 flake) — keeps the DOOM 2-user gate reliable while finishing within the CI time budget (a single serial worker overran 25 min on 41 specs). The Hocuspocus relay is in-memory so this is cheap.'
    deps: [test:emit-manifest]
    cmds:
      - npm exec -w {{.E2E}} -- playwright test --grep '@collab|@capacity' --workers=2 {{.CLI_ARGS}}

  doom-probe:
    desc: |
      MANUAL DOOM-multiplayer visual probe — self-verify MP without driving two
      browsers by hand. Brings up TWO browser contexts on ONE rackspace via the
      in-memory Hocuspocus relay, drives the REAL host->guest flow through the
      ACTUAL UI (real Host-Multiplayer / Launch / Join button clicks, NOT dev
      hooks), and at each phase captures a screenshot of BOTH players' DOOM card
      + canvas plus a state.json (slot/gamestate/host/badge/members/pos/fbSig).
      Writes to /tmp/doom-mp-probe/ (persists across worktree teardown; override
      with DOOM_PROBE_DIR). NOT a pass/fail gate + NOT in the CI / @collab set —
      gated behind DOOM_PROBE=1 (set here). Requires the DOOM WASM + DOOM1.WAD
      assets (bash packages/web/native/build-doom-wasm.sh + fetch the WAD, same
      as ci.yml); skips with a build hint if absent.
        DOOM_PROBE_DIR=<dir>   artifact output dir (default /tmp/doom-mp-probe)
    deps: [test:emit-manifest]
    env:
      DOOM_PROBE: '1'
    cmds:
      - npm exec -w {{.E2E}} -- playwright test tests/doom-mp-probe.spec.ts --workers=1 {{.CLI_ARGS}}

  audio-drift:
    desc: |
      Phase-C decision research harness. Drives two browser contexts on the same
      Yjs rackspace, builds N patches, captures audio from each side, and writes
      drift metrics + a recommendation to art/audio-drift/. Tagged @audio-drift
      so it stays out of CI's PR-gate path. Vars:
        AUDIO_DRIFT_SECONDS=<n>     Recording duration per scenario (default 5).
        E2E_BASE_URL=<url>          Run against a remote target (default local).
        DATABASE_URL=<conn>         Postgres URL for the local Hocuspocus server
                                    (defaults to the Flox-provided dev DB).
    env:
      DATABASE_URL: '{{.DATABASE_URL | default "postgresql://postgres:dev@localhost:54320/patchtogether_dev"}}'
    cmds:
      - npm exec -w {{.E2E}} -- playwright test --config=audio-drift/audio-drift.config.ts

  chaos:run:
    desc: |
      Chaos Stage-1 run. Spawns Chromium, drives Chaos Carl through 200 random
      intents (configurable via CHAOS_ITERATIONS), checks invariants between
      each. On a violation: dumps artifacts to e2e/chaos/findings/<dir>/ and
      fails. Vars:
        CHAOS_SEED=<int>            deterministic seed
        CHAOS_ITERATIONS=<int>      intents per run (default 200)
        CHAOS_MAX_NODES=<int>       per-bot module cap (default 6) — keep low
                                    in shared rackspaces so bots don't flood
                                    the canvas
        CHAOS_RACKSPACE_URL=<url>   join a deployed rackspace via invite link
                                    instead of running solo against '/'. Skips
                                    clearPatch so the bot just shows up and
                                    plays.
        BETA_GATE_PASS=<pw>         beta-gate basic-auth password for
                                    deployed tiers (user is `beta` by
                                    default; matches the server env var).
                                    Example:
                                    BETA_GATE_PASS=$BETA_GATE_PASS \
                                      CHAOS_RACKSPACE_URL='https://autotest.patchtogether.live/r/abc?invite=xyz' \
                                      E2E_BASE_URL=https://autotest.patchtogether.live task chaos:run
    cmds:
      - npm exec -w {{.E2E}} -- playwright test --config=chaos/chaos.config.ts

  ci:smoke:live:
    desc: Live-deploy smoke (set E2E_BASE_URL; defaults to autotest.patchtogether.live). Runs only the @smoke-tagged subset; never blocks the PR gate.
    cmds:
      - 'echo "→ Live smoke against: ${E2E_BASE_URL:-https://autotest.patchtogether.live}"'
      # Use `npm exec -w` rather than a bare `playwright` so the binary
      # resolves via the e2e workspace's node_modules/.bin without depending
      # on shell PATH inheritance — go-task spawns a subshell that doesn't
      # auto-pick up node_modules/.bin (caused exit 127 in CI).
      - E2E_BASE_URL="${E2E_BASE_URL:-https://autotest.patchtogether.live}" npm exec -w {{.E2E}} -- playwright test --grep @smoke

  ci:smoke:prod-build:
    desc: Build the prod bundle, boot `vite preview`, run @smoke specs against it. Catches minification + static-asset regressions before they ship.
    deps: [build]
    env:
      E2E_USE_PREVIEW: '1'
    cmds:
      - npm test -w {{.E2E}} -- --grep @smoke

  e2e:headed:
    desc: Run E2E tests with browser window visible
    cmds:
      - npm test -w {{.E2E}} -- --headed

  e2e:debug:
    desc: Run E2E tests in Playwright Inspector
    cmds:
      - npm test -w {{.E2E}} -- --debug

  e2e:ui:
    desc: Open Playwright UI mode (interactive test runner)
    cmds:
      - npm exec -w {{.E2E}} -- playwright test --ui

  # ---------------- AI agent helpers ----------------
  # These commands emit concise, parseable output suitable for an AI agent
  # to validate "does the app work?" without a human in the loop.
  ai:check:
    desc: AI-friendly smoke check — concise pass/fail across all the things that matter
    cmds:
      - npm run ai:check -w {{.E2E}}

  ai:debug:
    desc: AI-friendly diagnostic — boots the page, captures DOM snapshot + console + screenshot
    cmds:
      - npm run ai:debug -w {{.E2E}}

  # ---------------- CI shape ----------------
  ci:
    desc: Run the full PR-gate suite (typecheck + unit + ART + E2E + VRT-strict)
    # VRT-strict (deterministic knob/fader subset) gates `task ci` so a
    # baseline drift on a pure-CSS card fails locally just as fast as
    # the unit suite. The full `task vrt` sweep (canvas-driven cards
    # that legitimately flake — masked previews, animated chrome) stays
    # informational and runs only in the dedicated CI VRT job.
    cmds:
      - task: typecheck
      - task: test
      - task: art
      - task: e2e
      - task: vrt:strict

  # ---------------- Secret-sync ops ----------------
  sync-secrets:
    desc: |
      Push per-tier secrets to BOTH the Fly relay AND the CF Pages web project
      so INVITE_SECRET (+ Clerk + DATABASE_URL) can never drift out of lockstep
      — drift silently rejects every anonymous invite guest at the WS handshake.
      Reads ~/.config/patchtogether/cf.env. DEFAULTS TO DRY-RUN (names only,
      never echoes values). Pass `--apply` to actually push; prod additionally
      requires `--yes-prod`. Examples:
        task sync-secrets -- dev                 # dry-run
        task sync-secrets -- dev --apply         # push dev to Fly + CF
        task sync-secrets -- prod --apply --yes-prod
    cmds:
      - bash scripts/sync-secrets.sh {{.CLI_ARGS}}

  smoke:anon-handshake:
    desc: |
      Deploy-time guard: mint a REAL anon invite + open a REAL WS handshake to
      the deployed relay (wss://patchtogether-server-<tier>.fly.dev) and assert
      onAuthenticate ACCEPTS — catches INVITE_SECRET drift between the deployed
      web app and relay (the silent "every anon guest rejected" bug). Needs the
      canonical INVITE_SECRET in env (same value sync-secrets pushes to both
      targets); SKIPS cleanly if unset. Tier via TIER env (default autotest).
      Example:
        INVITE_SECRET=$SECRET TIER=dev task smoke:anon-handshake
    cmds:
      - node scripts/anon-handshake-smoke.mjs "${TIER:-autotest}"

  # ---------------- Housekeeping ----------------
  worktree:list:
    desc: Show every git worktree + classification against the cap. Changes nothing.
    cmds:
      - bash scripts/worktree-guard.sh report

  worktree:clean:
    desc: Prune gone worktrees + remove ABANDONED ones (dead agent lock, clean, fully pushed).
    cmds:
      - bash scripts/worktree-guard.sh clean

  worktree:guard:
    desc: |
      Enforce the repo worktree cap (default 10). Auto-removes abandoned worktrees,
      then exits non-zero listing any that still need a human. RUN THIS BEFORE
      creating a new worktree. Override the cap with WORKTREE_CAP=N.
    cmds:
      - bash scripts/worktree-guard.sh enforce

  pr:conflict-sweep:
    desc: |
      After a merge to main, list the open PRs the merge just turned CONFLICTING
      so they get rebased before they rot. Report-only. `-- --mine` for yours.
      See CLAUDE.md "Post-merge conflict sweep".
    cmds:
      - bash scripts/pr-conflict-sweep.sh {{.CLI_ARGS}}

  ci:health:
    desc: Show every open PR + its CI check status + failing test lines.
    cmds:
      - bash scripts/ci-health.sh

  pr:watch:
    desc: |
      Block until a PR's checks resolve, then print failing detail
      (usage: task pr:watch -- <pr#>).
    cmds:
      - bash scripts/ci-health.sh --watch {{.CLI_ARGS}}

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf {{.DSP}}/dist
      - rm -rf {{.WEB}}/.svelte-kit {{.WEB}}/build
      - rm -rf {{.E2E}}/playwright-report {{.E2E}}/test-results
      - rm -rf node_modules/.cache .vite

  clean:deep:
    desc: Nuke node_modules + lockfile (use sparingly)
    prompt: This will delete node_modules and package-lock.json. Continue?
    cmds:
      - rm -rf node_modules packages/*/node_modules art/node_modules e2e/node_modules
      - rm -f package-lock.json
