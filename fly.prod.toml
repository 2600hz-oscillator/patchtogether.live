# fly.prod.toml — Hocuspocus collaboration server, production tier.
#
# Deploy with (from workspace root):
#   flyctl deploy --config fly.prod.toml
#
# Each tier has its own Fly app + secrets so a buggy server change in
# autotest can't hose prod. App names match the Cloudflare project naming.
#
# SINGLE-MACHINE INVARIANT (do not break): the relay holds live Yjs doc
# state + the per-rack connection-slot tracker in process memory (see
# packages/server/src/index.ts). Two machines = two users in one rack can
# split-brain onto separate in-memory docs and never sync. min 1 + no
# autostop/start keeps one warm canonical host; after deploy verify exactly
# one machine exists (`flyctl machines list -a patchtogether-server`).

app = "patchtogether-server"
primary_region = "iad"

[build]
  dockerfile = "packages/server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  # Deploy version surfaced on /health + /metrics (server_version) so a monitor
  # or deploy smoke can confirm WHICH build is live and detect a stale relay by
  # a web↔relay version drift. Keep in step with the app version on release.
  SERVER_VERSION = "1.0.1-prod"
  # Memory-alarm thresholds (MB) driving the 30s [relay-alarm] log line and the
  # Better Stack /metrics body-match monitor. Sized BELOW this tier's 256MB
  # machine so the alarm fires before the OOM-killer — the default 384/480 can
  # NEVER trip on a 256MB box, which is exactly why the prod OOM went unalerted.
  RELAY_MEM_WARN_MB = "200"
  RELAY_MEM_CRIT_MB = "230"
  # NOTE: BETTERSTACK_HEARTBEAT_URL and LOGTAIL_SOURCE_TOKEN are SECRETS — set
  # via `flyctl secrets set -a patchtogether-server ...`, never committed here.

[[services]]
  protocol = "tcp"
  internal_port = 8080
  # Prod stays warm — Yjs doc state is in-memory and we don't want a
  # cold-start eating 5s on the first user every night.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    # The "http" handler also handles WebSocket upgrades.
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    # Per-rackspace cap is 4; soft+hard limits set assuming worst-case
    # all rackspaces are at cap. Bump if active rackspace count grows.
    hard_limit = 200
    soft_limit = 100

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  # HTTP health check on /health (the WS server replies JSON on the same port
  # via the introspection extension). A TCP-only check passes even when the
  # process listens but /health 500s/wedges; this lets Fly RESTART a wedged
  # relay instead of leaving a half-dead host serving nobody.
  [[services.http_checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
