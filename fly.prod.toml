# fly.prod.toml — Hocuspocus collaboration server, production tier.
#
# Deploy with (from workspace root):
#   flyctl deploy --config fly.prod.toml
#
# Each tier has its own Fly app + secrets so a buggy server change in
# autotest can't hose prod. App names match the Cloudflare project naming.

app = "patchtogether-server"
primary_region = "iad"

[build]
  dockerfile = "packages/server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  # SERVER_VERSION surfaces in /health so the AI introspection toolkit can
  # confirm what's actually running. Bump when shipping a meaningful change;
  # not gated by Fly itself, this is a free-form label.
  SERVER_VERSION = "1.0.1-prod"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  # Prod stays warm — Yjs doc state is in-memory and we don't want a
  # cold-start eating 5s on the first user every night.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    # The "http" handler also handles WebSocket upgrades.
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    # Per-rackspace cap is 4; soft+hard limits set assuming worst-case
    # all rackspaces are at cap. Bump if active rackspace count grows.
    hard_limit = 200
    soft_limit = 100

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  # Phase-1 observability: HTTP /health probes the JSON endpoint exposed
  # by packages/server/src/health.ts. TCP check above remains as belt+
  # suspenders (catches "process up but port not listening"); HTTP catches
  # "port up but app deadlocked / health endpoint missing fields."
  [[services.http_checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "15s"
    method = "get"
    path = "/health"
    protocol = "http"
    [services.http_checks.headers]
      Accept = "application/json"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
