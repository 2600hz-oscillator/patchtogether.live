name: ART gallery (GitHub Pages)

# Renders the ART audio-baseline gallery (waveform + spectrogram of every
# art/baselines/**/*.f32 via art/build_gallery.py) and publishes it to GitHub
# Pages alongside the VRT gallery.
#
# Modeled on .github/workflows/vrt-changeset-gallery.yml (LFS-restore + render +
# publish) but the PUBLISH is GitHub Pages — the SAME mechanism the docs/vrt
# gallery uses (upload-pages-artifact + deploy-pages in pages.yml), NOT the CF
# Pages path the per-PR VRT changeset gallery uses.
#
# WHY THIS WORKFLOW REBUILDS THE WHOLE docs/ TREE (not just docs/art):
#   A repo has exactly ONE GitHub Pages site, and each `deploy-pages` publishes
#   its uploaded artifact as the ENTIRE site — there is no partial deploy. If
#   this workflow uploaded only docs/art it would wipe docs/vrt from the live
#   site. So, exactly like pages.yml, it builds the full docs/ tree (VRT gallery +
#   ART gallery + landing page) and deploys it once. pages.yml (VRT-triggered)
#   also builds the ART gallery, so whichever workflow fires, the published site
#   stays complete. The two share the `pages` concurrency group and trigger on
#   DISJOINT path sets (this one owns art/**), so they never double-fire.
#
# LFS: the ART baselines (art/baselines/**/*.f32) + the VRT screenshots are
# git-LFS-tracked. Restore the ART objects via the ci.yml cache pattern
# (actions/cache on .git/lfs keyed by the baseline SHAs + `git lfs pull
# --include`), and pull the VRT screenshots too so the VRT gallery embeds real
# PNG bytes, not the ~130-byte pointer files.

on:
  push:
    branches: [main]
    paths:
      - 'art/baselines/**'
      - 'art/build_gallery.py'
      - '.github/workflows/art-gallery.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Share the single-Pages-site lock with pages.yml so the two deploys serialize
# rather than race. Do NOT cancel in-progress — every deploy should complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + publish ART gallery
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Checkout WITHOUT LFS; restore the LFS object store from cache + a
      # scoped `git lfs pull` below (the ci.yml `art` job pattern), which cuts
      # repeated full-payload LFS downloads.
      - name: Checkout (LFS objects restored from cache below)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install numpy + matplotlib (ART gallery render deps)
        run: python3 -m pip install --upgrade numpy matplotlib

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      # Cache the git-LFS object store keyed on the ART baseline file contents
      # (mirrors the ci.yml `art` job). HIT → `git lfs pull` is a near-no-op.
      - name: Cache git-LFS objects (ART baselines)
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-art-${{ hashFiles('art/baselines/**/*.f32', 'art/baselines/**/*.wav') }}
          restore-keys: |
            ${{ runner.os }}-lfs-art-

      - name: Fetch ART baseline LFS objects (no-op on cache hit)
        run: flox activate -- git lfs pull --include "art/baselines/**"

      # The VRT gallery (built below) needs the screenshot PNGs as REAL bytes or
      # it embeds pointer files that render as broken images.
      - name: Fetch VRT baseline LFS objects
        run: flox activate -- git lfs pull --include "e2e/vrt/__screenshots__/**" || true

      - name: Install deps (npm only — no Playwright browser needed for the page build)
        run: flox activate -- npm install

      - name: Emit the registry manifest (for live parametrized counts)
        continue-on-error: true
        run: flox activate -- task test:emit-manifest

      - name: Build VRT gallery
        run: |
          mkdir -p docs/vrt
          python3 e2e/vrt/build_gallery.py \
            --baseline-dir e2e/vrt/__screenshots__ \
            --output-dir   docs/vrt

      - name: Build ART gallery
        run: |
          mkdir -p docs/art
          python3 art/build_gallery.py \
            --baseline-dir art/baselines \
            --output-dir   docs/art

      - name: Write the docs/ landing page
        run: |
          cat > docs/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>patchtogether.live — test reports</title>
            <style>
              body { margin: 0; background: #1a1a1a; color: #e0e0e0; font-family: 'Courier New', monospace; }
              .banner { display: block; width: 100%; height: auto; }
              .banner-header { margin-bottom: 2rem; }
              .banner-footer { margin-top: 2rem; }
              main { max-width: 900px; margin: 0 auto; padding: 0 20px; text-align: center; }
              h1 { letter-spacing: 2px; }
              ul { list-style: none; padding: 0; line-height: 2.2; font-size: 1.1rem; }
              a { color: #66bbff; }
              .desc { color: #9aa; font-size: .85rem; }
            </style>
          </head>
          <body>
            <img class="banner banner-header" src="assets/header.png" alt="patchtogether.live header banner">
            <main>
              <h1>TEST REPORTS</h1>
              <ul>
                <li><a href="vrt/">VRT gallery</a><br><span class="desc">per-card Playwright screenshot baselines</span></li>
                <li><a href="art/">ART gallery</a><br><span class="desc">per-baseline waveform + spectrogram of every ART audio baseline</span></li>
              </ul>
            </main>
            <img class="banner banner-footer" src="assets/footer.png" alt="patchtogether.live footer banner" loading="lazy">
          </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
