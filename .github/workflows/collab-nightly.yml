# collab-nightly — the daily FULL-@collab backstop, SHARDED so it completes.
#
# WHY this exists: per-PR @collab gating moved to the cheap content-hash VERIFY
# (the `collab-attest` job in ci.yml). The per-PR `collab` job downloads CACHED
# artifacts (WASM + preview bundle), so build-script rot + relay/DB infra drift
# can hide there. This scheduled job runs the FULL real @collab lane on CI every
# day, built FROM SCRATCH, so those surface daily off the PR critical path.
#
# WHY SHARDED (FIX 2026-06-29): run-step timing on the validation run
# (28381443028) showed the inline builds finish in ~3 min but the SERIAL
# @collab lane itself ran 57+ min and was cancelled at the ceiling — i.e. the
# bottleneck is the lane (slow/hanging specs — the heavy COLLAB_JOB=1 DOOM set),
# NOT the worker count or the builds. (--workers=2 was ALSO wrong: the relay is a
# single in-memory process and deadlocks at >1 — the #97 flake.) So: keep
# --workers=1 (serial, no relay deadlock) and SPLIT the lane across 4 parallel
# shard jobs via `--shard=i/4`, each with its OWN relay+DB+ceiling. Each shard
# runs ~1/4 of the specs (~15 min) and fits comfortably under a 30-min FAIL-FAST
# ceiling — so the nightly COMPLETES and REPORTS (green/red per shard + the
# alert) instead of dying as an opaque `cancelled`. A shard that still overruns
# 30 min is a genuinely-hung spec to fix (the `alert` job surfaces it), not a
# ceiling to raise. (Truly fast <10-min coverage + de-flaking the slow specs is
# the deeper task #69; this makes the backstop functional again first.)
#
# DIAGNOSTIC backstop, NOT a per-PR gate: a red shard is a signal to investigate
# (and re-attest after a fix), not a merge blocker.
#
# Dispatch manually any time:  gh workflow run collab-nightly.yml --ref <branch>
name: collab-nightly

on:
  schedule:
    # 09:00 UTC daily (off-peak; clear of typical PR-CI bursts).
    - cron: '0 9 * * *'
  workflow_dispatch: {}

# Never let two nightly runs (or a nightly + a manual re-dispatch) collide.
concurrency:
  group: collab-nightly
  cancel-in-progress: false

permissions:
  contents: read
  # The `alert` job opens a GH issue when any shard fails — that issue creation
  # emails repo watchers (incl. tmayshark@gmail.com), mirroring live-smoke-alert.
  # Without it the lane rotted red for days UNALERTED (the gap this closes).
  issues: write

jobs:
  collab-shard:
    name: collab-nightly (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    # FAIL-FAST ceiling per shard: ~1/4 of the serial lane (~15 min) + inline
    # builds (~3 min, cached) + setup. A shard that hits 30 min has a genuinely
    # hung spec — fix it (the alert surfaces which), don't raise this.
    timeout-minutes: 30
    strategy:
      # One slow/red shard must NOT cancel the others — we want the full picture.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    services:
      postgres:
        # AWS ECR Public mirror — avoids the flaky Docker Hub service-container
        # pull (same image the ci.yml collab/unit jobs use).
        image: public.ecr.aws/docker/library/postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: patchtogether_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/patchtogether_test
      # Opt the COLLAB_JOB-gated @collab DOOM specs IN (same as the ci.yml collab
      # job) — they are the heavy specs this nightly exists to exercise.
      COLLAB_JOB: '1'
      # Run @collab against `vite preview` (built bundle), not the dev server —
      # kills the HMR-reload flake class (#232/#225). Requires a web build below.
      E2E_USE_PREVIEW: '1'

    steps:
      - name: Checkout (lfs for the SM64 bundle the preview build bakes in)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      - name: Install workspace deps + Playwright Chromium
        run: flox activate -- task setup

      - name: Apply DB schema
        run: flox activate -- psql "$DATABASE_URL" -f db/schema/001_init.sql

      # --- Build artifacts inline (this workflow is off the ci.yml job graph) ---

      - name: Build DSP worklets (Faust + esbuild)
        run: flox activate -- task dsp:build

      - name: Cache DOOM WASM artifact
        id: cache-doom-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/doom/doom.js
            packages/web/static/doom/doom.wasm
          key: ${{ runner.os }}-doom-wasm-${{ hashFiles('packages/web/native/build-doom-wasm.sh', 'packages/web/native/doomgeneric/**') }}

      - name: Build DOOM WASM (emcc)
        if: steps.cache-doom-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-doom-wasm.sh

      - name: Cache SNES9X WASM artifact
        id: cache-snes9x-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/snes9x/snes9x.js
            packages/web/static/snes9x/snes9x.wasm
          key: ${{ runner.os }}-snes9x-wasm-${{ hashFiles('packages/web/native/build-snes9x-wasm.sh', 'packages/web/native/snes9x/**') }}

      - name: Build SNES9X WASM (emcc)
        if: steps.cache-snes9x-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-snes9x-wasm.sh

      - name: Cache DOOM1.WAD (shareware)
        id: cache-doom-wad
        uses: actions/cache@v4
        with:
          path: packages/web/static/doom/DOOM1.WAD
          key: doom-wad-shareware-v1

      - name: Download DOOM1.WAD (shareware)
        if: steps.cache-doom-wad.outputs.cache-hit != 'true'
        run: |
          curl -L --fail --silent --show-error \
            -o packages/web/static/doom/DOOM1.WAD \
            https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad
          echo "5b2e249b9c5133ec987b3ea77596381dc0d6bc1d  packages/web/static/doom/DOOM1.WAD" \
            | shasum -a 1 -c -

      - name: Emit registry manifest for E2E
        run: flox activate -- task test:emit-manifest

      - name: Build web (preview bundle, test hooks enabled)
        run: flox activate -- task build:web

      # --- One shard of the full real @collab lane (serial within the shard) ---
      # Same grep + --workers=1 as the ci.yml `collab` job; `--shard=i/4` runs
      # only this shard's quarter of the spec list, so the shard fits the ceiling.
      # --workers=1 keeps the single-process relay from deadlocking (#97).
      - name: Run @collab lane (shard ${{ matrix.shard }}/4, serial, html report)
        env:
          PLAYWRIGHT_HTML_OPEN: never
        run: |
          flox activate -- npx --workspace e2e playwright test \
            --grep "@collab|@capacity" \
            --shard=${{ matrix.shard }}/4 \
            --workers=1 \
            --reporter=list,html

      - name: Upload Playwright HTML report (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collab-nightly-playwright-report-${{ matrix.shard }}
          path: e2e/playwright-report
          retention-days: 30

      - name: Upload Playwright test-results on failure (shard ${{ matrix.shard }})
        # `failure() || cancelled()`: a per-shard timeout-ceiling kill can register
        # as `cancelled`, NOT `failure` — upload on both so a hung shard still
        # leaves diagnostics.
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: collab-nightly-test-results-${{ matrix.shard }}
          path: e2e/test-results
          retention-days: 14

  # --- Failure notification ------------------------------------------------
  # Runs after ALL shards. `if: failure()` fires when ANY shard failed (or was
  # ceiling-cancelled). Opens/refreshes a single GH issue (emails repo watchers),
  # so a red OR hung nightly surfaces the same day instead of rotting unalerted.
  alert:
    name: collab-nightly alert (any shard failed)
    runs-on: ubuntu-latest
    needs: collab-shard
    if: failure()
    steps:
      - name: Alert on nightly failure (open/refresh a GH issue)
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const label = 'collab-nightly-failure';
            const dateUtc = new Date().toISOString().slice(0, 10);
            const body = [
              '**collab-nightly: one or more shards failed (or hit the per-shard ceiling).**',
              '',
              'Daily FULL-@collab backstop (`--grep @collab|@capacity`, `--workers=1`,',
              'sharded `--shard=i/4`). A red shard is a SIGNAL to investigate a',
              'multiplayer/relay regression + re-attest — it is not a per-PR merge',
              'blocker, but it must not rot unalerted.',
              '',
              `**Run:** ${runUrl}`,
              `**SHA:** ${context.sha}`,
              '',
              'Diagnostics: download the per-shard `collab-nightly-test-results-<n>` +',
              '`collab-nightly-playwright-report-<n>` artifacts from the run above',
              '(read `error-context.md` / `trace.zip` — do NOT `gh run view --log-failed`).',
              '',
              'Close this issue once the nightly is green again; it is reused (not',
              're-opened) on subsequent failures while it stays open.',
            ].join('\n');
            // Reuse an already-open failure issue so consecutive red nights don't
            // spam a new issue each time — just add a dated comment.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });
            if (existing.data.length > 0) {
              const num = existing.data[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body: `Still failing (${dateUtc}). Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[collab-nightly] @collab shard(s) failing (${dateUtc})`,
                body,
                labels: ['observability', 'alert', label],
              });
            }
