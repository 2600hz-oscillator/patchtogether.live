# collab-nightly — the UNDER-LOAD backstop for the @collab attestation scheme.
#
# WHY this exists: per-PR @collab gating moved to the cheap content-hash VERIFY
# (the `collab-attest` job in ci.yml), which trusts a local FRESH-dedicated-relay
# run. That keeps the per-PR path fast (~2 min verify vs ~6.5-8 min real lane),
# but the per-PR `collab` job downloads CACHED artifacts (WASM + preview bundle),
# so build-script rot + relay/DB infra drift can hide there. This scheduled job
# runs the FULL real @collab lane (SERIAL, --workers=1) on CI every day, built
# FROM SCRATCH, so those surface daily off the PR critical path. NOTE: this is
# NOT an under-load/contention canary — the relay is a single in-memory process
# and deadlocks at >1 worker (the #97 flake), so genuine concurrency coverage
# needs a concurrency-capable relay (deferred, task #160), not this lane.
#
# It is a DIAGNOSTIC backstop, NOT a per-PR gate: a red run here is a signal to
# investigate (and re-attest after a fix), not a merge blocker. It mirrors the
# ci.yml `collab` job's setup (DB + DOOM/SNES/WAD assets + DSP + preview bundle),
# but is self-contained (builds its own artifacts inline) since it runs off the
# ci.yml job graph.
#
# Dispatch manually any time:  gh workflow run collab-nightly.yml --ref <branch>
name: collab-nightly

on:
  schedule:
    # 09:00 UTC daily (off-peak; well clear of typical PR-CI bursts so the
    # full @collab lane isn't itself contending with PR runs).
    - cron: '0 9 * * *'
  workflow_dispatch: {}

# Never let two nightly runs (or a nightly + a manual re-dispatch) collide on the
# shared relay assumptions.
concurrency:
  group: collab-nightly
  cancel-in-progress: false

permissions:
  contents: read
  # The failure-notification step (below) opens a GH issue when a nightly run
  # goes red or is killed by the timeout ceiling — that issue creation emails
  # repo watchers (incl. tmayshark@gmail.com), mirroring live-smoke-alert.yml.
  # Without this the lane rotted red for 5 days UNALERTED (the gap this fixes).
  issues: write

jobs:
  collab-full:
    name: collab-nightly (full @collab lane, under load)
    runs-on: ubuntu-latest
    # timeout-minutes 90 → 60 + --workers=2 → 1 (FIX 2026-06-29): the lane ran
    # --workers=2 as an "under-load contention" canary, but the relay is a
    # SINGLE in-memory process — two multi-context specs hitting it at once
    # DEADLOCK (the #97 contention flake). Each then burns its full extended
    # per-test timeout (120s; DOOM up to 180s, granted by de-flake #844) × the
    # retry, so the suite blew past the ceiling: EVERY nightly 06-18 → 06-29 was
    # KILLED at 90 min (`cancelled`, NO useful signal) — a dead backstop for ~12
    # days. The per-PR `collab` job in ci.yml hit this exact wall and settled on
    # --workers=1 (fully serial), which runs the whole lane reliably in
    # ~7-17 min; we now match it (see the test step below). Real UNDER-LOAD
    # contention coverage is not achievable against a single-process relay
    # without deadlock — that needs a concurrency-capable relay (deferred; see
    # task #160 / relay infra), not a bigger number here. 60 min is a FAIL-FAST
    # ceiling (a serial run that hits it is genuinely broken — shard or drop a
    # slow spec, don't raise this) with headroom over the realistic ~25-40 min
    # (serial lane + inline DOOM/SNES WASM + preview build).
    timeout-minutes: 60

    services:
      postgres:
        # AWS ECR Public mirror — avoids the flaky Docker Hub service-container
        # pull (same image the ci.yml collab/unit jobs use).
        image: public.ecr.aws/docker/library/postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: patchtogether_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/patchtogether_test
      # Opt the COLLAB_JOB-gated @collab DOOM specs back IN (same as the ci.yml
      # collab job): RUN here (serial-ish, reliable), skipped in the sharded
      # matrix.
      COLLAB_JOB: '1'
      # Run @collab against `vite preview` (built bundle), not the dev server —
      # kills the HMR-reload flake class (#232/#225). Requires a web build below.
      E2E_USE_PREVIEW: '1'

    steps:
      - name: Checkout (lfs for the SM64 bundle the preview build bakes in)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      - name: Install workspace deps + Playwright Chromium
        run: flox activate -- task setup

      - name: Apply DB schema
        run: flox activate -- psql "$DATABASE_URL" -f db/schema/001_init.sql

      # --- Build artifacts inline (this workflow is off the ci.yml job graph) ---

      - name: Build DSP worklets (Faust + esbuild)
        run: flox activate -- task dsp:build

      - name: Cache DOOM WASM artifact
        id: cache-doom-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/doom/doom.js
            packages/web/static/doom/doom.wasm
          key: ${{ runner.os }}-doom-wasm-${{ hashFiles('packages/web/native/build-doom-wasm.sh', 'packages/web/native/doomgeneric/**') }}

      - name: Build DOOM WASM (emcc)
        if: steps.cache-doom-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-doom-wasm.sh

      - name: Cache SNES9X WASM artifact
        id: cache-snes9x-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/snes9x/snes9x.js
            packages/web/static/snes9x/snes9x.wasm
          key: ${{ runner.os }}-snes9x-wasm-${{ hashFiles('packages/web/native/build-snes9x-wasm.sh', 'packages/web/native/snes9x/**') }}

      - name: Build SNES9X WASM (emcc)
        if: steps.cache-snes9x-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-snes9x-wasm.sh

      - name: Cache DOOM1.WAD (shareware)
        id: cache-doom-wad
        uses: actions/cache@v4
        with:
          path: packages/web/static/doom/DOOM1.WAD
          key: doom-wad-shareware-v1

      - name: Download DOOM1.WAD (shareware)
        if: steps.cache-doom-wad.outputs.cache-hit != 'true'
        run: |
          curl -L --fail --silent --show-error \
            -o packages/web/static/doom/DOOM1.WAD \
            https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad
          echo "5b2e249b9c5133ec987b3ea77596381dc0d6bc1d  packages/web/static/doom/DOOM1.WAD" \
            | shasum -a 1 -c -

      - name: Emit registry manifest for E2E
        run: flox activate -- task test:emit-manifest

      - name: Build web (preview bundle, test hooks enabled)
        run: flox activate -- task build:web

      # --- The full real @collab lane (daily fresh-build canary) ---
      # Mirrors the ci.yml `collab` JOB exactly: same grep, --workers=1 (SERIAL —
      # the single-process relay deadlocks at >1, see the timeout note above),
      # same DATABASE_URL + COLLAB_JOB + E2E_USE_PREVIEW + retries=1 transient-net.
      # html reporter so the run is as inspectable as the per-PR collab lane.
      # The DISTINCT daily value vs the per-PR job: this builds DOOM/SNES WASM +
      # the preview bundle FROM SCRATCH (the per-PR job downloads cached
      # artifacts), so build-script rot and relay/DB infra drift surface here
      # daily, off the PR critical path.
      - name: Run full @collab lane (serial, html report)
        env:
          PLAYWRIGHT_HTML_OPEN: never
        run: |
          flox activate -- npx --workspace e2e playwright test \
            --grep "@collab|@capacity" \
            --workers=1 \
            --reporter=list,html

      - name: Upload Playwright HTML report (collab-nightly)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collab-nightly-playwright-report
          path: e2e/playwright-report
          retention-days: 30

      - name: Upload Playwright test-results on failure (collab-nightly)
        # `failure() || cancelled()`: a timeout-ceiling kill registers as
        # `cancelled`, NOT `failure`, so a bare `if: failure()` skipped this on
        # the 60-min-overrun run (27903306267) and left ZERO diagnostics for the
        # one run that actually exercised the post-#844 lane. Upload on both.
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: collab-nightly-test-results
          path: e2e/test-results
          retention-days: 14

      # --- Failure notification (the alerting gap this PR closes) -------------
      # The nightly had NO failure alert: it rotted red 06-16 → 06-20 (5 days)
      # with nobody paged. Mirror live-smoke-alert.yml's mechanism — open a GH
      # issue, which emails repo watchers (incl. tmayshark@gmail.com) — so a red
      # OR timeout-cancelled nightly surfaces the same day instead of silently
      # rotting. No new secret needed (uses the workflow GITHUB_TOKEN +
      # `issues: write` above). Dedupe: reuse an OPEN issue with the
      # `collab-nightly-failure` label instead of opening a fresh one each night.
      - name: Alert on nightly failure (open/refresh a GH issue)
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const label = 'collab-nightly-failure';
            const dateUtc = new Date().toISOString().slice(0, 10);
            const body = [
              '**collab-nightly went red (or was killed by the timeout ceiling).**',
              '',
              'This is the UNDER-LOAD multiplayer backstop (`--grep @collab|@capacity`,',
              '`--workers=2`, contended single-process relay). A red run is a SIGNAL to',
              'investigate a contention regression + re-attest — it is not a per-PR merge',
              'blocker, but it must not rot unalerted (it did for 5 days, 06-16 → 06-20).',
              '',
              `**Run:** ${runUrl}`,
              `**SHA:** ${context.sha}`,
              '',
              'Diagnostics: download the `collab-nightly-test-results` + ',
              '`collab-nightly-playwright-report` artifacts from the run above',
              '(read `error-context.md` / `trace.zip` — do NOT `gh run view --log-failed`).',
              '',
              'Close this issue once the nightly is green again; it will be reused (not',
              're-opened) on subsequent failures while it stays open.',
            ].join('\n');
            // Reuse an already-open failure issue so consecutive red nights don't
            // spam a new issue each time — just add a dated comment.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });
            if (existing.data.length > 0) {
              const num = existing.data[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body: `Still red (${dateUtc}). Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[collab-nightly] under-load @collab lane failing (${dateUtc})`,
                body,
                labels: ['observability', 'alert', label],
              });
            }
