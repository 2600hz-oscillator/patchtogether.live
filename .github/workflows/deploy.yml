name: Deploy

# Deployment topology (per phase-2-deploy.md):
#
#   prod      ←  push to main          → patchtogether.live
#   preview   ←  PR open / push to PR  → pr-<N>.patchtogether-live.pages.dev   (per-PR isolated)
#   autotest  ←  manual dispatch       → autotest.patchtogether.live           (any branch w/ green CI)
#   dev       ←  manual dispatch       → dev.patchtogether.live                (any branch w/ green CI)
#
# Why manual for autotest + dev? Both are SHARED named URLs — automatic deploys
# on every PR push would have multiple PRs flipping the live state. The per-PR
# preview URL covers "let me look at this PR's deploy" without collisions; the
# named envs are explicitly claimed by a human via the Actions UI for
# longer-form dogfooding / agent testing.
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN  — Pages-deploy-scoped token
#   CLOUDFLARE_ACCOUNT_ID — your CF account id
#
# The three Cloudflare Pages projects must be created beforehand (UI or
# `wrangler pages project create` from inside the flox env).

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      target:
        description: 'Named environment(s) to claim with this branch'
        required: true
        type: choice
        options:
          - autotest
          - dev
          - autotest+dev

# Concurrency: each ref+target pair gets its own lane. Dispatches against the
# same ref + same env cancel the in-flight run; PR pushes cancel stale previews.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.target || github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (DSP + web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: flox/install-flox-action@v2

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install workspace deps
        run: flox activate -- task install

      - name: Build DSP + web
        run: flox activate -- task build

      - name: Upload build artifact
        # Upload the whole .svelte-kit/ tree, not just .svelte-kit/cloudflare.
        # adapter-cloudflare's _worker.js imports `../output/server/index.js`
        # and `../cloudflare-tmp/manifest.js` — wrangler needs both visible
        # (sibling to the cloudflare/ dir) when it bundles the worker.
        # include-hidden-files is required because .svelte-kit/ starts with a
        # dot; upload-artifact treats anything under a dotted dir as hidden.
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deploy
          path: packages/web/.svelte-kit
          include-hidden-files: true
          retention-days: 7

  # Manual deploys (autotest / dev) require the latest CI run on the chosen
  # branch to be green. Prevents shipping broken code by accident from the
  # Actions UI. Skipped for `push` and `pull_request` events.
  verify-ci:
    name: Verify CI passed for this branch
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check latest CI run for ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Looking up latest CI run for branch: $BRANCH"
          STATUS=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "$BRANCH" \
            --workflow CI \
            --limit 1 \
            --json conclusion,headSha \
            --jq '.[0].conclusion' || echo "missing")
          echo "Latest CI conclusion: $STATUS"
          if [[ "$STATUS" != "success" ]]; then
            echo "::error::Refusing to deploy: latest CI run on '$BRANCH' is '$STATUS' (must be 'success')."
            exit 1
          fi

  # ---------------- Production: auto on merge to main ----------------

  deploy-prod:
    name: Deploy → patchtogether.live (production)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cloudflare-deploy
          path: dist
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/cloudflare --project-name=patchtogether-live --branch=main

  # ---------------- PR previews: auto on PR events ----------------

  deploy-preview:
    name: Deploy → PR-${{ github.event.pull_request.number }} preview
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cloudflare-deploy
          path: dist
      - id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # `--branch=pr-N` creates a Pages preview alias keyed off the PR
          # number; URL is `pr-N.patchtogether-live.pages.dev`. Each PR has
          # its own URL — never collides with main or with other PRs.
          command: pages deploy dist/cloudflare --project-name=patchtogether-live --branch=pr-${{ github.event.pull_request.number }}

  # ---------------- Manual: autotest / dev ----------------

  deploy-autotest:
    name: Deploy → autotest.patchtogether.live (autotest)
    needs: [build, verify-ci]
    if: github.event_name == 'workflow_dispatch' && contains(github.event.inputs.target, 'autotest')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cloudflare-deploy
          path: dist
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/cloudflare --project-name=patchtogether-live-autotest --branch=main

  deploy-dev:
    name: Deploy → dev.patchtogether.live (dev)
    needs: [build, verify-ci]
    if: github.event_name == 'workflow_dispatch' && contains(github.event.inputs.target, 'dev')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cloudflare-deploy
          path: dist
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/cloudflare --project-name=patchtogether-live-dev --branch=dev

  # ---------------- Live smoke ----------------
  # Runs after either an autotest deploy (manual) or a prod deploy (auto on
  # main). For prod, smoke still hits autotest because that's the env we
  # designate for chaotic / scheduled testing — but a prod merge means the
  # next autotest claim is the way to verify the live build there too.

  smoke-live:
    name: Live smoke — autotest.patchtogether.live
    needs: deploy-autotest
    if: needs.deploy-autotest.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      E2E_BASE_URL: https://autotest.patchtogether.live
    steps:
      - uses: actions/checkout@v4

      - uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}

      - name: Install + browsers
        run: flox activate -- task setup

      - name: Live smoke
        run: flox activate -- task ci:smoke:live

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-report
          path: e2e/playwright-report
          retention-days: 14
