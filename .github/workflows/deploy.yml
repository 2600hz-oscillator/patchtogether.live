name: Deploy

# Deployment topology (per phase-2-deploy.md):
#
#   prod      ←  push to main          → patchtogether.live
#   preview   ←  PR open / push to PR  → pr-<N>.patchtogether-live.pages.dev   (per-PR isolated)
#   autotest  ←  manual dispatch       → autotest.patchtogether.live           (any branch w/ green CI)
#   dev       ←  manual dispatch       → dev.patchtogether.live                (any branch w/ green CI)
#
# Why manual for autotest + dev? Both are SHARED named URLs — automatic deploys
# on every PR push would have multiple PRs flipping the live state. The per-PR
# preview URL covers "let me look at this PR's deploy" without collisions; the
# named envs are explicitly claimed by a human via the Actions UI for
# longer-form dogfooding / agent testing.
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN  — Pages-deploy-scoped token
#   CLOUDFLARE_ACCOUNT_ID — your CF account id
#
# The three Cloudflare Pages projects must be created beforehand (UI or
# `wrangler pages project create` from inside the flox env).
#
# Why each deploy job is self-contained (no shared build artifact):
# wrangler's `pages deploy` re-bundles _worker.js with esbuild, so it needs
# both the .svelte-kit/ build output AND the project's node_modules visible
# in the same working tree. Passing only .svelte-kit/ as an artifact dropped
# node_modules; uploading both is huge (~200 MB). Easier and only ~30 s
# slower per deploy: install + build inline. npm cache makes repeat installs
# quick, so the extra cost is just a build.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      target:
        description: 'Named environment(s) to claim with this branch'
        required: true
        type: choice
        options:
          - autotest
          - dev
          - autotest+dev

# Concurrency: each ref+target pair gets its own lane. Dispatches against the
# same ref + same env cancel the in-flight run; PR pushes cancel stale previews.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.target || github.event_name }}
  cancel-in-progress: true

jobs:
  # Manual deploys (autotest / dev) require the latest CI run on the chosen
  # branch to be green. Prevents shipping broken code by accident from the
  # Actions UI. Skipped for `push` and `pull_request` events.
  verify-ci:
    name: Verify CI passed for this branch
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check latest CI run for ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Looking up latest CI run for branch: $BRANCH"
          STATUS=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "$BRANCH" \
            --workflow CI \
            --limit 1 \
            --json conclusion,headSha \
            --jq '.[0].conclusion' || echo "missing")
          echo "Latest CI conclusion: $STATUS"
          if [[ "$STATUS" != "success" ]]; then
            echo "::error::Refusing to deploy: latest CI run on '$BRANCH' is '$STATUS' (must be 'success')."
            exit 1
          fi

  # ---------------- Production: auto on merge to main ----------------

  deploy-prod:
    name: Deploy → patchtogether.live (production)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: flox/install-flox-action@v2
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      - run: flox activate -- task install
      - run: flox activate -- task build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          command: pages deploy .svelte-kit/cloudflare --project-name=patchtogether-live --branch=main

  # ---------------- PR previews: auto on PR events ----------------

  deploy-preview:
    name: Deploy → PR-${{ github.event.pull_request.number }} preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: flox/install-flox-action@v2
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      - run: flox activate -- task install
      - run: flox activate -- task build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          # PR previews deploy to the AUTOTEST project (not prod), so they
          # inherit the test-instance Clerk env vars and full auth flow
          # works. The prod project has no Clerk env until launch — putting
          # PR previews there would break their auth too. URL becomes
          # `pr-N.patchtogether-live-autotest.pages.dev`.
          command: pages deploy .svelte-kit/cloudflare --project-name=patchtogether-live-autotest --branch=pr-${{ github.event.pull_request.number }}

  # ---------------- Manual: autotest / dev ----------------

  deploy-autotest:
    name: Deploy → autotest.patchtogether.live (autotest)
    needs: verify-ci
    if: github.event_name == 'workflow_dispatch' && contains(github.event.inputs.target, 'autotest')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: flox/install-flox-action@v2
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      - run: flox activate -- task install
      - run: flox activate -- task build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          command: pages deploy .svelte-kit/cloudflare --project-name=patchtogether-live-autotest --branch=main

  deploy-dev:
    name: Deploy → dev.patchtogether.live (dev)
    needs: verify-ci
    if: github.event_name == 'workflow_dispatch' && contains(github.event.inputs.target, 'dev')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: flox/install-flox-action@v2
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      - run: flox activate -- task install
      - run: flox activate -- task build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          command: pages deploy .svelte-kit/cloudflare --project-name=patchtogether-live-dev --branch=dev

  # ---------------- Live smoke ----------------
  # Runs after a successful autotest deploy (manual). Hits the live URL with
  # the @smoke-tagged subset of e2e/.

  smoke-live:
    name: Live smoke — autotest.patchtogether.live
    needs: deploy-autotest
    if: needs.deploy-autotest.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      E2E_BASE_URL: https://autotest.patchtogether.live
    steps:
      - uses: actions/checkout@v4
      - uses: flox/install-flox-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
      - run: flox activate -- task setup
      - run: flox activate -- task ci:smoke:live
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-report
          path: e2e/playwright-report
          retention-days: 14
