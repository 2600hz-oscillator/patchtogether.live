name: Deploy

# Deployment topology:
#
#   preview   ←  PR open / push to PR    → pr-<N>.patchtogether-live-autotest.pages.dev
#   autotest  ←  push to main            → autotest.patchtogether.live
#   dev       ←  push to main            → dev.patchtogether.live
#   prod      ←  version bump on main    → patchtogether.live
#                (`package.json:.version` changed vs HEAD~1)
#   any tier  ←  workflow_dispatch       → escape hatch for manual deploys
#
# Why this shape?
# - PR previews keep the existing per-PR isolated URL on the autotest project
#   so test Clerk env + Hocuspocus stub still work for review.
# - Every merge to main fans out to autotest + dev so both stay in sync with
#   what's about to ship — these are the dog-food / agent-testing surfaces.
# - Prod is gated by an explicit version bump (PR that bumps `package.json:.version`)
#   so accidental prod deploys aren't possible from a routine merge.
# - workflow_dispatch keeps any tier reachable manually if something goes sideways.
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN  — Pages-deploy-scoped token
#   CLOUDFLARE_ACCOUNT_ID — CF account id
#
# Why each deploy job is self-contained (no shared build artifact):
# wrangler's `pages deploy` re-bundles _worker.js with esbuild, so it needs
# both the .svelte-kit/ build output AND the project's node_modules visible
# in the same working tree. Passing only .svelte-kit/ as an artifact dropped
# node_modules; uploading both is huge (~200 MB). Easier and only ~30 s
# slower per deploy: install + build inline. npm cache makes repeat installs
# quick, so the extra cost is just a build.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      target:
        description: 'Named environment to claim with this branch'
        required: true
        type: choice
        options:
          - autotest
          - dev
          - prod
          - autotest+dev

# Concurrency: each ref+target pair gets its own lane. Dispatches against the
# same ref + same env cancel the in-flight run; PR pushes cancel stale previews.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.target || github.event_name }}
  cancel-in-progress: true

jobs:
  # Manual deploys require the latest CI run on the chosen branch to be green.
  # Prevents shipping broken code by accident from the Actions UI.
  verify-ci:
    name: Verify CI passed for this branch
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check latest CI run for ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Looking up latest CI run for branch: $BRANCH"
          STATUS=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "$BRANCH" \
            --workflow CI \
            --limit 1 \
            --json conclusion,headSha \
            --jq '.[0].conclusion' || echo "missing")
          echo "Latest CI conclusion: $STATUS"
          if [[ "$STATUS" != "success" ]]; then
            echo "::error::Refusing to deploy: latest CI run on '$BRANCH' is '$STATUS' (must be 'success')."
            exit 1
          fi

  # Detect whether this main-push bumped `package.json:.version`. Other jobs
  # gate on the output. Skipped for non-push events; outputs default to false.
  detect-version-bump:
    name: Detect version bump on main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.diff.outputs.bumped }}
      version: ${{ steps.diff.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: diff
        run: |
          CUR=$(jq -r .version package.json)
          # HEAD~1 is the merge parent (or the prior main commit). If it's a
          # genesis push and HEAD~1 doesn't exist, treat as not-bumped.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREV=$(git show HEAD~1:package.json | jq -r .version 2>/dev/null || echo "0.0.0")
          else
            PREV="$CUR"
          fi
          echo "previous: $PREV"
          echo "current:  $CUR"
          if [[ "$PREV" != "$CUR" ]]; then
            echo "bumped=true"  >> "$GITHUB_OUTPUT"
            echo "version=$CUR" >> "$GITHUB_OUTPUT"
            echo "::notice::Version bumped $PREV → $CUR; prod deploy will fire."
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "version=$CUR" >> "$GITHUB_OUTPUT"
            echo "::notice::No version change ($CUR); prod deploy skipped."
          fi

  # ---------------- Production: gated on version bump ----------------

  deploy-prod:
    name: Deploy → patchtogether.live (production)
    needs: [detect-version-bump, verify-ci]
    # `always()` runs the if-check even when needed jobs are skipped (the
    # detect-version-bump job is skipped on workflow_dispatch, verify-ci is
    # skipped on push). The body picks the right path per event.
    if: |
      always()
      && (
        (github.event_name == 'push'
          && github.ref == 'refs/heads/main'
          && needs.detect-version-bump.outputs.bumped == 'true')
        || (github.event_name == 'workflow_dispatch'
          && needs.verify-ci.result == 'success'
          && contains(github.event.inputs.target, 'prod'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: flox/install-flox-action@v2
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      # DOOM WASM blob — needed at build-time so SvelteKit's static-asset
      # pipeline copies it into the deployed bundle. Same cache key as the
      # CI workflow's `ci` + `vrt` jobs, so the first job to populate the
      # cache on a given source-tree hash benefits every other workflow
      # within the cache TTL.
      - name: Cache DOOM WASM artifact
        id: cache-doom-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/doom/doom.js
            packages/web/static/doom/doom.wasm
          key: ${{ runner.os }}-doom-wasm-${{ hashFiles('packages/web/native/build-doom-wasm.sh', 'packages/web/native/doomgeneric/**') }}
      - name: Build DOOM WASM (emcc)
        if: steps.cache-doom-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-doom-wasm.sh
      # DOOM1.WAD — shareware game data, fetched from a stable mirror and
      # cached forever (~4 MB, never changes; key is bumped if we ever
      # swap source). Without this the deployed bundle 404s on
      # /doom/DOOM1.WAD and the card shows "WAD missing — see
      # DOWNLOAD_INSTRUCTIONS.md".
      - name: Cache DOOM1.WAD (shareware)
        id: cache-doom-wad
        uses: actions/cache@v4
        with:
          path: packages/web/static/doom/DOOM1.WAD
          key: doom-wad-shareware-v1
      - name: Download DOOM1.WAD (shareware)
        if: steps.cache-doom-wad.outputs.cache-hit != 'true'
        run: |
          curl -L --fail --silent --show-error \
            -o packages/web/static/doom/DOOM1.WAD \
            https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad
          echo "5b2e249b9c5133ec987b3ea77596381dc0d6bc1d  packages/web/static/doom/DOOM1.WAD" \
            | shasum -a 1 -c -
      - run: flox activate -- task install
      - run: flox activate -- task build
        env:
          # VITE_* vars are baked into the client bundle at build time;
          # CF Pages dashboard env vars are runtime-only and never reach
          # the bundle. Set the Hocuspocus WS URL per tier here so the
          # client knows where to connect.
          VITE_SERVER_WS_URL: wss://patchtogether-server.fly.dev
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          command: pages deploy .svelte-kit/cloudflare --project-name=patchtogether-live --branch=main

  # ---------------- PR previews: auto on PR events ----------------

  deploy-preview:
    name: Deploy → PR-${{ github.event.pull_request.number }} preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: flox/install-flox-action@v2
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      # DOOM WASM blob (see deploy-prod for the cache rationale).
      - name: Cache DOOM WASM artifact
        id: cache-doom-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/doom/doom.js
            packages/web/static/doom/doom.wasm
          key: ${{ runner.os }}-doom-wasm-${{ hashFiles('packages/web/native/build-doom-wasm.sh', 'packages/web/native/doomgeneric/**') }}
      - name: Build DOOM WASM (emcc)
        if: steps.cache-doom-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-doom-wasm.sh
      # DOOM1.WAD — shareware game data, fetched from a stable mirror and
      # cached forever (~4 MB, never changes; key is bumped if we ever
      # swap source). Without this the deployed bundle 404s on
      # /doom/DOOM1.WAD and the card shows "WAD missing — see
      # DOWNLOAD_INSTRUCTIONS.md".
      - name: Cache DOOM1.WAD (shareware)
        id: cache-doom-wad
        uses: actions/cache@v4
        with:
          path: packages/web/static/doom/DOOM1.WAD
          key: doom-wad-shareware-v1
      - name: Download DOOM1.WAD (shareware)
        if: steps.cache-doom-wad.outputs.cache-hit != 'true'
        run: |
          curl -L --fail --silent --show-error \
            -o packages/web/static/doom/DOOM1.WAD \
            https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad
          echo "5b2e249b9c5133ec987b3ea77596381dc0d6bc1d  packages/web/static/doom/DOOM1.WAD" \
            | shasum -a 1 -c -
      - run: flox activate -- task install
      - run: flox activate -- task build
        env:
          # Previews share the autotest tier's Hocuspocus instance.
          VITE_SERVER_WS_URL: wss://patchtogether-server-autotest.fly.dev
          # Re-expose the dev-only window globals (__patch / __ydoc /
          # __ensureEngine / __listModuleDefs) on the built bundle so the
          # chaos runner + e2e suites can drive a deployed preview. Gated
          # via testHooksEnabled() in lib/dev/test-hooks.ts; never set on
          # prod.
          VITE_E2E_HOOKS: '1'
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          # PR previews deploy to the AUTOTEST project (not prod), so they
          # inherit the test-instance Clerk env vars and full auth flow
          # works. URL becomes `pr-N.patchtogether-live-autotest.pages.dev`.
          command: pages deploy .svelte-kit/cloudflare --project-name=patchtogether-live-autotest --branch=pr-${{ github.event.pull_request.number }}

  # ---------------- Autotest + dev: auto on merge to main ----------------

  deploy-autotest:
    name: Deploy → autotest.patchtogether.live (autotest)
    needs: [verify-ci]
    # `always()` lets us fire on push (where verify-ci is skipped). The body
    # gates the dispatch path on verify-ci success.
    if: |
      always()
      && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
        || (github.event_name == 'workflow_dispatch'
          && needs.verify-ci.result == 'success'
          && contains(github.event.inputs.target, 'autotest'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: flox/install-flox-action@v2
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      # DOOM WASM blob (see deploy-prod for the cache rationale).
      - name: Cache DOOM WASM artifact
        id: cache-doom-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/doom/doom.js
            packages/web/static/doom/doom.wasm
          key: ${{ runner.os }}-doom-wasm-${{ hashFiles('packages/web/native/build-doom-wasm.sh', 'packages/web/native/doomgeneric/**') }}
      - name: Build DOOM WASM (emcc)
        if: steps.cache-doom-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-doom-wasm.sh
      # DOOM1.WAD — shareware game data, fetched from a stable mirror and
      # cached forever (~4 MB, never changes; key is bumped if we ever
      # swap source). Without this the deployed bundle 404s on
      # /doom/DOOM1.WAD and the card shows "WAD missing — see
      # DOWNLOAD_INSTRUCTIONS.md".
      - name: Cache DOOM1.WAD (shareware)
        id: cache-doom-wad
        uses: actions/cache@v4
        with:
          path: packages/web/static/doom/DOOM1.WAD
          key: doom-wad-shareware-v1
      - name: Download DOOM1.WAD (shareware)
        if: steps.cache-doom-wad.outputs.cache-hit != 'true'
        run: |
          curl -L --fail --silent --show-error \
            -o packages/web/static/doom/DOOM1.WAD \
            https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad
          echo "5b2e249b9c5133ec987b3ea77596381dc0d6bc1d  packages/web/static/doom/DOOM1.WAD" \
            | shasum -a 1 -c -
      - run: flox activate -- task install
      - run: flox activate -- task build
        env:
          VITE_SERVER_WS_URL: wss://patchtogether-server-autotest.fly.dev
          # See preview-deploy comment — autotest is the canonical target for
          # chaos + e2e runs, so the in-page test hooks must be exposed here.
          VITE_E2E_HOOKS: '1'
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          command: pages deploy .svelte-kit/cloudflare --project-name=patchtogether-live-autotest --branch=main

  deploy-dev:
    name: Deploy → dev.patchtogether.live (dev)
    needs: [verify-ci]
    if: |
      always()
      && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
        || (github.event_name == 'workflow_dispatch'
          && needs.verify-ci.result == 'success'
          && contains(github.event.inputs.target, 'dev'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: flox/install-flox-action@v2
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      # DOOM WASM blob (see deploy-prod for the cache rationale).
      - name: Cache DOOM WASM artifact
        id: cache-doom-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/doom/doom.js
            packages/web/static/doom/doom.wasm
          key: ${{ runner.os }}-doom-wasm-${{ hashFiles('packages/web/native/build-doom-wasm.sh', 'packages/web/native/doomgeneric/**') }}
      - name: Build DOOM WASM (emcc)
        if: steps.cache-doom-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-doom-wasm.sh
      # DOOM1.WAD — shareware game data, fetched from a stable mirror and
      # cached forever (~4 MB, never changes; key is bumped if we ever
      # swap source). Without this the deployed bundle 404s on
      # /doom/DOOM1.WAD and the card shows "WAD missing — see
      # DOWNLOAD_INSTRUCTIONS.md".
      - name: Cache DOOM1.WAD (shareware)
        id: cache-doom-wad
        uses: actions/cache@v4
        with:
          path: packages/web/static/doom/DOOM1.WAD
          key: doom-wad-shareware-v1
      - name: Download DOOM1.WAD (shareware)
        if: steps.cache-doom-wad.outputs.cache-hit != 'true'
        run: |
          curl -L --fail --silent --show-error \
            -o packages/web/static/doom/DOOM1.WAD \
            https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad
          echo "5b2e249b9c5133ec987b3ea77596381dc0d6bc1d  packages/web/static/doom/DOOM1.WAD" \
            | shasum -a 1 -c -
      - run: flox activate -- task install
      - run: flox activate -- task build
        env:
          VITE_SERVER_WS_URL: wss://patchtogether-server-dev.fly.dev
          # See preview-deploy comment — dev tier also runs chaos + e2e.
          VITE_E2E_HOOKS: '1'
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          command: pages deploy .svelte-kit/cloudflare --project-name=patchtogether-live-dev --branch=dev

  # ---------------- Live smoke ----------------
  # Runs after a successful autotest deploy. Hits the live URL with the
  # @smoke-tagged subset of e2e/.

  smoke-live:
    name: Live smoke — autotest.patchtogether.live
    needs: deploy-autotest
    # `always()` is required: deploy-autotest itself uses `always()` to run
    # on push (where its sibling `verify-ci` is skipped). When a parent uses
    # `always()`, GitHub propagates a "this job had a conditional ancestor"
    # state to children, which makes plain `if: needs.X.result == 'Y'`
    # evaluate to false. Adding `always()` here restores the intended
    # gate: run only when the autotest deploy actually succeeded.
    if: ${{ always() && needs.deploy-autotest.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      E2E_BASE_URL: https://autotest.patchtogether.live
      # Beta gate is on for autotest; smoke needs to pass through. Picked up
      # by playwright.config.ts → use.httpCredentials.
      BETA_GATE_USER: beta
      BETA_GATE_PASS: ${{ secrets.AUTOTEST_BETA_GATE_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: flox/install-flox-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
      - run: flox activate -- task setup
      - run: flox activate -- task ci:smoke:live
      # Anon-invite handshake guard: opens a REAL WS to the deployed autotest
      # relay with a freshly-minted anon invite and asserts onAuthenticate
      # ACCEPTS. Catches INVITE_SECRET drift between the deployed web app and
      # relay — the failure mode where every anonymous invite guest is silently
      # rejected (red dot, `nodes 0`) while Clerk users are unaffected. SKIPS
      # cleanly if AUTOTEST_INVITE_SECRET isn't set (e.g. before the secret is
      # wired), so it never blocks a deploy spuriously; once set, drift fails
      # the deploy loudly. Set AUTOTEST_INVITE_SECRET to the canonical
      # INVITE_SECRET_AUTOTEST value (the same one `task sync-secrets -- autotest`
      # pushes to both Fly + CF Pages).
      - name: Anon-invite handshake smoke (autotest relay)
        env:
          TIER: autotest
          INVITE_SECRET: ${{ secrets.AUTOTEST_INVITE_SECRET }}
          # /api/health is beta-gate-exempt, but pass creds anyway so the
          # web-fingerprint cross-check works even if that carve-out changes.
          BETA_GATE_USER: beta
          BETA_GATE_PASS: ${{ secrets.AUTOTEST_BETA_GATE_PASS }}
        run: flox activate -- task smoke:anon-handshake
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-report
          path: e2e/playwright-report
          retention-days: 14
