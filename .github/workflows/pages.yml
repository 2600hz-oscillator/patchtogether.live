name: Pages

# Builds the Astro docs site at docs/ and publishes to GitHub Pages.
#
# Triggers:
#   - push to main when docs/ changes OR the audio module registry changes
#     (the docs catalog is generated from the registry, so registry edits
#     should refresh the published docs)
#   - workflow_dispatch — manual rebuild
#
# Pages must be enabled on the repo with build_type=workflow. If it isn't yet,
# do it once via:  gh api repos/<owner>/<repo>/pages -X POST -f build_type=workflow

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/web/src/lib/audio/module-registry.ts'
      - 'packages/web/src/lib/audio/modules/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Only one Pages deploy at a time; later runs supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: flox/install-flox-action@v2

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install workspace deps
        run: flox activate -- task install

      - name: Build module manifest + Astro site
        run: flox activate -- task docs:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
