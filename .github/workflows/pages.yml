name: Deploy VRT gallery (GitHub Pages)

# Builds + publishes the VRT gallery (e2e/vrt/build_gallery.py renders
# docs/vrt/index.html from e2e/vrt/__screenshots__/**) on every push to
# main. Modeled on doomviz's pages.yml — see the LFS checkout for why
# `lfs: true` is required (otherwise the gallery embeds pointer-file PNGs
# that render as broken images).
#
# Idempotent: a green run just rewrites docs/vrt/index.html with the same
# baselines + an updated commit short-SHA. No state on the runner survives
# between runs.

on:
  push:
    branches: [main]
    paths:
      - 'e2e/vrt/__screenshots__/**'
      - 'e2e/vrt/build_gallery.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS for baseline PNGs)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build VRT gallery
        run: |
          mkdir -p docs/vrt
          python3 e2e/vrt/build_gallery.py \
            --baseline-dir e2e/vrt/__screenshots__ \
            --output-dir   docs/vrt
          # Land an index.html at the docs/ root that just redirects into
          # docs/vrt/ — saves reviewers a click + future-proofs the path.
          # Banner header + footer match the gallery treatment for a
          # consistent landing page even though most viewers redirect through.
          cat > docs/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>patchtogether.live — VRT gallery</title>
            <meta http-equiv="refresh" content="0; url=vrt/">
            <link rel="canonical" href="vrt/">
            <style>
              body { margin: 0; background: #1a1a1a; color: #e0e0e0; font-family: 'Courier New', monospace; }
              .banner { display: block; width: 100%; height: auto; }
              .banner-header { margin-bottom: 2rem; }
              .banner-footer { margin-top: 2rem; }
              main { max-width: 1400px; margin: 0 auto; padding: 0 20px; text-align: center; }
              a { color: #66bbff; }
            </style>
          </head>
          <body>
            <img class="banner banner-header" src="assets/header.png" alt="patchtogether.live header banner">
            <main><p><a href="vrt/">VRT gallery</a></p></main>
            <img class="banner banner-footer" src="assets/footer.png" alt="patchtogether.live footer banner" loading="lazy">
          </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
