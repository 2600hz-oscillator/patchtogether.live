name: Deploy GitHub Pages (VRT gallery + ART gallery)

# Builds + publishes the GitHub Pages site on every push to main. There is ONE
# Pages site per repo, so this single workflow owns the whole `docs/` tree:
#
#   docs/vrt/                  — VRT gallery (e2e/vrt/build_gallery.py renders
#                                docs/vrt/index.html from
#                                e2e/vrt/__screenshots__/**). LFS checkout is
#                                required or the gallery embeds pointer-file PNGs
#                                that render as broken images.
#   docs/art/                  — ART gallery (art/build_gallery.py renders
#                                docs/art/index.html + waveform/spectrogram PNGs
#                                from art/baselines/**/*.f32; also LFS-tracked).
#                                An ART-baseline change instead triggers the
#                                sibling art-gallery.yml (both build the full
#                                docs/ tree + share the `pages` concurrency lock,
#                                so the deployed site is always complete).
#   docs/index.html            — landing page linking both.
#
# (The old dated "Test Reconciliation" Pages report was RETIRED — it replaced
# itself with the freshness-gated, in-repo test ledger: docs/testing/README.md +
# docs/testing/test-ledger.generated.md, which can't go stale, so it needs no
# deploy-time render.)
#
# Idempotent: a green run just rewrites the generated HTML with the same inputs +
# an updated commit short-SHA. No state on the runner survives between runs.

on:
  push:
    branches: [main]
    paths:
      - 'e2e/vrt/__screenshots__/**'
      - 'e2e/vrt/build_gallery.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS for baseline PNGs)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install numpy + matplotlib (ART gallery render deps)
        run: python3 -m pip install --upgrade numpy matplotlib

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install deps (npm only — no Playwright browser needed for the page build)
        run: flox activate -- npm install

      - name: Build VRT gallery
        run: |
          mkdir -p docs/vrt
          python3 e2e/vrt/build_gallery.py \
            --baseline-dir e2e/vrt/__screenshots__ \
            --output-dir   docs/vrt

      - name: Build ART gallery
        run: |
          mkdir -p docs/art
          python3 art/build_gallery.py \
            --baseline-dir art/baselines \
            --output-dir   docs/art

      - name: Write the docs/ landing page
        run: |
          # Landing page links both sub-sites. Banner header + footer match the
          # gallery/report treatment for a consistent landing page.
          cat > docs/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>patchtogether.live — test reports</title>
            <style>
              body { margin: 0; background: #1a1a1a; color: #e0e0e0; font-family: 'Courier New', monospace; }
              .banner { display: block; width: 100%; height: auto; }
              .banner-header { margin-bottom: 2rem; }
              .banner-footer { margin-top: 2rem; }
              main { max-width: 900px; margin: 0 auto; padding: 0 20px; text-align: center; }
              h1 { letter-spacing: 2px; }
              ul { list-style: none; padding: 0; line-height: 2.2; font-size: 1.1rem; }
              a { color: #66bbff; }
              .desc { color: #9aa; font-size: .85rem; }
            </style>
          </head>
          <body>
            <img class="banner banner-header" src="assets/header.png" alt="patchtogether.live header banner">
            <main>
              <h1>TEST REPORTS</h1>
              <ul>
                <li><a href="vrt/">VRT gallery</a><br><span class="desc">per-card Playwright screenshot baselines</span></li>
                <li><a href="art/">ART gallery</a><br><span class="desc">per-baseline waveform + spectrogram of every ART audio baseline</span></li>
              </ul>
            </main>
            <img class="banner banner-footer" src="assets/footer.png" alt="patchtogether.live footer banner" loading="lazy">
          </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
