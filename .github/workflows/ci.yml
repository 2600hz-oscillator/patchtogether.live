name: CI

# Runs the full PR-gate suite (typecheck + unit + ART + Playwright E2E) on every
# push to main and every PR targeting main. The whole pipeline executes inside
# the project's Flox environment so the toolchain (Node 22.22.2, Faust 2.85.5,
# esbuild, go-task, git-lfs, gh) matches what developers run locally.
#
# Job shape (as of 2026-05-24, post-MED-1 from .myrobots/plans/ci-build-wall-time-reduction.md):
#
#   typecheck       ~30 s  | independent setup
#   unit            ~90 s  | independent setup (server + web vitest)
#   dsp-build       ~1-2 min | compiles Faust worklets ONCE → dsp-dist artifact
#                            | (cache hit ~10 s); art/build/build-web/e2e/collab
#                            | /vrt/vrt-strict/behavioral `needs:` it + restore
#   build-web       ~2-3 min | needs: dsp-build; builds the Vite/SvelteKit
#                            | preview bundle ONCE (VITE_E2E_HOOKS=1) → the
#                            | web-preview-dist artifact the e2e shards serve
#   art             ~60 s  | needs: dsp-build (restores dist, dsp:build no-ops)
#   e2e (× 8)     ~3-4 min | matrix shards 1..8/8, blob reporter; needs:
#                            | [dsp-build, build-web]; runs E2E_USE_PREVIEW=1
#                            | against the prebuilt bundle (`vite preview`,
#                            | :4173) instead of booting `vite dev` per shard
#   merge-reports   ~30 s  | needs: e2e — merges 8 blob-reports → HTML
#   ci (umbrella)   ~0 s   | needs all above; gates branch protection
#   vrt             ~3-5 min | needs: dsp-build (restores dist)
#
# dsp-build dedupe (2026-06-01): the slow Faust compile used to run ~16× per
# run (once per e2e shard, vrt, vrt-strict, behavioral shard, art, build).
# It now runs ONCE in the `dsp-build` job, which caches + uploads
# packages/dsp/dist/**; every downstream job `needs:` it and DOWNLOADS the
# `dsp-dist` artifact. Jobs that call a `task` listing dsp:build as a dep
# (art/vrt/vrt-strict/build) reuse the restored dist via the Taskfile
# `status:` guard (dist/.dsp-srchash) — no double compile.
#
# Critical path: max(typecheck, unit, art, slowest-e2e-shard) + merge-reports
# ≈ 4-5 min, vs the previous ~22 min single-runner pipeline. Setup is repeated
# per-job (npm cache makes it ~70 s each), which is the deliberate trade-off
# the plan accepted in exchange for parallelism. Free-tier concurrency cap
# is 20 concurrent jobs; the full pipeline tops out at ~14 (8 e2e + typecheck
# + unit + art + vrt + merge-reports + ci), still under cap.
#
# Branch ruleset note: the "main: green PRs only" ruleset (id 16042163)
# requires the status check `typecheck + unit + ART + E2E`. The `ci` umbrella
# job below preserves that exact name so the ruleset keeps working without a
# coordinated PUT to /repos/.../rulesets/16042163. Rename it ONLY in a PR
# that also updates the ruleset.

on:
  push:
    branches: [main, first-mvp]
    paths-ignore:
      - '**/*.md'
      - '.myrobots/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.myrobots/**'
      - 'LICENSE'
  # Manual re-trigger on a branch (operator convenience). NOTE: a
  # workflow_dispatch run does NOT count toward a PR's required-status-check
  # gate (confirmed on #524) — so vrt-update.yml no longer dispatches this to
  # re-validate; it close+reopens the PR to re-fire a `pull_request` run
  # instead (see vrt-update.yml `revalidate`).
  workflow_dispatch:

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # actionlint — lint the GitHub Actions workflow files themselves. Catches
  # the class of bug that broke Deploy in #518: a `matrix.*` context used in
  # a job-level `if:` (matrix is NOT available there), which GitHub rejects
  # at parse time but `yaml.safe_load` (the only check we had) cannot detect.
  # Pinned binary download (not the flox manifest — actionlint builds from
  # source under nix, which would add wall-time to every flox-activate job).
  # `-shellcheck=` disables the shellcheck integration so the gate stays
  # focused on GHA syntax + context availability, without failing on
  # pre-existing shell nits inside run: blocks. Wired into the `ci` umbrella
  # below → a broken workflow blocks merge, no ruleset change (like `build`).
  # -----------------------------------------------------------------------
  actionlint:
    name: actionlint (workflow lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install + run actionlint (pinned)
        run: |
          VER=1.7.12
          curl -sSfL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -shellcheck=

  # -----------------------------------------------------------------------
  # typecheck — `task typecheck` (npm run typecheck --workspaces). ~18 s of
  # actual work; ~70 s with setup. Independent of everything else.
  # -----------------------------------------------------------------------
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      - name: Install workspace deps
        run: flox activate -- task install

      - name: Run typecheck
        run: flox activate -- task typecheck

  # -----------------------------------------------------------------------
  # unit — `task test` (server + web vitest). ~45 s of work; ~120 s with
  # setup. Most server tests use an in-memory Hocuspocus harness and don't
  # need a DB, BUT the joinRackspace capacity-race test
  # (packages/web/src/lib/server/rackspaces-capacity.test.ts) speaks REAL
  # Postgres via a pg-pool shim to prove pg_advisory_xact_lock actually
  # holds. Per memory `feedback_collab_tests_vacuous_without_db` that test
  # intentionally refuses to skip-pass when PG is unreachable — so the
  # `unit` job needs a Postgres service. The test reads PG_TEST_URL and
  # falls back to localhost:54320 / patchtogether_test; we map the
  # container's 5432 → host 54320 to satisfy both paths + set PG_TEST_URL
  # explicitly.
  # -----------------------------------------------------------------------
  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        # AWS ECR Public mirror of the official Docker Hub image — Docker
        # Hub's registry-1.docker.io intermittently times out the service-
        # container pull (recurring CI flake). ECR Public has no rate limits
        # and is far more reliable. Same image, different (mirror) registry.
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: patchtogether_test
        ports:
          - 54320:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_TEST_URL: postgres://postgres:postgres@localhost:54320/patchtogether_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      - name: Install workspace deps
        run: flox activate -- task install

      # Apply the rack schema the capacity-race test depends on (racks +
      # rack_members). The test probe hard-fails if these tables are
      # missing rather than silently skip-passing.
      - name: Apply DB schema (for capacity-race test)
        run: flox activate -- psql "$PG_TEST_URL" -f db/schema/001_init.sql

      - name: Run unit tests (server + web)
        run: flox activate -- task test

  # -----------------------------------------------------------------------
  # art — Audio Regression Tests. `task art` lists dsp:build as a dep, but we
  # restore the dsp-build artifact first so that dep is a no-op (the dist's
  # .dsp-srchash matches → Taskfile `status:` guard skips the Faust compile).
  # ~57 s of work; ~130 s with setup.
  # -----------------------------------------------------------------------
  art:
    name: art
    needs: dsp-build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (LFS required for ART baselines)
        uses: actions/checkout@v4
        with:
          # ART baselines (art/baselines/**/*.f32) are LFS-tracked. Without
          # this the test reads the ~130-byte LFS pointer file instead of
          # the real float32 buffer and fails with "not a multiple of 4 —
          # file is truncated or corrupt".
          lfs: true

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      # Restore the worklet dist built once by dsp-build, BEFORE `task art`
      # (whose dsp:build dep then no-ops via the .dsp-srchash status guard).
      - name: Download DSP dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dsp-dist
          path: packages/dsp/dist

      - name: Install workspace deps
        run: flox activate -- task install

      - name: Run ART (Audio Regression Tests; dsp:build dep no-ops on restored dist)
        run: flox activate -- task art

  # -----------------------------------------------------------------------
  # build — the PRODUCTION bundle gate. Runs `task build` (dsp:build +
  # `vite build` for the web app) on a clean runner with NO deploy and NO
  # Cloudflare token. This is the only required-path job that exercises the
  # production bundler.
  #
  # WHY THIS EXISTS (Clerk #464 RCA, 2026-05-30): a broken bundle merged to
  # main and broke dev for hours because NO required CI check ran the
  # production bundler. typecheck (svelte-check) + unit (vitest) + e2e
  # (dev-server) + VRT all pass while `vite build` fails — a transitive ESM
  # export mismatch is only caught at bundle time, not by the dev server or
  # the type checker. The only thing previously running `task build` was the
  # non-required `Deploy → PR preview` job, so a broken bundle could merge.
  #
  # This job is wired into the REQUIRED umbrella `ci` job's `needs:` list
  # (see below), so a broken production build fails the umbrella → blocks
  # merge, with zero branch-ruleset change. Keep it FAST: build only, no
  # preview, no smoke (those live in `task ci:smoke:prod-build`).
  # -----------------------------------------------------------------------
  build:
    name: build (production bundle)
    needs: dsp-build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      # Restore the worklet dist built once by dsp-build. `task build` lists
      # dsp:build first, but the restored dist + matching .dsp-srchash makes
      # that dep a no-op (status guard), so this job only runs `vite build` —
      # which is the gate's actual purpose (catching web-bundle ESM mismatches,
      # the Clerk #464 RCA). The dsp dist is the same artifact the prod compile
      # would produce, and `vite build` still bundles it.
      - name: Download DSP dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dsp-dist
          path: packages/dsp/dist

      - name: Install workspace deps
        run: flox activate -- task install

      # The production build: dsp:build (no-ops on the restored dist) then
      # `vite build` for the web app. No deploy, no Cloudflare token — purely a
      # "does the prod bundle compile?" gate.
      - name: Run production build (dsp + web)
        run: flox activate -- task build

  # -----------------------------------------------------------------------
  # dsp-build — compile the DSP worklets (Faust + esbuild) ONCE per run and
  # publish packages/dsp/dist/** as an artifact for every downstream job to
  # restore, instead of recompiling Faust ~16× (once per e2e shard ×8, vrt,
  # vrt-strict, behavioral ×6, art, …).
  #
  # WHY (build-wall-time): `task dsp:build` (slow Faust compile) was a step or
  # a transitive `deps:` in every job that boots the dev/preview server or runs
  # ART — the worklets must be on disk at packages/dsp/dist/ before Vite imports
  # the `?url`-suffixed .js/.wasm artifacts. Compiling it per-job dominated the
  # cold-cache wall-time of the short jobs. Now it runs here once.
  #
  # MECHANISM (cache + artifact, belt-and-suspenders):
  #   - actions/cache keyed on the hash of every DSP build input
  #     (packages/dsp/src/**, packages/dsp/scripts/**, packages/dsp/package.json
  #     — which pins @grame/faustwasm + esbuild — and .flox/env/manifest.toml,
  #     which pins the Faust + Node toolchain). A cache HIT skips even this
  #     job's Faust compile (restores dist in seconds); a MISS recompiles and
  #     repopulates the cache for the next run.
  #   - upload-artifact (`dsp-dist`) so downstream jobs DOWNLOAD a deterministic
  #     copy via `needs: dsp-build` regardless of cache state — no dependence on
  #     a cross-job cache race. The artifact includes dist/.dsp-srchash (the
  #     source fingerprint) so the `dsp:build` Taskfile `status:` guard can skip
  #     a transitive rebuild in jobs that call `task art|vrt|vrt:strict|build`.
  #
  # CORRECTNESS: downstream jobs `needs: dsp-build` and download the artifact
  # at the START (before setup/dev-server), so a job never runs with a stale or
  # missing dist. If a job still invokes a `task` that lists dsp:build as a dep,
  # the restored dist + matching .dsp-srchash makes that dep a no-op (the
  # `status:` guard in Taskfile.yml) — no double-build.
  # -----------------------------------------------------------------------
  dsp-build:
    name: dsp-build (Faust worklets, once)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      # Cache the compiled worklet dist keyed on every DSP build input. A HIT
      # restores packages/dsp/dist/** (incl. .dsp-srchash) and the build step
      # below skips the Faust compile; a MISS recompiles + repopulates.
      - name: Cache DSP dist
        id: cache-dsp-dist
        uses: actions/cache@v4
        with:
          path: packages/dsp/dist
          key: ${{ runner.os }}-dsp-dist-${{ hashFiles('packages/dsp/src/**', 'packages/dsp/scripts/**', 'packages/dsp/package.json', '.flox/env/manifest.toml') }}

      - name: Install workspace deps
        run: flox activate -- task install

      # On a cache HIT the restored dist already carries a matching
      # .dsp-srchash, so the `status:` guard in `task dsp:build` makes this a
      # no-op (prints "up to date"). On a MISS it runs the real Faust + esbuild
      # compile and stamps the fingerprint.
      - name: Build DSP worklets (Faust + esbuild)
        run: flox activate -- task dsp:build

      # Publish the dist for every downstream job to download via needs:.
      - name: Upload DSP dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsp-dist
          path: packages/dsp/dist
          # Include the hidden .dsp-srchash fingerprint so the Taskfile
          # `status:` guard can skip transitive rebuilds downstream.
          include-hidden-files: true
          retention-days: 1

  # -----------------------------------------------------------------------
  # build-web — build the SvelteKit/Vite production bundle ONCE per run and
  # publish .svelte-kit/output/** as the `web-preview-dist` artifact. Every
  # e2e shard downloads it and runs Playwright against `vite preview`
  # (E2E_USE_PREVIEW=1) instead of booting `vite dev` per shard.
  #
  # WHY (2026-06-02): each e2e shard used to boot the Vite DEV server
  # (`npm run dev`, :5173), which compiles routes on-demand on first page load
  # — slow on every shard — and, worse, triggers a dep re-optimization + a
  # client reload mid-test that flaked the video specs (it broke #551). A
  # PREBUILT `vite preview` (:4173) serves the static, minified bundle: no
  # on-demand compile, no HMR client, and no dep-reopt reload class. The build
  # runs once here instead of 8× (and is far cheaper than 8 cold dev-server
  # first-loads). This mirrors the `collab` job, which already builds + runs
  # @collab against preview for the same #232/#225 reload-flake reason.
  #
  # VITE_E2E_HOOKS=1 is REQUIRED at BUILD time: the e2e helpers drive the
  # dev-only window globals (`__patch`, `__ydoc`, `__ensureEngine`, …) that
  # Canvas.svelte gates behind `testHooksEnabled()` (packages/web/src/lib/
  # dev/test-hooks.ts). In a prod build `import.meta.env.DEV` is false, so
  # those hooks are tree-shaken OUT unless VITE_E2E_HOOKS=1 is set — exactly
  # the flag the autotest deploy tier already uses (deploy.yml). Without it,
  # every spawnPatch-based spec would fail with "__ensureEngine is not a
  # function". It's a build-time Vite var (baked into the bundle), so it must
  # be set on `task build:web`, not at preview runtime.
  #
  # The DOOM/SNES9X WASM + DOOM1.WAD static assets are baked into the bundle
  # here (vite build copies the whole static/ tree into
  # .svelte-kit/output/client/), so the e2e shards no longer build WASM or
  # fetch the WAD — they're inside the downloaded artifact.
  # -----------------------------------------------------------------------
  build-web:
    name: build-web (preview bundle, once)
    needs: dsp-build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # REQUIRED: large static game bundles (e.g. static/sm64js/sm64js.bundle.js,
          # ~12 MB) are stored in git-LFS. Without lfs:true the build bakes the LFS
          # *pointer* (text starting `version https://git-lfs...`) into the preview
          # artifact; loading it as a <script> throws "Unexpected identifier 'https'"
          # and breaks the sm64 e2e shards. Every other job already checks out lfs:true.
          lfs: true

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      # Restore the worklet dist built once by dsp-build, BEFORE `task
      # build:web` — `vite build` bundles the `?url`-suffixed DSP artifacts
      # from packages/dsp/dist/, so they must be on disk first.
      - name: Download DSP dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dsp-dist
          path: packages/dsp/dist

      - name: Install workspace deps
        run: flox activate -- task install

      # DOOM/SNES9X WASM + DOOM1.WAD are static-served assets (under
      # packages/web/static/). `vite build` copies static/ into the client
      # output, so they need to be present here to be baked into the preview
      # artifact the e2e shards download. Same cache+build pattern as the
      # e2e/collab/vrt jobs.
      - name: Cache DOOM WASM artifact
        id: cache-doom-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/doom/doom.js
            packages/web/static/doom/doom.wasm
          key: ${{ runner.os }}-doom-wasm-${{ hashFiles('packages/web/native/build-doom-wasm.sh', 'packages/web/native/doomgeneric/**') }}

      - name: Build DOOM WASM (emcc)
        if: steps.cache-doom-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-doom-wasm.sh

      - name: Cache SNES9X WASM artifact
        id: cache-snes9x-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/snes9x/snes9x.js
            packages/web/static/snes9x/snes9x.wasm
          key: ${{ runner.os }}-snes9x-wasm-${{ hashFiles('packages/web/native/build-snes9x-wasm.sh', 'packages/web/native/snes9x/**') }}

      - name: Build SNES9X WASM (emcc)
        if: steps.cache-snes9x-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-snes9x-wasm.sh

      - name: Cache DOOM1.WAD (shareware)
        id: cache-doom-wad
        uses: actions/cache@v4
        with:
          path: packages/web/static/doom/DOOM1.WAD
          key: doom-wad-shareware-v1

      - name: Download DOOM1.WAD (shareware)
        if: steps.cache-doom-wad.outputs.cache-hit != 'true'
        run: |
          curl -L --fail --silent --show-error \
            -o packages/web/static/doom/DOOM1.WAD \
            https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad
          echo "5b2e249b9c5133ec987b3ea77596381dc0d6bc1d  packages/web/static/doom/DOOM1.WAD" \
            | shasum -a 1 -c -

      # Build the web app with the e2e test hooks compiled IN (see job header).
      # dsp:build is NOT a dep of `task build:web` (only `task build`), and the
      # dist was restored above, so this is purely `vite build`.
      - name: Build web (preview bundle, test hooks enabled)
        env:
          VITE_E2E_HOOKS: '1'
        run: flox activate -- task build:web

      # `vite preview` (adapter-cloudflare) serves from .svelte-kit/output/
      # (client + prerendered + server) — NOT packages/web/build/, which the
      # cloudflare adapter leaves empty for the preview path. Upload that tree;
      # the static DOOM/SNES9X/skifree assets are inside output/client/.
      - name: Upload web preview bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-preview-dist
          path: packages/web/.svelte-kit/output
          include-hidden-files: true
          retention-days: 1

  # -----------------------------------------------------------------------
  # e2e — Playwright E2E suite, sharded 8 ways. Each shard runs ~1/8 of the
  # 812 specs (file-level distribution) with 4 workers, on its own runner.
  # Per-shard wall-time ~3-4 min vs the previous ~5-6 min at 4 shards.
  #
  # Reporter is `blob` so we can merge all 8 shards into a single HTML report
  # via the `merge-reports` job. Each shard uploads its blob artifact;
  # merge-reports downloads them all and runs `playwright merge-reports`.
  #
  # DB schema + DOOM assets are needed (same as the previous monolithic job).
  # -----------------------------------------------------------------------
  e2e:
    name: e2e (shard ${{ matrix.shard }}/8)
    needs: [dsp-build, build-web]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      # Don't fail-fast: if shard 1 fails on a flake, we still want shards
      # 2-8 to surface independent failures in the same run rather than
      # forcing two consecutive CI cycles to triage.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]

    services:
      # Postgres for the persistence layer (Stage B1+). Both the SvelteKit
      # webServer and the Hocuspocus server read DATABASE_URL.
      postgres:
        # AWS ECR Public mirror (see note on the unit job) — avoids the flaky
        # Docker Hub service-container pull.
        image: public.ecr.aws/docker/library/postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: patchtogether_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/patchtogether_test
      # Run against the prebuilt `vite preview` (:4173) instead of `vite dev`
      # (:5173). The bundle is built ONCE in the `build-web` job and downloaded
      # below. Preview serves the static minified bundle: no per-shard
      # on-demand compile, and no dep-reopt client reload (the class that
      # flaked the video specs / broke #551 under dev). See playwright.config.ts
      # USE_PREVIEW / webServer.
      E2E_USE_PREVIEW: '1'

    steps:
      - name: Checkout (with LFS for ART/VRT baselines)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      # NOTE: no `.svelte-kit` cache here anymore. Under E2E_USE_PREVIEW this
      # job no longer builds the web app — the `output/` tree comes ONLY from
      # the web-preview-dist artifact downloaded below. Caching `.svelte-kit`
      # would risk leaving a stale `output/` from a prior build under it; the
      # base scaffolding (tsconfig/ambient/generated) is regenerated by the
      # `svelte-kit sync` prepare hook during `task setup`'s npm install.

      - name: Install workspace deps + Playwright Chromium
        run: flox activate -- task setup

      # Restore the worklet dist built once by dsp-build. Under E2E_USE_PREVIEW
      # the served bundle already inlines the `?url` DSP artifacts (vite build
      # resolved + copied them into .svelte-kit/output/client), so preview
      # doesn't read packages/dsp/dist/ at runtime — but the node-side e2e
      # harness still references it for a few specs, so keep it on disk. Cheap
      # download; no per-shard Faust compile.
      - name: Download DSP dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dsp-dist
          path: packages/dsp/dist

      # Download the web bundle built ONCE by build-web. `vite preview`
      # (E2E_USE_PREVIEW=1, set in env above) serves from
      # packages/web/.svelte-kit/output, so the artifact restores there. The
      # bundle already contains the DOOM/SNES9X WASM + DOOM1.WAD + skifree
      # static assets (vite build copied static/ into output/client/), so this
      # shard no longer builds WASM or fetches the WAD.
      - name: Download web preview bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: web-preview-dist
          path: packages/web/.svelte-kit/output

      - name: Apply DB schema
        run: flox activate -- psql "$DATABASE_URL" -f db/schema/001_init.sql

      # Refresh the registry manifest the way `task e2e` does locally — this
      # is normally a `task test:emit-manifest` dep on `task e2e`, but here we
      # call playwright directly so the shard flag can be threaded in. The
      # manifest (e2e/.generated/registry-manifest.json) is read by the
      # Playwright TEST process, not the served app, so it's still emitted
      # per-shard (not part of the web-preview-dist artifact). Cheap (~3 s).
      - name: Emit registry manifest for E2E
        run: flox activate -- task test:emit-manifest

      # (DSP dist + the prebuilt web bundle were restored above — no per-shard
      # Faust compile, no WASM build, no WAD fetch, no dev-server boot. The
      # Playwright webServer runs `vite preview` against the downloaded
      # output/.)

      # @collab multi-context specs are EXCLUDED from the sharded matrix
      # (--grep-invert @collab) and run in their own dedicated, non-sharded
      # `collab` job below. They drive two+ independent browser contexts
      # against the in-memory Hocuspocus relay and flake under shard
      # contention (4 workers each across 8 runners hammering the same dev
      # server + relay → cross-context Yjs sync drops). Isolating them makes
      # the DOOM 2-user test a reliable gate instead of a re-run-and-hope.
      # `per-module-per-port-behavioral.spec.ts` is the heavy behavioral
      # input-coverage sweep — ~100 module-level tests, each iterating
      # internal inputs with 2-spawn control-vs-patched comparisons.
      # Wall-time ~25-30 min for the full sweep. Excluded from the main
      # 8-way shard matrix (would balloon shard wall-time from 3-4 min
      # to 8-10 min) and runs in its own dedicated `behavioral-coverage`
      # job below. The test titles are matched via the
      # "BEHAVIORAL input coverage" describe block name.
      - name: Run E2E (shard ${{ matrix.shard }}/8, blob reporter, no @collab, no @capacity, no behavioral)
        run: |
          flox activate -- npx --workspace e2e playwright test \
            --grep-invert "@collab|@capacity|BEHAVIORAL input coverage" \
            --shard=${{ matrix.shard }}/8 \
            --reporter=blob

      - name: Upload blob report (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          # Default blob-report location is the workspace root for the
          # playwright invocation; we ran with `--workspace e2e`, which sets
          # cwd to e2e/, so the output lands at e2e/blob-report/.
          path: e2e/blob-report
          retention-days: 7

      - name: Upload Playwright test-results on failure (shard ${{ matrix.shard }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-shard-${{ matrix.shard }}
          path: e2e/test-results
          retention-days: 14

  # -----------------------------------------------------------------------
  # merge-reports — downloads all 8 e2e blob artifacts and merges them into
  # a single HTML report. Uploaded as `playwright-report` so the artifact
  # name matches what reviewers expect (and what the previous monolithic
  # workflow uploaded).
  #
  # `if: always()` so we still get a merged report even if one shard failed
  # — that's the whole point of an aggregated dashboard for triage.
  #
  # Path note (bug fixed 2026-05-24): `npx --workspace e2e playwright ...`
  # runs Playwright with cwd = e2e/, so any relative path passed on the CLI
  # resolves relative to e2e/, not the repo root. We therefore download the
  # blob artifacts INTO e2e/all-blob-reports/ and pass `./all-blob-reports`
  # (which Playwright resolves to e2e/all-blob-reports). The previous version
  # downloaded to repo-root ./all-blob-reports and failed with
  # `Error: Directory does not exist: .../e2e/all-blob-reports`.
  # -----------------------------------------------------------------------
  merge-reports:
    name: Merge Playwright reports
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install workspace deps
        run: flox activate -- task install

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          # Download into e2e/all-blob-reports so the merge-reports step
          # below (which runs with cwd=e2e/ via --workspace e2e) finds
          # them at the relative path `./all-blob-reports`.
          path: e2e/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: |
          flox activate -- npx --workspace e2e playwright merge-reports \
            --reporter html \
            ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          # `playwright merge-reports --reporter html` writes to
          # `playwright-report/` in the cwd. We ran with `--workspace e2e`
          # so that's `e2e/playwright-report/`.
          path: e2e/playwright-report
          retention-days: 14

  # -----------------------------------------------------------------------
  # collab — the @collab multi-context Playwright specs, run on a SINGLE,
  # NON-SHARDED runner with --workers=1. These drive two+ independent browser
  # contexts (separate cookie jars / ydocs — real "two users on two machines")
  # against the in-memory Hocuspocus relay. Under the 8-shard × 4-worker fan-
  # out they flaked badly (the shared dev server + relay get hammered and
  # cross-context Yjs sync drops — task #97), so they were quarantined behind
  # `test.skip(!!process.env.CI)`. This dedicated job removes the shard
  # contention (its OWN runner + dev server + relay, modest 2-worker
  # parallelism vs the 8-shard × 4-worker fan-out that caused the flake) so the
  # DOOM 2-user test + the rest of the @collab suite are a RELIABLE gate. The
  # relay is in-memory so a single runner is cheap. Same DB + DOOM-asset + DSP
  # setup as e2e.
  # -----------------------------------------------------------------------
  collab:
    name: collab (@collab multi-context)
    needs: [dsp-build, build-web]
    runs-on: ubuntu-latest
    # 40 min ceiling: the full @collab suite (~41 specs incl. cold DOOM WASM +
    # several 2-context boots) at 2 workers finishes well under this; a single
    # serial worker overran the previous 25 min cap (the run was killed at 25m).
    timeout-minutes: 40

    services:
      postgres:
        # AWS ECR Public mirror (see note on the unit job) — avoids the flaky
        # Docker Hub service-container pull.
        image: public.ecr.aws/docker/library/postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: patchtogether_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/patchtogether_test
      # Opt the quarantined @collab DOOM specs back IN for this dedicated,
      # non-sharded job. They guard with `test.skip(process.env.CI &&
      # !process.env.COLLAB_JOB)` — skipped in the sharded matrix (shard
      # contention flake), RUN here (one worker, serial → reliable).
      COLLAB_JOB: '1'
      # Run @collab against `vite preview` (the built bundle) instead of the
      # `vite dev` server. The dev server's HMR client websocket drops under
      # the CPU pressure of two browser contexts + DOOM WASM, triggering a
      # full page reload mid-evaluate → spurious waitForFunction timeouts
      # (the residual @collab flake, #232/#225 — see doom-mp-real.spec's
      # `isTransientPageError` for the exact symptom). Preview serves static
      # files (no HMR client, far lighter at runtime), which kills that flake
      # class AND lowers overall CPU pressure behind the Yjs-sync stalls.
      # Requires a web build step below (preview serves build output).
      E2E_USE_PREVIEW: '1'

    steps:
      - name: Checkout (with LFS for ART/VRT baselines)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      - name: Install workspace deps + Playwright Chromium
        run: flox activate -- task setup

      # Restore the worklet dist built once by dsp-build — needed at runtime
      # alongside the downloaded preview bundle, exactly like the e2e shards.
      - name: Download DSP dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dsp-dist
          path: packages/dsp/dist

      - name: Apply DB schema
        run: flox activate -- psql "$DATABASE_URL" -f db/schema/001_init.sql

      - name: Cache DOOM WASM artifact
        id: cache-doom-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/doom/doom.js
            packages/web/static/doom/doom.wasm
          key: ${{ runner.os }}-doom-wasm-${{ hashFiles('packages/web/native/build-doom-wasm.sh', 'packages/web/native/doomgeneric/**') }}

      - name: Build DOOM WASM (emcc)
        if: steps.cache-doom-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-doom-wasm.sh

      # SNES9X WASM blob — emcc-compiled from the vendored snes9x2005 core +
      # snes9x_bridge.c. Same cache+build pattern as DOOM above: key is the
      # hash of build-snes9x-wasm.sh + the entire vendored native/snes9x tree.
      # Output is .gitignored (packages/web/.gitignore) so a hit restores
      # snes9x.{js,wasm} into static/snes9x/ in place; a miss runs the build
      # via flox (emcc is in the flox manifest). The SNES ROM itself stays
      # user-provided + gitignored, so the e2e ROM-gated spec skips in CI —
      # but the no-ROM dropzone smoke + the module's page-load import need the
      # WASM present.
      - name: Cache SNES9X WASM artifact
        id: cache-snes9x-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/snes9x/snes9x.js
            packages/web/static/snes9x/snes9x.wasm
          key: ${{ runner.os }}-snes9x-wasm-${{ hashFiles('packages/web/native/build-snes9x-wasm.sh', 'packages/web/native/snes9x/**') }}

      - name: Build SNES9X WASM (emcc)
        if: steps.cache-snes9x-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-snes9x-wasm.sh

      - name: Cache DOOM1.WAD (shareware)
        id: cache-doom-wad
        uses: actions/cache@v4
        with:
          path: packages/web/static/doom/DOOM1.WAD
          key: doom-wad-shareware-v1

      - name: Download DOOM1.WAD (shareware)
        if: steps.cache-doom-wad.outputs.cache-hit != 'true'
        run: |
          curl -L --fail --silent --show-error \
            -o packages/web/static/doom/DOOM1.WAD \
            https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad
          echo "5b2e249b9c5133ec987b3ea77596381dc0d6bc1d  packages/web/static/doom/DOOM1.WAD" \
            | shasum -a 1 -c -

      - name: Emit registry manifest for E2E
        run: flox activate -- task test:emit-manifest

      # (DSP dist was restored from the dsp-build artifact above.)

      # @collab runs under `vite preview` (E2E_USE_PREVIEW=1, set in env above).
      # DOWNLOAD the prebuilt bundle the `build-web` job already produced instead
      # of rebuilding it here — a full `task build:web` ran on EVERY collab run
      # (not cache-gated) and was the main reason this job blew its 40-min ceiling
      # and got cancelled (the e2e shards already consume this same artifact).
      # The bundle bakes in the DOOM/SNES9X/WAD static assets, so the specs get
      # them from here; the cache-gated DOOM/WAD steps above remain for the C-side
      # lockstep-barrier oracle, which builds + runs DOOM independently.
      - name: Download web preview bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: web-preview-dist
          path: packages/web/.svelte-kit/output

      # P1 true-lockstep: prove the LIVE barrier path (dgpt_set_lockstep +
      # dgpt_receive_ticset) is BIT-EXACT across N sims on a FRESH WASM build,
      # before the relay-flaky @collab e2e. This is the deterministic C-side
      # oracle (no relay, no browser) — it builds the DOOM_MP node artifact and
      # asserts two & four sims stay byte-identical for 200 tics through the
      # real barrier + that a withheld TicSet PAUSES (never spins) and resumes.
      - name: DOOM true-lockstep barrier acceptance (bit-exact, fresh build)
        run: flox activate -- node packages/web/native/doomgeneric/tests/lockstep-barrier.acceptance.mjs

      # Single worker, serial — no shard contention. `task collab` is
      # `playwright test --grep @collab --workers=1`. Generous per-job timeout
      # (25 min) absorbs the cold DOOM WASM + 2-context boot.
      - name: Run @collab specs (single non-sharded worker)
        run: flox activate -- task collab

      - name: Upload Playwright test-results on failure (@collab)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-collab
          path: e2e/test-results
          retention-days: 14

  # -----------------------------------------------------------------------
  # behavioral-coverage — the heavy behavioral input-coverage sweep
  # (per-module-per-port-behavioral.spec.ts). ~100 module-level tests,
  # each iterating its module's inputs with 2-spawn control-vs-patched
  # comparisons. Wall-time ~25-30 min UNSHARDED at 4 workers — too heavy
  # to roll into the main 8-way shard matrix (would balloon each shard
  # from ~3-4 min to ~8-10 min).
  #
  # SHARDED 6 ways (same pattern as the `e2e` job): a `shard: [1..6]/6`
  # matrix with `--shard=${{matrix.shard}}/6` + blob reporter, then a
  # `merge-behavioral-reports` job downloads all 6 blobs and merges them
  # into a single HTML report. ~100 tests / 6 shards ≈ 17 tests/shard at 4
  # workers each → a few minutes per shard instead of a ~50-min tail.
  # Each shard runs on its own dedicated runner with full DB + DSP setup.
  #
  # NOT a required status check — landing it as informational lets the
  # gating decision happen separately after the tier proves itself
  # reliable. Stays `continue-on-error: true` (another agent is tuning
  # its per-module thresholds separately; do not change its required-ness
  # or its assertions). Promote to the `ci` umbrella `needs:` list to
  # make it blocking once thresholds are tuned.
  #
  # TODO(behavioral-coverage): non-blocking until per-module threshold tuning lands.
  # Current spec (PR #471) uses a delta threshold that's too tight for modules with
  # subtle CV→audio effects (envelope-amount knobs, decay, etc.). Whack-a-mole
  # exempting modules (grids/sequencer/adsr/buggles/backdraft/qbert/peaks/treeohvox/
  # mixmstrs all failing as of 2026-05-30) is the wrong fix. Tune thresholds per
  # module or per port-type, then flip continue-on-error off + re-add to aggregator.
  # Tracking task TBD.
  # -----------------------------------------------------------------------
  behavioral-coverage:
    name: behavioral input coverage (shard ${{ matrix.shard }}/6)
    needs: [dsp-build, build-web]
    runs-on: ubuntu-latest
    # GATED lane (2026-06-03): the per-port stabilization pass landed, so this
    # is now a real gate via the `ci` umbrella (`needs:` + failure check). Each
    # failing input is either driven (BEHAVIORAL_PARAMS) or has a justified
    # BEHAVIORAL_SWEEP_EXEMPT/MODULE_EXEMPT with a DSP-test pointer. (Was
    # `continue-on-error: true` while informational; removed now that it gates.)
    # 20 min ceiling per shard: sharded 6 ways the per-shard work is a few
    # minutes; cushion for cold-cache CI runs + setup time.
    timeout-minutes: 20

    strategy:
      # Don't fail-fast: surface independent failures across all 6 shards in
      # one run rather than masking shards 2-6 when shard 1 trips a threshold.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]

    services:
      postgres:
        # AWS ECR Public mirror (see note on the unit job) — avoids the flaky
        # Docker Hub service-container pull.
        image: public.ecr.aws/docker/library/postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: patchtogether_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/patchtogether_test

    steps:
      - name: Checkout (with LFS for ART/VRT baselines)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      - name: Install workspace deps + Playwright Chromium
        run: flox activate -- task setup

      # Restore the worklet dist built once by dsp-build, then the prebuilt
      # preview bundle from build-web. The behavioral sweep runs under
      # E2E_USE_PREVIEW (vite preview) like the e2e shards, so the served app
      # is prebuilt — no on-demand dev-server compile, which was flaking some
      # shards under load (drummergirl/moog911/sequencer passed once the
      # server was warm).
      - name: Download DSP dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dsp-dist
          path: packages/dsp/dist

      - name: Download web preview bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: web-preview-dist
          path: packages/web/.svelte-kit/output

      - name: Apply DB schema
        run: flox activate -- psql "$DATABASE_URL" -f db/schema/001_init.sql

      - name: Emit registry manifest for E2E
        run: flox activate -- task test:emit-manifest

      # (DSP dist was restored from the dsp-build artifact above.)

      - name: Run E2E (behavioral input coverage, shard ${{ matrix.shard }}/6, 4 workers, blob reporter)
        env:
          E2E_USE_PREVIEW: '1'
        run: |
          flox activate -- npx --workspace e2e playwright test \
            per-module-per-port-behavioral.spec.ts \
            --shard=${{ matrix.shard }}/6 \
            --workers=4 \
            --reporter=blob

      - name: Upload blob report (behavioral shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Default blob-report location is the cwd of the playwright
          # invocation; we ran with `--workspace e2e` so the output lands at
          # e2e/blob-report/.
          name: behavioral-blob-report-${{ matrix.shard }}
          path: e2e/blob-report
          retention-days: 7

      - name: Upload Playwright test-results on failure (behavioral shard ${{ matrix.shard }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-behavioral-shard-${{ matrix.shard }}
          path: e2e/test-results
          retention-days: 14

  # -----------------------------------------------------------------------
  # merge-behavioral-reports — downloads all 6 behavioral blob artifacts and
  # merges them into a single HTML report. Mirrors the `merge-reports` job
  # for the e2e shards. `if: always()` so we get an aggregated dashboard for
  # triage even when a shard fails (continue-on-error keeps the behavioral
  # lane non-blocking regardless).
  #
  # Path note (same as merge-reports): `npx --workspace e2e playwright ...`
  # runs with cwd = e2e/, so we download the blobs INTO
  # e2e/all-behavioral-blob-reports/ and pass the relative
  # `./all-behavioral-blob-reports`.
  # -----------------------------------------------------------------------
  merge-behavioral-reports:
    name: Merge behavioral Playwright reports
    if: always()
    needs: [behavioral-coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install workspace deps
        run: flox activate -- task install

      - name: Download behavioral blob reports
        uses: actions/download-artifact@v4
        with:
          path: e2e/all-behavioral-blob-reports
          pattern: behavioral-blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: |
          flox activate -- npx --workspace e2e playwright merge-reports \
            --reporter html \
            ./all-behavioral-blob-reports

      - name: Upload merged behavioral HTML report
        uses: actions/upload-artifact@v4
        with:
          # `playwright merge-reports --reporter html` writes to
          # `playwright-report/` in the cwd (e2e/ via --workspace e2e).
          name: behavioral-playwright-report
          path: e2e/playwright-report
          retention-days: 14

  # -----------------------------------------------------------------------
  # ci (umbrella) — gates branch protection. Required status check named
  # `typecheck + unit + ART + E2E` (see ruleset 16042163). This job exists
  # ONLY to preserve that name and aggregate the pass/fail of the split
  # jobs above — no real work is done here.
  #
  # `if: always()` makes the job run even when a dependency fails so it can
  # report a definitive failed status (otherwise GitHub leaves it "skipped"
  # and the required-status-check stays pending → PR can't merge or be
  # marked failed). The shell guard below fails the job if any needed job
  # didn't succeed.
  # -----------------------------------------------------------------------
  ci:
    name: typecheck + unit + ART + E2E
    if: always()
    # collab is now a REAL GATE (re-added 2026-06-03): the @collab relay flake
    # was root-caused + fixed (in-card-title networkidle hang #558; doom-4context
    # graceful resource-skip) and the job is fast (~6.5 min — it consumes the
    # prebuilt web bundle #557), so depending on it no longer risks the 40-min
    # wait #555 removed. merge-reports stays OUT (cosmetic, never gated).
    # behavioral stays OUT too (still informational — see note in the check).
    needs: [actionlint, typecheck, unit, dsp-build, build-web, art, build, e2e, collab, behavioral-coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Aggregate result
        env:
          ACTIONLINT: ${{ needs.actionlint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          UNIT: ${{ needs.unit.result }}
          DSP_BUILD: ${{ needs.dsp-build.result }}
          BUILD_WEB: ${{ needs.build-web.result }}
          ART: ${{ needs.art.result }}
          BUILD: ${{ needs.build.result }}
          E2E: ${{ needs.e2e.result }}
          COLLAB: ${{ needs.collab.result }}
          BEHAVIORAL: ${{ needs.behavioral-coverage.result }}
        run: |
          echo "actionlint:    $ACTIONLINT"
          echo "typecheck:     $TYPECHECK"
          echo "unit:          $UNIT"
          echo "dsp-build:     $DSP_BUILD"
          echo "build-web:     $BUILD_WEB"
          echo "art:           $ART"
          echo "build:         $BUILD"
          echo "e2e:           $E2E"
          echo "collab:        $COLLAB"
          echo "behavioral:    $BEHAVIORAL"
          # `e2e` is a matrix; its aggregated result is `success` only if all
          # shards succeeded. `collab` + `behavioral-coverage` are now GATED
          # (checked below). `merge-reports` stays OUT (cosmetic; never gated).
          #
          # `build` is the PRODUCTION-bundle gate (`task build` = dsp:build +
          # `vite build`). It's gated here so a broken prod bundle fails this
          # already-required umbrella → blocks merge with no ruleset change.
          # This closes the Clerk #464 gap where a broken bundle merged because
          # no required check ran the production bundler.
          #
          # `dsp-build` compiles the Faust worklets ONCE and is a dependency of
          # art/build/build-web/e2e/collab (+ vrt/behavioral). A failure there
          # cascades to those jobs, but we gate on it explicitly so a broken DSP
          # compile produces a clear, fast failure signal instead of a wall of
          # confusing "artifact not found" downloads.
          #
          # `build-web` builds the Vite/SvelteKit preview bundle ONCE; the 8
          # e2e shards download it and run against `vite preview`. It's gated
          # here so a broken web build (or a missing test-hooks bundle) fails
          # this umbrella → the e2e shards would otherwise fail confusingly on
          # an "artifact not found" download.
          #
          # `behavioral-coverage` (BEHAVIORAL) is now GATED too (2026-06-03):
          # the per-port stabilization pass landed (driver-params + justified
          # exempts) so the lane is clean. `merge-reports` is the only
          # informational job still left out of this gate.
          if [[ "$ACTIONLINT" != "success" \
             || "$TYPECHECK" != "success" \
             || "$UNIT" != "success" \
             || "$DSP_BUILD" != "success" \
             || "$BUILD_WEB" != "success" \
             || "$ART" != "success" \
             || "$BUILD" != "success" \
             || "$E2E" != "success" \
             || "$COLLAB" != "success" \
             || "$BEHAVIORAL" != "success" ]]; then
          # collab + behavioral are now GATED (2026-06-03): collab's relay flake
          # was fixed (#558, fast via #557); behavioral's per-port pass made the
          # lane clean (driver-params + justified exempts).
            echo "::error::One or more required CI jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed."

  # -----------------------------------------------------------------------
  # Visual Regression Tests (Playwright `toHaveScreenshot`). Separate job
  # from the main `ci` so a baseline drift on one card doesn't kneecap the
  # functional E2E run.
  #
  # Modeled on doomviz's vrt job: lfs-true checkout (baselines are
  # LFS-tracked under e2e/vrt/__screenshots__/**), upload test-results +
  # generated gallery as artifacts.
  #
  # Required status check — included in the `main: green PRs only` ruleset
  # (id 16042163). Drift here blocks merges; missing-baseline edge cases are
  # gated by `EXEMPT_BASELINE_PAIRS` in the new VRT spec files (with linux
  # captures pending per-spec). Renaming this job requires an accompanying
  # ruleset update (`gh api repos/.../rulesets/16042163`) to swap the
  # `context` in `required_status_checks` — names are matched literally.
  # -----------------------------------------------------------------------
  vrt:
    name: VRT (visual regression)
    needs: dsp-build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        # AWS ECR Public mirror (see note on the unit job) — avoids the flaky
        # Docker Hub service-container pull.
        image: public.ecr.aws/docker/library/postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: patchtogether_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/patchtogether_test

    steps:
      - name: Checkout (LFS required for VRT baseline PNGs)
        uses: actions/checkout@v4
        with:
          # MUST be true — VRT baselines live under e2e/vrt/__screenshots__/
          # and are stored as LFS pointers in the regular tree. Without
          # this, `toHaveScreenshot` compares against the pointer-file
          # bytes (~130 bytes of metadata) instead of the real PNG and
          # every test "fails" with a giant diff.
          lfs: true

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      - name: Install workspace deps + Playwright Chromium
        run: flox activate -- task setup

      # Restore the worklet dist built once by dsp-build, BEFORE `task vrt`
      # (whose dsp:build dep then no-ops via the .dsp-srchash status guard);
      # the VRT cards import `?url` artifacts from packages/dsp/dist/.
      - name: Download DSP dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dsp-dist
          path: packages/dsp/dist

      - name: Apply DB schema
        run: flox activate -- psql "$DATABASE_URL" -f db/schema/001_init.sql

      # Share the same DOOM WASM cache the `ci` job uses; the VRT spec set
      # also exercises the DOOM card so the bundle has to be on disk before
      # the SvelteKit dev server starts (Vite serves `static/doom/*` as-is).
      - name: Cache DOOM WASM artifact
        id: cache-doom-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/doom/doom.js
            packages/web/static/doom/doom.wasm
          key: ${{ runner.os }}-doom-wasm-${{ hashFiles('packages/web/native/build-doom-wasm.sh', 'packages/web/native/doomgeneric/**') }}

      - name: Build DOOM WASM (emcc)
        if: steps.cache-doom-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-doom-wasm.sh

      # SNES9X WASM blob — emcc-compiled from the vendored snes9x2005 core +
      # snes9x_bridge.c. Same cache+build pattern as DOOM above: key is the
      # hash of build-snes9x-wasm.sh + the entire vendored native/snes9x tree.
      # Output is .gitignored (packages/web/.gitignore) so a hit restores
      # snes9x.{js,wasm} into static/snes9x/ in place; a miss runs the build
      # via flox (emcc is in the flox manifest). The SNES ROM itself stays
      # user-provided + gitignored, so the e2e ROM-gated spec skips in CI —
      # but the no-ROM dropzone smoke + the module's page-load import need the
      # WASM present.
      - name: Cache SNES9X WASM artifact
        id: cache-snes9x-wasm
        uses: actions/cache@v4
        with:
          path: |
            packages/web/static/snes9x/snes9x.js
            packages/web/static/snes9x/snes9x.wasm
          key: ${{ runner.os }}-snes9x-wasm-${{ hashFiles('packages/web/native/build-snes9x-wasm.sh', 'packages/web/native/snes9x/**') }}

      - name: Build SNES9X WASM (emcc)
        if: steps.cache-snes9x-wasm.outputs.cache-hit != 'true'
        run: flox activate -- bash packages/web/native/build-snes9x-wasm.sh

      - name: Run VRT
        run: flox activate -- task vrt

      - name: Build VRT gallery (baselines + last run's diffs)
        if: always()
        run: flox activate -- task vrt:gallery

      - name: Upload VRT gallery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-gallery
          path: docs/vrt
          retention-days: 14

      - name: Upload Playwright VRT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-playwright-report
          path: e2e/vrt/report
          retention-days: 14

      - name: Upload Playwright VRT test-results (actual + diff PNGs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-test-results
          path: e2e/vrt/test-results
          retention-days: 14

  # -----------------------------------------------------------------------
  # VRT (strict subset) — fast, deterministic gate. Runs ONLY the pure-DOM
  # knob/fader cards listed in STRICT_VRT_MODULES (see
  # e2e/vrt/vrt-exemptions.ts). These cards have baselines on BOTH platforms,
  # no canvas masks, and no animated chrome — a diff here is a real UI
  # regression, not platform/GPU/timing flake.
  #
  # Intended to become the required status check for VRT (replacing the
  # `VRT (visual regression)` job above as the gate). The full-sweep `vrt`
  # job above stays as the informational lane for canvas-driven + animated
  # cards (covers more surface, may flake — never blocks merge).
  #
  # Migration: until the `main: green PRs only` ruleset (16042163) is
  # updated to require this job's `name` as a status check, the full `vrt`
  # job above remains the technically-required gate (its name was the
  # original ruleset entry). A follow-up ops PR should run
  #   gh api -X PUT repos/:owner/:repo/rulesets/16042163 \
  #     -F rules='...required_status_checks: contexts: ["vrt-strict (visual regression — strict subset)"]'
  # to flip the required check, and the full `vrt` job above can then be
  # marked `continue-on-error: true` (informational lane).
  # -----------------------------------------------------------------------
  vrt-strict:
    name: vrt-strict (visual regression — strict subset)
    needs: dsp-build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (LFS required for VRT baseline PNGs)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      - name: Install workspace deps + Playwright Chromium
        run: flox activate -- task setup

      # Restore the worklet dist built once by dsp-build, BEFORE `task
      # vrt:strict` (whose dsp:build dep then no-ops via the .dsp-srchash
      # status guard).
      - name: Download DSP dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dsp-dist
          path: packages/dsp/dist

      # No DB needed for the strict subset (it's pure card-render baselines).
      # No DOOM WASM needed either — DOOM is in EXEMPT_FROM_VRT.

      - name: Run VRT (strict subset)
        run: flox activate -- task vrt:strict

      - name: Upload Playwright VRT-strict test-results (actual + diff PNGs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-strict-test-results
          path: e2e/vrt/test-results
          retention-days: 14

      - name: Upload Playwright VRT-strict report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-strict-playwright-report
          path: e2e/vrt/report
          retention-days: 14
