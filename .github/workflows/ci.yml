name: CI

# Runs the full PR-gate suite (typecheck + unit + ART + Playwright E2E) on every
# push to main and every PR targeting main. The whole pipeline executes inside
# the project's Flox environment so the toolchain (Node 22.22.2, Faust 2.85.5,
# esbuild, go-task, git-lfs, gh) matches what developers run locally.

on:
  push:
    branches: [main, first-mvp]
    paths-ignore:
      - '**/*.md'
      - '.myrobots/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.myrobots/**'
      - 'LICENSE'

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck + unit + ART + E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      # Postgres for the persistence layer (Stage B1+). Both the SvelteKit
      # webServer and the Hocuspocus server read DATABASE_URL.
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: patchtogether_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/patchtogether_test

    steps:
      - name: Checkout (with LFS for ART/VRT baselines)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Cache npm + Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      # Cache .svelte-kit/. svelte-kit sync regenerates this from svelte.config.js
      # + the routes tree; if those didn't change, the cached output (generated
      # types + tsconfig) is valid and svelte-check skips work. Stale-cache
      # failure mode is "type errors at typecheck time", which is loud — safe.
      - name: Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: packages/web/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('packages/web/svelte.config.js', 'packages/web/src/routes/**', 'packages/web/package.json') }}

      - name: Install workspace deps + Playwright Chromium
        run: flox activate -- task setup

      - name: Apply DB schema
        run: flox activate -- psql "$DATABASE_URL" -f db/schema/001_init.sql

      # Note: dsp:build is no longer a separate step. `task ci` runs `task art`
      # which already declares `deps: [dsp:build]`, so the WASM bundle is built
      # exactly once per run instead of twice (saves ~4s).
      - name: Run full CI suite (typecheck + unit + ART + E2E)
        run: flox activate -- task ci

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14

      - name: Upload Playwright test-results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results
          retention-days: 14
