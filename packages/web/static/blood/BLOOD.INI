; BLOOD.INI - shareware episode descriptor ("Blood: The Way of All Flesh").
;
; This is the small plain-text episode/level table the Blood game engine
; (NBlood, levels.cpp -> levelLoadDefaults / levelLoadMapInfo) reads on boot to
; learn which maps make up each episode, their titles, music tracks, and the
; per-map end-of-level routing. Without it the engine aborts at
; levels.cpp:71 "Initialization: BLOOD.INI does not exist" (it is NOT stored
; inside BLOOD.RFF; the shareware ships it as a separate on-disk file).
;
; It references exactly the 8 single-player maps E1M1..E1M8 that the bundled
; shareware BLOOD.RFF contains (verified from the RFF directory: 8 MAP entries
; E1M1..E1M8). The titles/track numbers are the stock shareware episode-1 values.
; Map names are given WITHOUT extension, as the engine resolves them out of the
; RFF (cf. the gINIDescription "BLOOD: One Unit Whole Blood" -> BLOOD.INI entry
; in blood.cpp). EndingA chains each map to the next; the last has no EndingA.

[Episode1]
Title = The Way of All Flesh
CutWavA = -1
CutWavB = -1

Map1 = E1M1
Map2 = E1M2
Map3 = E1M3
Map4 = E1M4
Map5 = E1M5
Map6 = E1M6
Map7 = E1M7
Map8 = E1M8

[E1M1]
Title = Cradle to Grave
Track = 2
EndingA = 2

[E1M2]
Title = Wrong Side of the Tracks
Track = 3
EndingA = 3

[E1M3]
Title = Phantom Express
Track = 4
EndingA = 4

[E1M4]
Title = Dark Carnival
Track = 5
EndingA = 5

[E1M5]
Title = Hallowed Grounds
Track = 6
EndingA = 6

[E1M6]
Title = The Great Temple
Track = 7
EndingA = 7

[E1M7]
Title = Altar of Stone
Track = 8
EndingA = 8

[E1M8]
Title = House of Horrors
Track = 9
