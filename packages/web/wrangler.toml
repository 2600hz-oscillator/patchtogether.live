# Cloudflare Pages worker config for the patchtogether.live SvelteKit app.
#
# nodejs_compat is required because @grame/faustwasm's ESM build does
# `await import("fs")` and `await import("url")` at module-eval time. Those
# code paths only execute under real Node (Faust's CLI tooling) and are
# unreachable in our browser-loaded code, but the bundler still has to
# resolve them — nodejs_compat tells wrangler/Workers Runtime that Node
# built-ins are available, which makes the bundle build cleanly.
#
# name is overridden by --project-name=… on every deploy command, so the
# value here is just a placeholder. pages_build_output_dir is what tells
# wrangler "this is a Pages config, not a Workers config" — without it the
# whole file gets ignored by `wrangler pages deploy`.

name = "patchtogether-live"
pages_build_output_dir = ".svelte-kit/cloudflare"

compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# Clerk env vars are NOT in this file — we want different Clerk instances
# per Pages project (test instance for autotest/dev/PR-preview, eventual
# prod instance for patchtogether.live), and wrangler.toml [vars] applies
# the same value to every project. Each project gets its own
# PUBLIC_CLERK_PUBLISHABLE_KEY + CLERK_SECRET_KEY via the Cloudflare
# dashboard's Variables and Secrets panel. Prod project: no Clerk env at
# all until we promote to live keys (anonymous /  works; auth flows fail
# loudly — by design until launch).
