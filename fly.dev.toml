# fly.dev.toml — Hocuspocus collaboration server, dev tier.
#
# Deploy with (from workspace root):
#   flyctl deploy --config fly.dev.toml
#
# Same shape as autotest (auto-stop, scale to zero). Distinct from
# autotest so dogfooding sessions on dev.patchtogether.live don't
# share Yjs state with whatever Playwright happens to be running.

app = "patchtogether-server-dev"
primary_region = "iad"

[build]
  dockerfile = "packages/server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
