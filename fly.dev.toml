# fly.dev.toml — Hocuspocus collaboration server, dev tier.
#
# Deploy with (from workspace root):
#   flyctl deploy --config fly.dev.toml
#
# Distinct app from autotest so dogfooding sessions on dev.patchtogether.live
# don't share Yjs state with whatever Playwright happens to be running.
#
# SINGLE-MACHINE INVARIANT (do not break): the relay keeps live Yjs doc
# state AND the per-rack connection-slot tracker in process memory — the
# architecture explicitly assumes "one process serves all rackspaces"
# (see packages/server/src/index.ts + capacity.ts). If Fly runs two
# machines, two users in the same rack can land on DIFFERENT machines,
# attach to DIFFERENT in-memory docs, and never see each other's modules
# — the exact intermittent "works sometimes" sync failure on dev. So:
#   - min_machines_running = 1 (stay warm; one canonical doc host)
#   - auto_stop_machines = "off" + auto_start_machines = false (no fan-out)
#   - the app MUST have exactly ONE machine. After deploy, verify with
#     `flyctl machines list -a patchtogether-server-dev` and destroy any
#     extras (`flyctl machine destroy <id>`). Dev historically had two
#     stopped machines from an earlier scale-up; that split-brain is the
#     root cause this config closes.
# Same single-machine shape as prod (fly.prod.toml) for this reason; dev
# trades the cents of a warm 256MB shared VM for reliable dogfooding sync.

app = "patchtogether-server-dev"
primary_region = "iad"

[build]
  dockerfile = "packages/server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  # Deploy version surfaced on /health + /metrics (server_version) so a monitor
  # or deploy smoke can confirm WHICH build is live and detect a stale relay.
  SERVER_VERSION = "1.0.1-dev"
  # Memory-alarm thresholds (MB) for the 30s [relay-alarm] log + Better Stack
  # /metrics body-match monitor. Sized for THIS tier's 1024MB machine (the prod
  # 200/230 would false-alarm constantly on a box this large).
  RELAY_MEM_WARN_MB = "750"
  RELAY_MEM_CRIT_MB = "900"
  # NOTE: BETTERSTACK_HEARTBEAT_URL and LOGTAIL_SOURCE_TOKEN are SECRETS — set
  # via `flyctl secrets set -a patchtogether-server-dev ...`, never here.

[[services]]
  protocol = "tcp"
  internal_port = 8080
  # Stay warm on a SINGLE machine — see the single-machine invariant note
  # at the top of this file. auto_stop/start off + min 1 keeps exactly one
  # canonical in-memory doc host so two users in a rack can't split-brain
  # onto separate machines.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  # HTTP health check on /health — lets Fly restart a wedged-but-listening relay
  # that a TCP-only check would consider healthy. See fly.prod.toml for detail.
  [[services.http_checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
