  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.11.0",
    "install": {
      "esbuild": {
        "pkg-path": "esbuild"
      },
      "faust2": {
        "pkg-path": "faust2",
        "version": "2.85.5"
      },
      "flyctl": {
        "pkg-path": "flyctl"
      },
