      },
      "nodejs_22": {
        "pkg-path": "nodejs_22",
        "version": "22.22.2"
      }
    },
    "vars": {
      "PROJECT_NAME": "inet.modular"
    },
    "hook": {
      "on-activate": "  # Initialize git-lfs in the repo on first activation\n  if [ -d \"$FLOX_ENV_PROJECT/.git\" ] && ! git -C \"$FLOX_ENV_PROJECT\" lfs env >/dev/null 2>&1; then\n    git -C \"$FLOX_ENV_PROJECT\" lfs install --local >/dev/null 2>&1 || true\n  fi\n"
    },
    "profile": {
      "common": "  echo \"🎛  $PROJECT_NAME — node $(node --version), faust $(faust --version 2>&1 | head -1 | cut -d' ' -f3)\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "x86_64-darwin",
        "aarch64-linux",
        "x86_64-linux"
      ]
    }
  },
