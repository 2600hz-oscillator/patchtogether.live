schema-version = "1.11.0"


[install]
# Runtime
nodejs_22.pkg-path = "nodejs_22"
nodejs_22.version  = "22.22.2"

# DSP toolchain
faust2.pkg-path = "faust2"
faust2.version  = "2.85.5"

# Emscripten (C/C++ → wasm) — used by `task dsp:build:plaits` to compile
# the vendored Mutable Instruments Plaits engines under
# packages/dsp/vendor/plaits into a single .wasm + JS glue. Pinned to a known
# 4.x LTS-ish release so ART baselines stay deterministic across CI hosts.
emscripten.pkg-path = "emscripten"
emscripten.version  = "4.0.10"
# Emscripten pulls a different llvm/clang/python toolchain than the rest of
# the stack — keep it in its own pkg-group so we don't tighten constraints
# on faust2 / nodejs.
emscripten.pkg-group = "emcc"

# Build tools
esbuild.pkg-path = "esbuild"

# Task runner (npm/script orchestration via Taskfile.yml)
go-task.pkg-path = "go-task"

# Git LFS for ART/VRT baselines
git-lfs.pkg-path = "git-lfs"
gh.pkg-path = "gh"
flyctl.pkg-path = "flyctl"
postgresql.pkg-path = "postgresql"

# ALSA runtime — node-web-audio-api dlopens libasound.so.2 even for
# OfflineAudioContext use. Linux only; macOS uses CoreAudio.
alsa-lib.pkg-path = "alsa-lib"
alsa-lib.systems = ["x86_64-linux", "aarch64-linux"]


[vars]
# Project name surfaces in dev shell prompts and scripts
PROJECT_NAME = "patchtogether.live"


[hook]
on-activate = '''
  # Initialize git-lfs in the repo on first activation
  if [ -d "$FLOX_ENV_PROJECT/.git" ] && ! git -C "$FLOX_ENV_PROJECT" lfs env >/dev/null 2>&1; then
    git -C "$FLOX_ENV_PROJECT" lfs install --local >/dev/null 2>&1 || true
  fi
'''


[profile]
common = '''
  echo "🎛  $PROJECT_NAME — node $(node --version), faust $(faust --version 2>&1 | head -1 | cut -d' ' -f3)"
'''


[options]
systems = [
  "aarch64-darwin",
  "x86_64-darwin",
  "aarch64-linux",
  "x86_64-linux",
]
