# fly.autotest.toml — Hocuspocus collaboration server, autotest tier.
#
# Deploy with (from workspace root):
#   flyctl deploy --config fly.autotest.toml
#
# Cheaper than prod: machines auto-stop when idle since rackspaces here
# are short-lived test scenarios, not user sessions. First connection to
# an idle app eats a ~3s cold-start.
#
# SINGLE-MACHINE INVARIANT (do not break): the relay holds live Yjs doc
# state in process memory, so two simultaneously-running machines would
# split-brain a shared rack (see packages/server/src/index.ts + the note
# in fly.prod.toml). Scaling to zero is fine (state is disposable between
# test runs), but the app MUST have exactly ONE machine total so Fly never
# autostarts a second alongside the first. After deploy verify with
# `flyctl machines list -a patchtogether-server-autotest` and destroy extras.

app = "patchtogether-server-autotest"
primary_region = "iad"

[build]
  dockerfile = "packages/server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  # Autotest can scale to zero — Yjs in-memory state is acceptable to
  # lose between test runs, and the cold-start is part of what an e2e
  # test should verify works under real conditions.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
