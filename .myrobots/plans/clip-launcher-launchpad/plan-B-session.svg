<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <!-- PLAN B · SESSION — monome-parity-plus. Unit L = clip matrix (mirrors today's
       grid 1:1). Unit R = a COMMAND DECK (held copy/paste/reverse · LENGTH-EDIT ·
       DOUBLE · scene · QNT/NOW launch-quantize). -->
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b1d23"/><stop offset="1" stop-color="#0e1015"/></linearGradient>
    <filter id="padB" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>
  <rect width="1180" height="560" rx="18" fill="url(#bgB)"/>
  <text x="36" y="40" fill="#e8eaf0" font-size="21" font-weight="700">PLAN B — monome-parity-plus · Unit L = clip matrix, Unit R = command deck</text>
  <text x="36" y="62" fill="#8b90a0" font-size="12.5">Unit L reproduces today's 8-lane × 8-slot grid exactly (with colour). Unit R holds held copy/paste/reverse · LENGTH-EDIT · DOUBLE · QNT/NOW · scene + per-lane mute/solo.</text>

  <!-- ===== UNIT L : clip matrix ===== -->
  <g transform="translate(40,92)">
    <rect x="-14" y="-14" width="492" height="448" rx="16" fill="#0a0b0f" stroke="#2a2d36" stroke-width="1.5"/>
    <text x="0" y="-22" fill="#9aa0b2" font-size="12" font-weight="700">UNIT L · usb id 1 · CLIP MATRIX (8 lanes × 8 slots)</text>
    <!-- top row: scene launch -->
    <g><rect x="0" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padB)"/><rect x="52" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padB)"/><rect x="104" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padB)"/><rect x="156" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padB)"/><rect x="208" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padB)"/><rect x="260" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padB)"/><rect x="312" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padB)"/><rect x="364" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padB)"/>
      <text x="130" y="26" fill="#3a2a08" font-size="11" font-weight="700">SCENE LAUNCH (fire whole row)</text></g>
    <!-- 8x8 matrix, lanes = rows, slots = cols -->
    <g transform="translate(0,52)">
      <g transform="translate(0,0)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#2fd06a"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
      <g transform="translate(0,52)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#26c6c6"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/></g>
      <g transform="translate(0,104)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#2fd06a" opacity="0.5"/><rect x="156" y="0" width="46" height="46" rx="9" fill="none" stroke="#2fd06a" stroke-width="2.5" stroke-dasharray="5 4"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
      <g transform="translate(0,156)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
      <g transform="translate(0,208)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#2fd06a"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
      <g transform="translate(0,260)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
      <g transform="translate(0,312)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
    </g>
    <!-- right column = per-lane STOP -->
    <g transform="translate(420,52)">
      <rect x="0" y="0"   width="46" height="46" rx="9" fill="#d23b3b"/><rect x="0" y="52"  width="46" height="46" rx="9" fill="#8a4a14"/><rect x="0" y="104" width="46" height="46" rx="9" fill="#8a4a14"/><rect x="0" y="156" width="46" height="46" rx="9" fill="#8a4a14"/><rect x="0" y="208" width="46" height="46" rx="9" fill="#d23b3b"/><rect x="0" y="260" width="46" height="46" rx="9" fill="#8a4a14"/><rect x="0" y="312" width="46" height="46" rx="9" fill="#8a4a14"/>
      <text x="-2" y="372" fill="#5a6072" font-size="9">per-lane STOP (bright=playing)</text>
    </g>
    <g transform="translate(420,0)"><rect x="0" y="0" width="46" height="40" rx="9" fill="#d23b3b"/><text x="4" y="18" fill="#fff" font-size="8.5" font-weight="700">STOP</text><text x="8" y="30" fill="#fff" font-size="8.5" font-weight="700">ALL</text></g>
  </g>

  <!-- ===== UNIT R : command deck ===== -->
  <g transform="translate(610,92)">
    <rect x="-14" y="-14" width="492" height="448" rx="16" fill="#0a0b0f" stroke="#2a2d36" stroke-width="1.5"/>
    <text x="0" y="-22" fill="#9aa0b2" font-size="12" font-weight="700">UNIT R · usb id 2 · COMMAND DECK (modifiers · clipboard · mixer)</text>

    <!-- top row: global transport + record + arrange/session toggle -->
    <g>
      <rect x="0"   y="0" width="46" height="40" rx="9" fill="#2f7d52"/><text x="8" y="25" fill="#fff" font-size="13" font-weight="700">▶</text>
      <rect x="52"  y="0" width="46" height="40" rx="9" fill="#ff3b3b"/><text x="14" y="25" fill="#fff" font-size="13" font-weight="700">●</text>
      <rect x="104" y="0" width="46" height="40" rx="9" fill="#e8e8ff"/><text x="110" y="24" fill="#222" font-size="9" font-weight="700">SONG</text>
      <rect x="156" y="0" width="46" height="40" rx="9" fill="#e8e8ff"/><text x="160" y="24" fill="#222" font-size="9" font-weight="700">ALIGN</text>
      <rect x="208" y="0" width="46" height="40" rx="9" fill="#26c6c6"/><text x="214" y="24" fill="#063" font-size="9" font-weight="700">COPY</text>
      <rect x="260" y="0" width="46" height="40" rx="9" fill="#9b6cff"/><text x="266" y="24" fill="#fff" font-size="9" font-weight="700">PASTE</text>
      <rect x="312" y="0" width="46" height="40" rx="9" fill="#c64fb0"/><text x="316" y="21" fill="#fff" font-size="8" font-weight="700">PASTE</text><text x="320" y="33" fill="#fff" font-size="8" font-weight="700">REV</text>
      <rect x="364" y="0" width="46" height="40" rx="9" fill="#e8e8ff"/><text x="368" y="20" fill="#222" font-size="9" font-weight="700">QNT/</text><text x="370" y="32" fill="#222" font-size="9" font-weight="700">NOW</text>
      <text x="0" y="-12" fill="#5a6072" font-size="10">TOP = ▶ · ● rec · SONG · ALIGN(→step1 on ▶) · COPY · PASTE · PASTE-REV (all 3 = HOLD + tap a clip) · QNT/NOW (queuedImmediate)</text>
    </g>

    <!-- left half: 8x4 = per-lane MUTE (row) + SOLO (row) + LEN− / LEN+ banks -->
    <g transform="translate(0,52)">
      <!-- column captions -->
      <text x="0"   y="-6" fill="#5a6072" font-size="9">MUTE</text>
      <text x="56"  y="-6" fill="#5a6072" font-size="9">SOLO</text>
      <text x="108" y="-6" fill="#5a6072" font-size="9">LEN−</text>
      <text x="160" y="-6" fill="#5a6072" font-size="9">LEN+</text>
      <text x="230" y="-6" fill="#5a6072" font-size="9">QUANTIZE</text>
      <!-- 8 lane rows -->
      <g><rect x="0" y="0" width="46" height="46" rx="9" fill="#e0c02a"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#1f5fb0"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/></g>
      <g transform="translate(0,52)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#5a531f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#214a7a"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/></g>
      <g transform="translate(0,104)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#5a531f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#214a7a"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/></g>
      <g transform="translate(0,156)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#5a531f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#214a7a"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/></g>
      <g transform="translate(0,208)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#e0c02a"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#214a7a"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/></g>
      <g transform="translate(0,260)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#5a531f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#214a7a"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/></g>
      <g transform="translate(0,312)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#5a531f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#214a7a"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#5a4a2a"/></g>

      <!-- quantize ladder (cols 5..8 used as a 4-wide QNT picker; here single column lit) -->
      <g transform="translate(208,0)">
        <rect x="0" y="0"   width="46" height="46" rx="9" fill="#9b6cff"/><text x="6" y="28" fill="#fff" font-size="10">1 bar</text>
        <rect x="0" y="52"  width="46" height="46" rx="9" fill="#3a3550"/><text x="6" y="80" fill="#9aa0b2" font-size="10">1/2</text>
        <rect x="0" y="104" width="46" height="46" rx="9" fill="#3a3550"/><text x="6" y="132" fill="#9aa0b2" font-size="10">1/4</text>
        <rect x="0" y="156" width="46" height="46" rx="9" fill="#3a3550"/><text x="6" y="184" fill="#9aa0b2" font-size="10">1/8</text>
        <rect x="0" y="208" width="46" height="46" rx="9" fill="#3a3550"/><text x="6" y="236" fill="#9aa0b2" font-size="10">1/16</text>
        <rect x="0" y="260" width="46" height="46" rx="9" fill="#3a3550"/><text x="6" y="288" fill="#9aa0b2" font-size="10">NOW</text>
        <rect x="0" y="312" width="46" height="46" rx="9" fill="#e0a32a"/><text x="0" y="340" fill="#3a2a08" font-size="8" font-weight="700">LEN-EDIT</text>
      </g>
      <!-- far right column: scene snapshots / DOUBLE / EDIT -->
      <g transform="translate(364,0)">
        <rect x="0" y="0"   width="46" height="46" rx="9" fill="#7a4fd0"/><text x="6" y="22" fill="#fff" font-size="9" font-weight="700">EDIT</text><text x="2" y="34" fill="#fff" font-size="8">(hold)</text>
        <rect x="0" y="52"  width="46" height="46" rx="9" fill="#e8e8ff"/><text x="2" y="80" fill="#222" font-size="9" font-weight="700">DBL</text>
        <rect x="0" y="104" width="46" height="46" rx="9" fill="#e0a32a"/><text x="2" y="132" fill="#3a2a08" font-size="8.5">SCENE1</text>
        <rect x="0" y="156" width="46" height="46" rx="9" fill="#e0a32a"/><text x="2" y="184" fill="#3a2a08" font-size="8.5">SCENE2</text>
        <rect x="0" y="208" width="46" height="46" rx="9" fill="#e0a32a"/><text x="2" y="236" fill="#3a2a08" font-size="8.5">SCENE3</text>
        <rect x="0" y="260" width="46" height="46" rx="9" fill="#e0a32a"/><text x="2" y="288" fill="#3a2a08" font-size="8.5">SCENE4</text>
        <rect x="0" y="312" width="46" height="46" rx="9" fill="#ff3b3b"/><text x="6" y="338" fill="#fff" font-size="9" font-weight="700">REC</text>
      </g>
    </g>
  </g>
</svg>
