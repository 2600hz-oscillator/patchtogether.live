<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <!-- ===================================================================== -->
  <!-- SHIFT + HELD-MODIFIER LEGEND  —  proposal §7                           -->
  <!-- How SHIFT (CC95) + the held copy/paste/edit/vel gestures compose.      -->
  <!-- ===================================================================== -->
  <defs>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.6" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1d23"/><stop offset="1" stop-color="#101218"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="560" rx="18" fill="url(#bg)"/>
  <text x="36" y="46" fill="#e8eaf0" font-size="22" font-weight="700">SHIFT + held-modifier legend</text>
  <text x="36" y="70" fill="#8b90a0" font-size="12.5">SHIFT is a MAGNITUDE (×8) and SCOPE (clip→block) modifier — it never replaces a gesture. Held, not latched.</text>

  <!-- the SHIFT button -->
  <g transform="translate(36,96)">
    <circle cx="40" cy="40" r="34" fill="#7a4fd0" filter="url(#soft)"/>
    <text x="40" y="38" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">SHIFT</text>
    <text x="40" y="56" fill="#dcd2ff" font-size="10" text-anchor="middle">CC 95 ▣</text>
    <text x="40" y="96" fill="#9a86d0" font-size="10.5" text-anchor="middle">top-row Session</text>
    <text x="40" y="110" fill="#9a86d0" font-size="10.5" text-anchor="middle">button, HELD</text>
  </g>

  <!-- composition table -->
  <g transform="translate(180,96)">
    <!-- header -->
    <g fill="#6f7589" font-size="11" font-weight="700">
      <text x="0" y="6">GESTURE</text>
      <text x="220" y="6">PLAIN</text>
      <text x="470" y="6">WITH SHIFT (held)</text>
    </g>
    <line x1="0" y1="16" x2="684" y2="16" stroke="#2a2d36" stroke-width="1"/>

    <!-- rows -->
    <g font-size="11.5">
      <!-- dir nav -->
      <g transform="translate(0,40)">
        <text x="0"   y="0" fill="#e8eaf0">◀ / ▶  (step)</text>
        <text x="220" y="0" fill="#9aa0b2">window ± 1 step</text>
        <text x="470" y="0" fill="#bfb0ff">window ± 8 steps (a screen)</text>
      </g>
      <g transform="translate(0,72)">
        <text x="0"   y="0" fill="#e8eaf0">▲ / ▼  (pitch)</text>
        <text x="220" y="0" fill="#9aa0b2">window ± 1 row</text>
        <text x="470" y="0" fill="#bfb0ff">window ± 8 rows (a screen)</text>
      </g>
      <line x1="0" y1="90" x2="684" y2="90" stroke="#23262e" stroke-width="1"/>

      <!-- copy -->
      <g transform="translate(0,118)">
        <text x="0"   y="0" fill="#e8eaf0">COPY + tap clip</text>
        <text x="220" y="0" fill="#9aa0b2">copy the whole clip → buffer</text>
        <text x="470" y="0" fill="#bfb0ff">copy the shown BLOCK (range)*</text>
      </g>
      <!-- paste -->
      <g transform="translate(0,150)">
        <text x="0"   y="0" fill="#e8eaf0">PASTE + tap clip</text>
        <text x="220" y="0" fill="#9aa0b2">overwrite/create from buffer</text>
        <text x="470" y="0" fill="#bfb0ff">paste range at the shown block*</text>
      </g>
      <!-- paste-rev -->
      <g transform="translate(0,182)">
        <text x="0"   y="0" fill="#e8eaf0">PASTE-REV + tap</text>
        <text x="220" y="0" fill="#9aa0b2">reversed paste (spans mirrored)</text>
        <text x="470" y="0" fill="#bfb0ff">reversed range paste*</text>
      </g>
      <line x1="0" y1="200" x2="684" y2="200" stroke="#23262e" stroke-width="1"/>

      <!-- edit -->
      <g transform="translate(0,228)">
        <text x="0"   y="0" fill="#e8eaf0">EDIT + tap clip</text>
        <text x="220" y="0" fill="#9aa0b2">open the note editor</text>
        <text x="470" y="0" fill="#9aa0b2">(SHIFT unused — plain only)</text>
      </g>
      <!-- vel -->
      <g transform="translate(0,260)">
        <text x="0"   y="0" fill="#e8eaf0">VEL + tap note</text>
        <text x="220" y="0" fill="#9aa0b2">cycle velocity +1 of 6</text>
        <text x="470" y="0" fill="#bfb0ff">jump to MAX / MIN velocity*</text>
      </g>
      <!-- transport -->
      <g transform="translate(0,292)">
        <text x="0"   y="0" fill="#e8eaf0">▶ transport</text>
        <text x="220" y="0" fill="#9aa0b2">start / stop</text>
        <text x="470" y="0" fill="#bfb0ff">start + force re-align all*</text>
      </g>
    </g>
  </g>

  <!-- modifier swatches -->
  <g transform="translate(36,420)">
    <text x="0" y="0" fill="#6f7589" font-size="11" font-weight="700">HELD MODIFIERS (bright while held)</text>
    <rect x="0"   y="14" width="22" height="22" rx="6" fill="#7a4fd0"/><text x="30"  y="30" fill="#cfd3df" font-size="11">SHIFT</text>
    <rect x="120" y="14" width="22" height="22" rx="6" fill="#26c6c6"/><text x="150" y="30" fill="#cfd3df" font-size="11">COPY</text>
    <rect x="240" y="14" width="22" height="22" rx="6" fill="#7a4fd0"/><text x="270" y="30" fill="#cfd3df" font-size="11">PASTE</text>
    <rect x="360" y="14" width="22" height="22" rx="6" fill="#c84fd0"/><text x="390" y="30" fill="#cfd3df" font-size="11">PASTE-REV</text>
    <rect x="510" y="14" width="22" height="22" rx="6" fill="#7a4fd0"/><text x="540" y="30" fill="#cfd3df" font-size="11">EDIT</text>
    <rect x="630" y="14" width="22" height="22" rx="6" fill="#e0c93a"/><text x="660" y="30" fill="#cfd3df" font-size="11">VEL</text>
  </g>

  <text x="36" y="500" fill="#5c6172" font-size="10.5">* range/block-scoped copy/paste, max/min vel, and force-re-align are v2 enhancements the SHIFT scope reserves — v1 ships the nav ×8 + edit/copy/paste/vel plain gestures.</text>
  <text x="36" y="520" fill="#5c6172" font-size="10.5">Precedence (one held at a time, but defined if not): EDIT &gt; COPY &gt; PASTE &gt; PASTE-REV &gt; launch (mirrors grid-clip-binding.svelte.ts:414).</text>
</svg>
