<svg xmlns="http://www.w3.org/2000/svg" width="780" height="560" viewBox="0 0 780 560" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <!-- PLAN A · EDITOR VIEW — hold EDIT, tap a clip: that unit flips to note editor.
       Mirrors the monome editor 1:1 but with COLOUR velocity + amber playhead. -->
  <defs>
    <linearGradient id="bgAe" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b1d23"/><stop offset="1" stop-color="#0e1015"/></linearGradient>
  </defs>
  <rect width="780" height="560" rx="18" fill="url(#bgAe)"/>
  <text x="36" y="40" fill="#e8eaf0" font-size="21" font-weight="700">PLAN A — Editor (the tapped unit flips to a note grid)</text>
  <text x="36" y="62" fill="#8b90a0" font-size="12.5">X = step (8 cols = half a 16-step block), Y = pitch (in-key). Note colour = velocity. Amber column = playhead. FOLLOW auto-scrolls; freeze + ◀/▶ to page.</text>

  <g transform="translate(120,96)">
    <rect x="-16" y="-16" width="528" height="464" rx="16" fill="#0a0b0f" stroke="#2a2d36" stroke-width="1.5"/>

    <!-- top row: block/half-block select + FOLLOW + page nav + DOUBLE -->
    <g>
      <rect x="0"   y="0" width="52" height="40" rx="9" fill="#e8e8ff"/><text x="6" y="25" fill="#222" font-size="10" font-weight="700">B1a</text>
      <rect x="58"  y="0" width="52" height="40" rx="9" fill="#2a2d36"/><text x="64" y="25" fill="#8b90a0" font-size="10">B1b</text>
      <rect x="116" y="0" width="52" height="40" rx="9" fill="#2a2d36"/><text x="122" y="25" fill="#8b90a0" font-size="10">B2a</text>
      <rect x="174" y="0" width="52" height="40" rx="9" fill="#2a2d36"/><text x="180" y="25" fill="#8b90a0" font-size="10">B2b</text>
      <!-- FOLLOW (steady = following) -->
      <rect x="232" y="0" width="52" height="40" rx="9" fill="#2f7d52"/><text x="236" y="25" fill="#fff" font-size="8.5" font-weight="700">FOLLOW</text>
      <!-- page nav (dim = no-op while following) -->
      <rect x="290" y="0" width="52" height="40" rx="9" fill="#2a2d36"/><text x="308" y="26" fill="#5a6072" font-size="13" font-weight="700">◀</text>
      <rect x="348" y="0" width="52" height="40" rx="9" fill="#2a2d36"/><text x="366" y="26" fill="#5a6072" font-size="13" font-weight="700">▶</text>
      <!-- DOUBLE (dup + ×2 length, cap 128) -->
      <rect x="406" y="0" width="52" height="40" rx="9" fill="#e8e8ff"/><text x="416" y="25" fill="#222" font-size="10" font-weight="700">×2</text>
      <text x="90" y="-12" fill="#5a6072" font-size="10">TOP ROW = 16-step block halves (B1a..) + FOLLOW (auto-scroll) · ◀/▶ page when frozen (dim) · ×2 = DOUBLE (cap 128)</text>
    </g>

    <!-- 8x8 note grid (rows = pitch high->low, cols = steps 1..8 of current page) -->
    <g transform="translate(0,52)">
      <!-- row 0 (highest) -->
      <g transform="translate(0,0)"><rect x="0" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="58" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="116" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="174" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="232" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="290" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="348" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="406" y="0" width="52" height="46" rx="9" fill="#23252b"/></g>
      <!-- row1 : a med note at step3 -->
      <g transform="translate(0,52)"><rect x="0" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="58" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="116" y="0" width="52" height="46" rx="9" fill="#4a7dc0"/><rect x="174" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="232" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="290" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="348" y="0" width="52" height="46" rx="9" fill="#7fb6ff"/><rect x="406" y="0" width="52" height="46" rx="9" fill="#23252b"/></g>
      <!-- row2 -->
      <g transform="translate(0,104)"><rect x="0" y="0" width="52" height="46" rx="9" fill="#3a516f"/><rect x="58" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="116" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="174" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="232" y="0" width="52" height="46" rx="9" fill="#ffd23b"/><rect x="290" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="348" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="406" y="0" width="52" height="46" rx="9" fill="#23252b"/></g>
      <!-- row3 (root guide faint) : held note span steps 5-7 -->
      <g transform="translate(0,156)"><rect x="0" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="58" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="116" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="174" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="232" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="290" y="0" width="156" height="46" rx="9" fill="#4a7dc0"/><text x="320" y="29" fill="#cfe2ff" font-size="10">held span (tie)</text></g>
      <!-- row4 -->
      <g transform="translate(0,208)"><rect x="0" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="58" y="0" width="52" height="46" rx="9" fill="#3a516f"/><rect x="116" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="174" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="232" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="290" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="348" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="406" y="0" width="52" height="46" rx="9" fill="#23252b"/></g>
      <!-- row5 -->
      <g transform="translate(0,260)"><rect x="0" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="58" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="116" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="174" y="0" width="52" height="46" rx="9" fill="#7fb6ff"/><rect x="232" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="290" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="348" y="0" width="52" height="46" rx="9" fill="#23252b"/><rect x="406" y="0" width="52" height="46" rx="9" fill="#23252b"/></g>
      <!-- row6 (lowest note row) -->
      <g transform="translate(0,312)"><rect x="0" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="58" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="116" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="174" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="232" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="290" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="348" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/><rect x="406" y="0" width="52" height="46" rx="9" fill="#1a1f2b"/></g>
      <!-- playhead column overlay at step 5 (col idx 4) -->
      <rect x="232" y="-4" width="52" height="372" rx="9" fill="#ffd23b" opacity="0.12"/>
    </g>

    <!-- bottom function row -->
    <g transform="translate(0,416)">
      <rect x="0"   y="0" width="52" height="44" rx="9" fill="#d23b3b"/><text x="6" y="27" fill="#fff" font-size="10" font-weight="700">EXIT</text>
      <rect x="58"  y="0" width="52" height="44" rx="9" fill="#7a4fd0"/><text x="68" y="27" fill="#fff" font-size="10" font-weight="700">VEL</text>
      <rect x="116" y="0" width="52" height="44" rx="9" fill="#e8e8ff"/><text x="124" y="27" fill="#222" font-size="10" font-weight="700">OCT−</text>
      <rect x="174" y="0" width="52" height="44" rx="9" fill="#e8e8ff"/><text x="182" y="27" fill="#222" font-size="10" font-weight="700">OCT+</text>
      <rect x="232" y="0" width="52" height="44" rx="9" fill="#e8e8ff"/><text x="240" y="27" fill="#222" font-size="10" font-weight="700">ROW−</text>
      <rect x="290" y="0" width="52" height="44" rx="9" fill="#e8e8ff"/><text x="298" y="27" fill="#222" font-size="10" font-weight="700">ROW+</text>
      <rect x="348" y="0" width="52" height="44" rx="9" fill="#26c6c6"/><text x="354" y="27" fill="#063" font-size="9.5" font-weight="700">SCALE</text>
      <rect x="406" y="0" width="52" height="44" rx="9" fill="#e0a32a"/><text x="414" y="21" fill="#3a2a08" font-size="9" font-weight="700">LEN</text><text x="408" y="33" fill="#3a2a08" font-size="7.5" font-weight="700">→2-row</text>
    </g>
  </g>
</svg>
