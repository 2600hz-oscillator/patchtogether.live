<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <!-- PLAN C · EDIT role — Unit 1 still the live clip matrix (you can launch while
       editing); Unit 2 is a full note editor. The clip BEING edited pulses
       turquoise on Unit 1 so you never lose your place. -->
  <defs>
    <linearGradient id="bgCe" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b1d23"/><stop offset="1" stop-color="#0e1015"/></linearGradient>
    <filter id="padCe" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>
  <rect width="1180" height="560" rx="18" fill="url(#bgCe)"/>
  <text x="36" y="40" fill="#e8eaf0" font-size="21" font-weight="700">PLAN C — EDIT role · Unit 1 stays live (edited clip pulses turquoise) · Unit 2 = note editor</text>
  <text x="36" y="62" fill="#8b90a0" font-size="12.5">You can launch/stop clips on Unit 1 while editing on Unit 2 — the editor is never modal over the matrix. Tap another clip on Unit 1 to retarget the editor.</text>

  <!-- ===== UNIT 1 : matrix (edited clip highlighted) ===== -->
  <g transform="translate(40,96)">
    <rect x="-14" y="-14" width="492" height="448" rx="16" fill="#0a0b0f" stroke="#2a2d36" stroke-width="1.5"/>
    <text x="0" y="-22" fill="#9aa0b2" font-size="12" font-weight="700">UNIT 1 · CLIP MATRIX (live) — turquoise = the clip open in the editor</text>
    <g><rect x="0" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padCe)"/><rect x="52" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padCe)"/><rect x="104" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padCe)"/><rect x="156" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padCe)"/><rect x="208" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padCe)"/><rect x="260" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padCe)"/><rect x="312" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padCe)"/><rect x="364" y="0" width="46" height="40" rx="9" fill="#e0a32a" filter="url(#padCe)"/></g>
    <g transform="translate(0,52)">
      <g transform="translate(0,0)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#2fd06a"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
      <!-- edited clip = lane2 slot3 → turquoise pulse ring -->
      <g transform="translate(0,52)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#2fd06a"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#26c6c6"/><rect x="104" y="0" width="46" height="46" rx="9" fill="none" stroke="#7ff0f0" stroke-width="3"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/></g>
      <g transform="translate(0,104)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
      <g transform="translate(0,156)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
      <g transform="translate(0,208)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#2fd06a"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
      <g transform="translate(0,260)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
      <g transform="translate(0,312)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#15171c" stroke="#262a33"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#3a516f"/></g>
    </g>
    <g transform="translate(420,52)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#d23b3b"/><rect x="0" y="52" width="46" height="46" rx="9" fill="#d23b3b"/><rect x="0" y="104" width="46" height="46" rx="9" fill="#8a4a14"/><rect x="0" y="156" width="46" height="46" rx="9" fill="#8a4a14"/><rect x="0" y="208" width="46" height="46" rx="9" fill="#d23b3b"/><rect x="0" y="260" width="46" height="46" rx="9" fill="#8a4a14"/><rect x="0" y="312" width="46" height="46" rx="9" fill="#8a4a14"/></g>
  </g>

  <!-- ===== UNIT 2 : note editor ===== -->
  <g transform="translate(610,96)">
    <rect x="-14" y="-14" width="492" height="448" rx="16" fill="#0a0b0f" stroke="#2a2d36" stroke-width="1.5"/>
    <text x="0" y="-22" fill="#9aa0b2" font-size="12" font-weight="700">UNIT 2 · NOTE EDITOR — lane 2 · slot 3 · C major</text>
    <!-- top row: role select (EDIT lit) + page nav -->
    <g>
      <rect x="0" y="0"   width="46" height="40" rx="9" fill="#3a3550"/><text x="2" y="24" fill="#b0a8d0" font-size="8.5" font-weight="700">FX</text>
      <rect x="52" y="0"  width="46" height="40" rx="9" fill="#3a3550"/><text x="56" y="24" fill="#b0a8d0" font-size="8.5" font-weight="700">MIXER</text>
      <rect x="104" y="0" width="46" height="40" rx="9" fill="#7a4fd0"/><text x="110" y="24" fill="#fff" font-size="8.5" font-weight="700">EDIT</text>
      <rect x="156" y="0" width="46" height="40" rx="9" fill="#3a3550"/><text x="162" y="24" fill="#b0a8d0" font-size="8.5" font-weight="700">SONG</text>
      <rect x="208" y="0" width="46" height="40" rx="9" fill="#2f7d52"/><text x="210" y="24" fill="#fff" font-size="8" font-weight="700">FOLLOW</text>
      <rect x="260" y="0" width="46" height="40" rx="9" fill="#2a2d36"/><text x="268" y="24" fill="#5a6072" font-size="9" font-weight="700">◀PG</text>
      <rect x="312" y="0" width="46" height="40" rx="9" fill="#2a2d36"/><text x="320" y="24" fill="#5a6072" font-size="9" font-weight="700">PG▶</text>
      <rect x="364" y="0" width="46" height="40" rx="9" fill="#26c6c6"/><text x="370" y="24" fill="#063" font-size="9" font-weight="700">COPY</text>
      <text x="0" y="-12" fill="#5a6072" font-size="9">TOP = role select (FX·MIXER·EDIT·SONG) + FOLLOW (auto-scroll; flash=frozen) · ◀PG/PG▶ (dim when following) · COPY (hold + tap a clip)</text>
    </g>
    <!-- note grid rows 0..6 + bottom function row -->
    <g transform="translate(0,52)">
      <g transform="translate(0,0)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#7fb6ff"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#23252b"/></g>
      <g transform="translate(0,52)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#4a7dc0"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#23252b"/></g>
      <g transform="translate(0,104)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#ffd23b"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#7fb6ff"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#23252b"/></g>
      <g transform="translate(0,156)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="208" y="0" width="138" height="46" rx="9" fill="#4a7dc0"/><text x="232" y="29" fill="#cfe2ff" font-size="10">held span</text></g>
      <g transform="translate(0,208)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#3a516f"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#23252b"/></g>
      <g transform="translate(0,260)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#7fb6ff"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#23252b"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#23252b"/></g>
      <g transform="translate(0,312)"><rect x="0" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="52" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="104" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="156" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="208" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="260" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="312" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/><rect x="364" y="0" width="46" height="46" rx="9" fill="#1a1f2b"/></g>
      <rect x="104" y="-4" width="46" height="372" rx="9" fill="#ffd23b" opacity="0.12"/>
    </g>
    <!-- bottom function row -->
    <g transform="translate(0,416)">
      <rect x="0" y="0"   width="46" height="44" rx="9" fill="#7a4fd0"/><text x="6" y="27" fill="#fff" font-size="10" font-weight="700">VEL</text>
      <rect x="52" y="0"  width="46" height="44" rx="9" fill="#26c6c6"/><text x="56" y="27" fill="#063" font-size="9" font-weight="700">SCALE</text>
      <rect x="104" y="0" width="46" height="44" rx="9" fill="#e8e8ff"/><text x="112" y="27" fill="#222" font-size="10" font-weight="700">OCT−</text>
      <rect x="156" y="0" width="46" height="44" rx="9" fill="#e8e8ff"/><text x="164" y="27" fill="#222" font-size="10" font-weight="700">OCT+</text>
      <rect x="208" y="0" width="46" height="44" rx="9" fill="#e8e8ff"/><text x="216" y="27" fill="#222" font-size="10" font-weight="700">ROW−</text>
      <rect x="260" y="0" width="46" height="44" rx="9" fill="#e8e8ff"/><text x="268" y="27" fill="#222" font-size="10" font-weight="700">ROW+</text>
      <rect x="312" y="0" width="46" height="44" rx="9" fill="#e8e8ff"/><text x="324" y="27" fill="#222" font-size="11" font-weight="700">×2</text>
      <rect x="364" y="0" width="46" height="44" rx="9" fill="#e0a32a"/><text x="372" y="21" fill="#3a2a08" font-size="9" font-weight="700">LEN</text><text x="366" y="33" fill="#3a2a08" font-size="7" font-weight="700">→2-row</text>
      <text x="0" y="-6" fill="#5a6072" font-size="9">FUNC ROW: VEL · SCALE · OCT± · ROW± · ×2 DOUBLE (cap 128) · LEN → 2-row LENGTH-EDIT (end-BLOCK ×16 + end-STEP 1..16, non-destructive)</text>
    </g>
  </g>
</svg>
