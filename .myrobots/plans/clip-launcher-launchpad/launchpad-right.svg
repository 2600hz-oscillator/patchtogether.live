<svg xmlns="http://www.w3.org/2000/svg" width="760" height="720" viewBox="0 0 760 720" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <!-- ===================================================================== -->
  <!-- LAUNCHPAD RIGHT  —  Unit R = the command deck (Plan B / proposal §5)   -->
  <!-- top row = global transport/clipboard + SHIFT; 8x8 = control columns    -->
  <!-- (MUTE/SOLO/LEN±/QUANTIZE/EDIT/DOUBLE/SCENE-SNAP/REC). All writes hit    -->
  <!-- the SAME node.data fields the card + monome write.                      -->
  <!-- ===================================================================== -->
  <defs>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1d23"/><stop offset="1" stop-color="#0f1116"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2d36"/><stop offset="1" stop-color="#202329"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="760" height="720" rx="18" fill="url(#bg)"/>
  <text x="34" y="44" fill="#e8eaf0" font-size="22" font-weight="700">LAUNCHPAD RIGHT · command deck</text>
  <text x="34" y="66" fill="#8b90a0" font-size="12.5">every shipped function = a dedicated lit RGB button — no held-modifier overloading (the second unit's button budget)</text>

  <rect x="40" y="92" width="560" height="560" rx="22" fill="url(#shell)" stroke="#3a3f4d" stroke-width="1.5" filter="url(#soft)"/>

  <!-- ===== top function row (CC 91-98): ▶ ● SONG ALIGN SHIFT COPY PASTE REV ===== -->
  <g font-size="10" font-weight="700" text-anchor="middle">
    <circle cx="92"  cy="124" r="22" fill="#2fd06a" filter="url(#soft)"/><text x="92"  y="129" fill="#06320f">▶</text>
    <circle cx="152" cy="124" r="22" fill="#ff3b3b" filter="url(#soft)"/><text x="152" y="129" fill="#3a0606">●REC</text>
    <circle cx="212" cy="124" r="22" fill="#e8e8ff" filter="url(#soft)"/><text x="212" y="129" fill="#1b1d23">SONG</text>
    <circle cx="272" cy="124" r="22" fill="#e8e8ff" filter="url(#soft)"/><text x="272" y="129" fill="#1b1d23">ALGN</text>
    <circle cx="332" cy="124" r="22" fill="#7a4fd0" filter="url(#soft)"/><text x="332" y="129" fill="#fff">SHIFT</text>
    <circle cx="392" cy="124" r="22" fill="#26c6c6" filter="url(#soft)"/><text x="392" y="129" fill="#06343a">COPY</text>
    <circle cx="452" cy="124" r="22" fill="#7a4fd0" filter="url(#soft)"/><text x="452" y="129" fill="#fff">PSTE</text>
    <circle cx="512" cy="124" r="22" fill="#c84fd0" filter="url(#soft)"/><text x="512" y="129" fill="#fff">REV</text>
  </g>
  <g fill="#6f7589" font-size="9" text-anchor="middle">
    <text x="92" y="160">CC91</text><text x="152" y="160">CC92</text><text x="212" y="160">CC93</text><text x="272" y="160">CC94</text>
    <text x="332" y="160" fill="#9a86d0">CC95</text><text x="392" y="160">CC96</text><text x="452" y="160">CC97</text><text x="512" y="160">CC98</text>
  </g>

  <!-- ===== column headers ===== -->
  <g fill="#8b90a0" font-size="9.5" text-anchor="middle">
    <text x="98"  y="640">MUTE</text>
    <text x="154" y="640">SOLO</text>
    <text x="210" y="640">LEN−</text>
    <text x="266" y="640">LEN+</text>
    <text x="322" y="640">QNT</text>
    <text x="378" y="640">SCN-SNP</text>
    <text x="434" y="640">spare</text>
    <text x="490" y="640">spare</text>
    <text x="552" y="640" fill="#7a4fd0">EDIT/DBL/REC</text>
  </g>

  <!-- ===== the 8x8 control grid ===== columns:
       col0 MUTE (yellow=audible, dim=muted, per lane)
       col1 SOLO (blue when solo'd)
       col2 LEN- col3 LEN+ (per lane, block-stepped)
       col4 QUANTIZE ladder (violet lit = current)
       col5 SCENE snapshots (amber)
       col6/7 spare (reserved: pan/send/prob/humanize)
       right CC col = EDIT(hold)/DOUBLE/REC + scene snapshots
  -->
  <!-- We render columns programmatically-by-hand. pad 44, gap 12, x start 76, y start 178 -->
  <!-- MUTE column (8 lanes), most audible (yellow) two muted (dim) -->
  <g>
    <!-- helper rows y: 178 234 290 346 402 458 514 570 -->
    <!-- MUTE col x=76 : L1-L6 audible yellow, L7 L8 muted dim -->
    <rect x="76" y="178" width="44" height="44" rx="9" fill="#e0c93a"/>
    <rect x="76" y="234" width="44" height="44" rx="9" fill="#e0c93a"/>
    <rect x="76" y="290" width="44" height="44" rx="9" fill="#e0c93a"/>
    <rect x="76" y="346" width="44" height="44" rx="9" fill="#e0c93a"/>
    <rect x="76" y="402" width="44" height="44" rx="9" fill="#e0c93a"/>
    <rect x="76" y="458" width="44" height="44" rx="9" fill="#e0c93a"/>
    <rect x="76" y="514" width="44" height="44" rx="9" fill="#3a3417"/>
    <rect x="76" y="570" width="44" height="44" rx="9" fill="#3a3417"/>

    <!-- SOLO col x=132 : L3 solo'd blue, rest dim -->
    <rect x="132" y="178" width="44" height="44" rx="9" fill="#1d2740"/>
    <rect x="132" y="234" width="44" height="44" rx="9" fill="#1d2740"/>
    <rect x="132" y="290" width="44" height="44" rx="9" fill="#4a7dc0"/>
    <rect x="132" y="346" width="44" height="44" rx="9" fill="#1d2740"/>
    <rect x="132" y="402" width="44" height="44" rx="9" fill="#1d2740"/>
    <rect x="132" y="458" width="44" height="44" rx="9" fill="#1d2740"/>
    <rect x="132" y="514" width="44" height="44" rx="9" fill="#1d2740"/>
    <rect x="132" y="570" width="44" height="44" rx="9" fill="#1d2740"/>

    <!-- LEN- col x=188 + LEN+ col x=244 (per lane, mid-blue) -->
    <g>
      <rect x="188" y="178" width="44" height="44" rx="9" fill="#2c3d57"/><rect x="244" y="178" width="44" height="44" rx="9" fill="#2c3d57"/>
      <rect x="188" y="234" width="44" height="44" rx="9" fill="#2c3d57"/><rect x="244" y="234" width="44" height="44" rx="9" fill="#2c3d57"/>
      <rect x="188" y="290" width="44" height="44" rx="9" fill="#2c3d57"/><rect x="244" y="290" width="44" height="44" rx="9" fill="#2c3d57"/>
      <rect x="188" y="346" width="44" height="44" rx="9" fill="#2c3d57"/><rect x="244" y="346" width="44" height="44" rx="9" fill="#2c3d57"/>
      <rect x="188" y="402" width="44" height="44" rx="9" fill="#2c3d57"/><rect x="244" y="402" width="44" height="44" rx="9" fill="#2c3d57"/>
      <rect x="188" y="458" width="44" height="44" rx="9" fill="#2c3d57"/><rect x="244" y="458" width="44" height="44" rx="9" fill="#2c3d57"/>
      <rect x="188" y="514" width="44" height="44" rx="9" fill="#2c3d57"/><rect x="244" y="514" width="44" height="44" rx="9" fill="#2c3d57"/>
      <rect x="188" y="570" width="44" height="44" rx="9" fill="#2c3d57"/><rect x="244" y="570" width="44" height="44" rx="9" fill="#2c3d57"/>
    </g>

    <!-- QUANTIZE ladder x=300 : 6 lit steps, current = 1/16 lit violet -->
    <rect x="300" y="178" width="44" height="44" rx="9" fill="#2b2440"/><text x="322" y="204" fill="#8a7fb0" font-size="9" text-anchor="middle">1bar</text>
    <rect x="300" y="234" width="44" height="44" rx="9" fill="#2b2440"/><text x="322" y="260" fill="#8a7fb0" font-size="9" text-anchor="middle">1/2</text>
    <rect x="300" y="290" width="44" height="44" rx="9" fill="#2b2440"/><text x="322" y="316" fill="#8a7fb0" font-size="9" text-anchor="middle">1/4</text>
    <rect x="300" y="346" width="44" height="44" rx="9" fill="#2b2440"/><text x="322" y="372" fill="#8a7fb0" font-size="9" text-anchor="middle">1/8</text>
    <rect x="300" y="402" width="44" height="44" rx="9" fill="#7a4fd0" filter="url(#soft)"/><text x="322" y="428" fill="#fff" font-size="9" text-anchor="middle">1/16</text>
    <rect x="300" y="458" width="44" height="44" rx="9" fill="#2b2440"/><text x="322" y="484" fill="#8a7fb0" font-size="9" text-anchor="middle">NOW</text>
    <rect x="300" y="514" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
    <rect x="300" y="570" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>

    <!-- SCENE SNAPSHOTS x=356 : 4 amber + 4 dark -->
    <rect x="356" y="178" width="44" height="44" rx="9" fill="#e0a32a"/><text x="378" y="204" fill="#3a2a06" font-size="10" text-anchor="middle">S1</text>
    <rect x="356" y="234" width="44" height="44" rx="9" fill="#e0a32a"/><text x="378" y="260" fill="#3a2a06" font-size="10" text-anchor="middle">S2</text>
    <rect x="356" y="290" width="44" height="44" rx="9" fill="#8a6a1c"/><text x="378" y="316" fill="#cda94c" font-size="10" text-anchor="middle">S3</text>
    <rect x="356" y="346" width="44" height="44" rx="9" fill="#8a6a1c"/><text x="378" y="372" fill="#cda94c" font-size="10" text-anchor="middle">S4</text>
    <rect x="356" y="402" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
    <rect x="356" y="458" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
    <rect x="356" y="514" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
    <rect x="356" y="570" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>

    <!-- spare cols x=412, x=468 : reserved (dark) -->
    <g>
      <rect x="412" y="178" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/><rect x="468" y="178" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
      <rect x="412" y="234" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/><rect x="468" y="234" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
      <rect x="412" y="290" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/><rect x="468" y="290" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
      <rect x="412" y="346" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/><rect x="468" y="346" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
      <rect x="412" y="402" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/><rect x="468" y="402" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
      <rect x="412" y="458" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/><rect x="468" y="458" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
      <rect x="412" y="514" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/><rect x="468" y="514" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
      <rect x="412" y="570" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/><rect x="468" y="570" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
    </g>

    <!-- RIGHT CC column (scene buttons) : EDIT, DOUBLE, REC, COPY-IND, then dark -->
    <rect x="530" y="178" width="44" height="44" rx="9" fill="#7a4fd0"/><text x="552" y="204" fill="#fff" font-size="9" text-anchor="middle">EDIT</text>
    <rect x="530" y="234" width="44" height="44" rx="9" fill="#e8e8ff"/><text x="552" y="260" fill="#1b1d23" font-size="8.5" text-anchor="middle">DBL</text>
    <rect x="530" y="290" width="44" height="44" rx="9" fill="#ff3b3b"/><text x="552" y="316" fill="#3a0606" font-size="9" text-anchor="middle">REC</text>
    <rect x="530" y="346" width="44" height="44" rx="9" fill="#26c6c6"/><text x="552" y="372" fill="#06343a" font-size="8" text-anchor="middle">cpy●</text>
    <rect x="530" y="402" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
    <rect x="530" y="458" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
    <rect x="530" y="514" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
    <rect x="530" y="570" width="44" height="44" rx="9" fill="#15171c" stroke="#23262e"/>
  </g>

  <!-- ===== legend / mapping (right side) ===== -->
  <g transform="translate(620,108)">
    <text x="0" y="6" fill="#6f7589" font-size="11" font-weight="700">MAPS TO</text>
    <text x="0" y="28" fill="#9aa0b2" font-size="10.5">▶ → timelorde.running</text>
    <text x="0" y="46" fill="#9aa0b2" font-size="10.5">●REC → data.recording</text>
    <text x="0" y="64" fill="#9aa0b2" font-size="10.5">SONG → data.clipMode</text>
    <text x="0" y="82" fill="#9aa0b2" font-size="10.5">ALGN → ▶-start re-align</text>
    <text x="0" y="100" fill="#9aa0b2" font-size="10.5">COPY → copyClip()→buf</text>
    <text x="0" y="118" fill="#9aa0b2" font-size="10.5">PSTE → writeClip(buf)</text>
    <text x="0" y="136" fill="#9aa0b2" font-size="10.5">REV → reverseClipSteps</text>
    <text x="0" y="154" fill="#9aa0b2" font-size="10.5">MUTE/SOLO → per-lane</text>
    <text x="0" y="172" fill="#9aa0b2" font-size="10.5">LEN± → polymeter len</text>
    <text x="0" y="190" fill="#9aa0b2" font-size="10.5">QNT → queuedImmediate</text>
    <text x="0" y="208" fill="#9aa0b2" font-size="10.5">EDIT → hold + tap L clip</text>
    <text x="0" y="226" fill="#9aa0b2" font-size="10.5">DBL → doubleNoteClip()</text>

    <text x="0" y="266" fill="#6f7589" font-size="11" font-weight="700">COLOURS</text>
    <rect x="0" y="280" width="20" height="20" rx="6" fill="#e0c93a"/><text x="28" y="295" fill="#cfd3df" font-size="10.5">mute audible</text>
    <rect x="0" y="306" width="20" height="20" rx="6" fill="#4a7dc0"/><text x="28" y="321" fill="#cfd3df" font-size="10.5">solo</text>
    <rect x="0" y="332" width="20" height="20" rx="6" fill="#26c6c6"/><text x="28" y="347" fill="#cfd3df" font-size="10.5">copy buf</text>
    <rect x="0" y="358" width="20" height="20" rx="6" fill="#7a4fd0"/><text x="28" y="373" fill="#cfd3df" font-size="10.5">edit / shift / qnt</text>
    <rect x="0" y="384" width="20" height="20" rx="6" fill="#e0a32a"/><text x="28" y="399" fill="#cfd3df" font-size="10.5">scene snapshot</text>
    <rect x="0" y="410" width="20" height="20" rx="6" fill="#ff3b3b"/><text x="28" y="425" fill="#cfd3df" font-size="10.5">record</text>
  </g>

  <text x="34" y="692" fill="#5c6172" font-size="10.5">EDIT held + tap a clip on UNIT L → editor (L flips to the note grid, R flips to the editor deck — see launchpad-clipedit.svg)</text>
</svg>
